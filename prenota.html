<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Prenota Posto | Del Grosso Viaggi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; -webkit-tap-highlight-color: transparent; }
        header { background: white; padding: 10px 0; border-bottom: 1px solid #eaeaea; position: sticky; top: 0; z-index: 1000; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; width: 92%; max-width: 1200px; margin: auto; }
        .seat { width: 45px; height: 50px; position: relative; @apply flex items-center justify-center text-[11px] font-black transition-all shadow-md shrink-0; border-radius: 10px 10px 4px 4px; margin-top: 8px; }
        .seat::before { content: ""; position: absolute; top: -8px; left: 50%; transform: translateX(-50%); width: 28px; height: 8px; background: inherit; border-radius: 4px 4px 0 0; filter: brightness(85%); border: 1px solid rgba(0,0,0,0.1); }
        .seat-available { background-color: #2563eb; color: white; border: 1px solid #1e40af; cursor: pointer; }
        .seat-occupied { background-color: #dc2626; color: white; border: 1px solid #991b1b; cursor: not-allowed; opacity: 0.6; }
        .seat-selected { background-color: #fbbf24; color: #000; border: 2px solid #b45309; scale: 1.1; z-index: 10; }
        .seat-driver { background-color: #4b5563; color: white; border-radius: 8px; cursor: not-allowed; }
        .bus-outer { @apply bg-white p-6 md:p-8 rounded-[3rem] border-4 border-gray-200 inline-block; }
        .bus-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; align-items: center; }
        .corridoio { width: 25px; }
        footer { background: #000; color: white; padding: 40px 0 20px 0; margin-top: 50px; text-align: center; }
        .signature { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: #555; margin-top: 20px; }
    </style>
</head>
<body>

    <header>
        <div class="header-flex">
            <a href="index.html"><img src="logo.JPEG" class="h-10 w-auto" alt="Logo"></a>
            <nav class="flex gap-4">
                <a href="viaggi.html" class="text-[9px] font-black uppercase text-gray-400">Viaggi</a>
                <a href="index.html" class="text-[9px] font-black uppercase text-blue-600">Home</a>
            </nav>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-6 mt-4">
        <div class="bg-white p-6 rounded-[2.5rem] shadow-xl">
            <h1 class="text-3xl font-black italic uppercase tracking-tighter mb-6 text-center">Prenota il Posto</h1>
            
            <label class="text-[10px] font-black uppercase text-gray-400 ml-1">Scegli Viaggio</label>
            <select id="select-viaggio" onchange="caricaMappa()" class="w-full p-4 bg-gray-50 border-2 rounded-2xl font-bold mb-4 outline-none focus:border-blue-500">
                <option value="">-- SELEZIONA --</option>
            </select>

            <label class="text-[10px] font-black uppercase text-gray-400 ml-1">Il tuo Nome</label>
            <input type="text" id="nome-cliente" placeholder="NOME E COGNOME" class="w-full p-4 bg-gray-50 border-2 rounded-2xl font-bold mb-4 outline-none uppercase">
            
            <label class="text-[10px] font-black uppercase text-gray-400 ml-1">Il tuo Cellulare</label>
            <input type="tel" id="telefono-cliente" placeholder="ES. 366 1234567" class="w-full p-4 bg-gray-50 border-2 rounded-2xl font-bold outline-none">
        </div>

        <div id="sezione-mappa" class="hidden text-center">
            <div class="bus-outer">
                <div id="render-bus" class="bus-grid"></div>
            </div>

            <div class="mt-8 bg-blue-600 p-6 rounded-3xl shadow-lg">
                <p class="text-[10px] font-black text-blue-200 uppercase mb-1">Posti selezionati:</p>
                <p id="display-posti" class="text-4xl font-black text-white italic">NESSUNO</p>
            </div>

            <button onclick="inviaPrenotazione()" class="w-full mt-6 bg-green-500 text-white py-6 rounded-[2.5rem] font-black uppercase shadow-xl active:scale-95 transition-all">
                CONFERMA PRENOTAZIONE 💬
            </button>
        </div>
    </main>

    <footer>
        <div class="signature">Designer © <strong>Cristino Nicola Pio</strong></div>
    </footer>

    <script>
        const S_URL = "https://exphxbeqwpwrsigdmilc.supabase.co";
        const S_KEY = "sb_publishable_jEq6R22qxk2SHGI5YEmEow_SfZG7j8c";
        const sb = supabase.createClient(S_URL, S_KEY);

        let selezionati = [];
        let occupati = [];
        let modelloBus = "53";

        async function init() {
            const { data, error } = await sb.from('tratte').select('*').order('created_at', {ascending: false});
            if(error) { console.error(error); return; }
            const sel = document.getElementById('select-viaggio');
            data.forEach(v => {
                const opt = document.createElement('option');
                opt.value = v.id;
                opt.textContent = v.titolo;
                opt.dataset.modello = v.modello_bus || "53";
                sel.appendChild(opt);
            });
            const urlParams = new URLSearchParams(window.location.search);
            const idUrl = urlParams.get('id');
            if(idUrl) { sel.value = idUrl; caricaMappa(); }
        }

        async function caricaMappa() {
            const sel = document.getElementById('select-viaggio');
            if(!sel.value) return;
            modelloBus = sel.options[sel.selectedIndex].dataset.modello;
            selezionati = [];
            document.getElementById('display-posti').innerText = "NESSUNO";
            document.getElementById('sezione-mappa').classList.remove('hidden');

            const { data } = await sb.from('prenotazioni').select('posti_selezionati').eq('tratta_id', sel.value);
            occupati = data ? data.flatMap(d => d.posti_selezionati.map(String)) : [];
            disegnaMappa();
        }

        function disegnaMappa() {
            const container = document.getElementById('render-bus');
            container.innerHTML = "";
            const totale = modelloBus.includes("63") ? 63 : 53;
            const inizioFondo = totale - 4;
            container.innerHTML += `<div class="seat seat-driver">AUT</div><div></div><div class="corridoio"></div><div></div><div></div>`;
            let n = 1;
            while(n < inizioFondo) {
                container.appendChild(creaSedile(n++)); container.appendChild(creaSedile(n++));
                const c = document.createElement('div'); c.className="corridoio"; container.appendChild(c);
                container.appendChild(creaSedile(n++)); container.appendChild(creaSedile(n++));
            }
            for(let i=inizioFondo; i<=totale; i++) container.appendChild(creaSedile(i));
        }

        function creaSedile(num) {
            const s = document.createElement('div');
            const sStr = String(num);
            const isOcc = occupati.includes(sStr);
            s.className = `seat ${isOcc ? 'seat-occupied' : 'seat-available'}`;
            s.innerText = num;
            if(!isOcc) {
                s.onclick = () => {
                    if(selezionati.includes(sStr)) {
                        selezionati = selezionati.filter(x => x !== sStr);
                        s.classList.remove('seat-selected');
                    } else {
                        selezionati.push(sStr);
                        s.classList.add('seat-selected');
                    }
                    document.getElementById('display-posti').innerText = selezionati.length ? selezionati.join(', ') : "NESSUNO";
                };
            }
            return s;
        }

        async function inviaPrenotazione() {
            const nome = document.getElementById('nome-cliente').value.trim();
            const tel = document.getElementById('telefono-cliente').value.trim();
            const trattaId = document.getElementById('select-viaggio').value;
            const trattaNome = document.getElementById('select-viaggio').options[document.getElementById('select-viaggio').selectedIndex].text;

            if(!nome || selezionati.length === 0) {
                alert("Compila il nome e scegli i posti!");
                return;
            }

            const postiDaSalvare = selezionati.map(String);

            const { error } = await sb.from('prenotazioni').insert([{
                nome_cliente: nome.toUpperCase(),
                telefono_cliente: tel || "N/D",
                tratta_id: trattaId,
                posti_selezionati: postiDaSalvare
            }]);

            if(!error) {
                const msg = `*NUOVA PRENOTAZIONE*\n📍 Viaggio: ${trattaNome}\n👤 Cliente: ${nome.toUpperCase()}\n📞 Cell: ${tel || 'N/D'}\n💺 Posti: ${postiDaSalvare.join(', ')}`;
                window.location.href = `https://wa.me/393662127916?text=${encodeURIComponent(msg)}`;
            } else {
                console.error("Errore Supabase:", error);
                alert("Errore Database: " + error.message);
            }
        }
        init();
    </script>
</body>
</html>
