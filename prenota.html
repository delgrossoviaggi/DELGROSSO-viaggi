<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Prenota Posto - Del Grosso Viaggi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; -webkit-tap-highlight-color: transparent; color: #1a1a1a; }
        .container-main { width: 92%; max-width: 1200px; margin: auto; }

        /* HEADER */
        header { background: rgba(255, 255, 255, 0.95); padding: 10px 0; border-bottom: 1px solid #eaeaea; position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px); }
        .header-flex { display: flex; justify-content: space-between; align-items: center; }
        .logo-container img { height: 55px; width: auto; object-fit: contain; }
        .nav-links { list-style: none; display: flex; gap: 25px; }
        .nav-links a { text-decoration: none; color: #000; font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #2563eb; }
        
        /* FORM PRENOTAZIONE */
        .booking-main { max-w-md mx-auto p-4 mt-10 space-y-8; }
        .card-booking { @apply bg-white p-8 rounded-[2.5rem] shadow-xl border border-gray-100; }
        h1.page-title { font-size: 36px; font-weight: 900; text-transform: uppercase; font-style: italic; letter-spacing: -2px; margin-bottom: 10px; line-height: 1; color: #000; }
        p.page-subtitle { font-size: 16px; color: #666; font-style: italic; margin-bottom: 30px; }
        
        label.input-label { @apply text-[10px] font-black uppercase text-blue-600 ml-2 mb-1 block tracking-widest; }
        input.form-input, select.form-select { @apply w-full p-5 bg-gray-50 border-2 border-gray-100 rounded-2xl font-bold outline-none focus:border-blue-500 transition-all appearance-none text-base; color: #000; }
        input.form-input::placeholder { color: #a0aec0; font-weight: 600; }
        
        /* MAPPA BUS BLINDATA */
        .map-section { @apply hidden bg-white p-8 rounded-[2.5rem] shadow-xl border border-gray-100; }
        .map-header { display: flex; justify-content: space-between; align-items: end; margin-bottom: 30px; }
        .map-header h2 { font-size: 24px; font-weight: 900; text-transform: uppercase; font-style: italic; color: #000; leading-none; tracking-tighter; }
        .bus-model-badge { @apply text-[10px] font-black bg-blue-100 text-blue-600 px-4 py-1 rounded-full uppercase tracking-widest; }

        .bus-outer { @apply bg-gray-50 p-8 rounded-[4rem] border-4 border-gray-200 relative; }
        .bus-front { w-full h-10 bg-gray-200 rounded-t-full mb-10 flex items-center justify-center text-[10px] font-black text-gray-400 uppercase tracking-widest; }
        .bus-grid-container { @apply w-full overflow-x-auto text-center pb-4; }
        .bus-grid { display: inline-grid; grid-template-columns: repeat(5, 1fr); gap: 12px; justify-items: center; align-items: center; }
        .corridoio { width: 20px; }
        .bus-back { w-full h-8 bg-gray-200 rounded-b-3xl mt-10; }

        /* SEDILI */
        .seat { @apply rounded-xl flex items-center justify-center font-black transition-all border-2 shadow-sm shrink-0 manipulation; width: 48px; height: 48px; font-size: 12px; }
        .seat-available { @apply bg-white border-gray-200 text-gray-700 cursor-pointer active:scale-90 hover:border-blue-400; }
        .seat-selected { @apply bg-blue-600 border-blue-700 text-white shadow-lg shadow-blue-200 scale-110 z-10; }
        .seat-occupied { @apply bg-gray-200 border-gray-200 text-gray-400 cursor-not-allowed opacity-50; }
        .seat-driver { @apply bg-orange-400 border-orange-500 text-white cursor-not-allowed; }

        /* RIEPILOGO E PULSANTE */
        .summary-box { @apply bg-blue-600 p-6 rounded-3xl text-center shadow-lg shadow-blue-200 mt-10; }
        .summary-label { text-[10px] font-black text-blue-100 uppercase tracking-widest mb-1; }
        .summary-seats { text-4xl font-black text-white italic tracking-tighter; }
        .btn-confirm { @apply w-full bg-green-500 text-white py-6 rounded-[2.5rem] font-black uppercase tracking-widest shadow-xl active:scale-95 transition-all mt-6; font-size: 14px; }
        .btn-confirm:hover { background: #16a34a; }

        /* FOOTER */
        .main-footer { background: #000; color: white; padding: 80px 0 0 0; margin-top: 80px; }
        .footer-grid-custom { display: grid; grid-template-columns: 1.5fr 1fr
