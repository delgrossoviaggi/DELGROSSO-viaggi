<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prenota - Del Grosso Viaggi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .bus-floor { background: #ffffff; border: 6px solid #e5e7eb; border-radius: 60px 60px 20px 20px; padding: 60px 20px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.1); display: inline-block; }
        .seat { width: 50px; height: 50px; background: #f3f4f6; border: 1px solid #d1d5db; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: 800; font-size: 14px; transition: 0.2s; }
        .seat.selected { background: #2563eb !important; color: white !important; transform: scale(1.1); box-shadow: 0 0 15px rgba(37,99,235,0.4); }
        .seat.occupied { background: #e5e7eb !important; color: #9ca3af !important; cursor: not-allowed; opacity: 0.5; }
        .corridoio { width: 40px; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <header class="bg-[#d0e0e3] h-20 flex items-center justify-between px-6 border-b border-[#b7c9cc]">
        <div class="text-2xl font-black text-[#2c4c5c] italic tracking-tighter">DEL GROSSO VIAGGI</div>
        <a href="viaggi.html" class="text-[10px] font-black uppercase text-[#2c4c5c] bg-white/50 px-4 py-2 rounded-xl">← Torna ai Viaggi</a>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-12 text-center">
        <div id="selezione-viaggio" class="mb-12">
            <h1 class="text-4xl font-black italic uppercase mb-8">Scegli il tuo Viaggio</h1>
            <div id="grid-tratte" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>

        <div id="mappa-prenotazione" class="hidden">
            <h2 id="titolo-bus" class="text-2xl font-black uppercase italic mb-8 text-blue-900"></h2>
            
            <div class="overflow-x-auto mb-12">
                <div id="area-mappa" class="bus-floor"></div>
            </div>

            <div class="max-w-md mx-auto bg-white p-8 rounded-[2.5rem] shadow-2xl border">
                <input type="text" id="nome" placeholder="NOME E COGNOME" class="w-full p-4 rounded-2xl border-2 mb-4 font-bold uppercase text-center focus:border-blue-600 outline-none">
                <input type="tel" id="tel" placeholder="TELEFONO" class="w-full p-4 rounded-2xl border-2 mb-6 font-bold text-center focus:border-blue-600 outline-none">
                
                <div class="bg-blue-50 p-4 rounded-2xl mb-6 flex justify-between items-center px-6">
                    <span class="font-bold text-blue-800 uppercase text-xs">Posti scelti:</span>
                    <span id="posti-txt" class="font-black text-blue-600">Nessuno</span>
                </div>

                <button onclick="conferma()" class="w-full bg-green-500 hover:bg-green-600 text-white py-5 rounded-[1.5rem] font-black uppercase italic tracking-widest shadow-xl transition active:scale-95">CONFERMA E WHATSAPP</button>
            </div>
        </div>
    </main>

    <script>
        const S_URL = "https://exphxbeqwpwrsigdmilc.supabase.co";
        const S_KEY = "sb_publishable_jEq6R22qxk2SHGI5YEmEow_SfZG7j8c";
        const sb = supabase.createClient(S_URL, S_KEY);
        let selezionati = [], t_id = null, t_titolo = "";

        async function carica() {
            const { data } = await sb.from('tratte').select('*').order('created_at', {ascending: false});
            const grid = document.getElementById('grid-tratte');
            grid.innerHTML = data.map(t => `
                <div class="bg-white p-4 rounded-3xl border-2 shadow-sm transition hover:border-blue-500 cursor-pointer" onclick="apriMappa('${t.id}', '${t.modello_bus}', '${t.titolo}')">
                    <img src="${t.immagine_url}" class="h-32 w-full object-cover rounded-2xl mb-4">
                    <h3 class="font-black italic uppercase text-sm">${t.titolo}</h3>
                </div>`).join('');
        }

        async function apriMappa(id, modello, titolo) {
            t_id = id; t_titolo = titolo; selezionati = [];
            document.getElementById('selezione-viaggio').classList.add('hidden');
            document.getElementById('mappa-prenotazione').classList.remove('hidden');
            document.getElementById('titolo-bus').innerText = titolo;
            
            const { data } = await sb.from('prenotazioni').select('posti_selezionati').eq('tratta_id', id);
            const occupati = data ? data.flatMap(x => x.posti_selezionati) : [];
            disegna(modello, occupati);
        }

        function disegna(modello, occupati) {
            const area = document.getElementById('area-mappa'); area.innerHTML = '';
            // Schema Bus 53 Posti (49-53 Ultima fila)
            const schema = [[1,2,'C',3,4],[5,6,'C',7,8],[9,10,'C',11,12],[13,14,'C',15,16],[17,18,'C',19,20],[21,22,'C','WC'],[23,24,'C','USCITA'],[25,26,'C',27,28],[29,30,'C',31,32],[33,34,'C',35,36],[37,38,'C',39,40],[41,42,'C',43,44],[45,46,'C',47,48],[49,50,51,52,53]];
            
            schema.forEach(fila => {
                const r = document.createElement('div'); r.className = 'flex justify-center gap-3 mb-3';
                fila.forEach(p => {
                    if(p==='C') r.innerHTML += `<div class="corridoio"></div>`;
                    else if(['WC','USCITA'].includes(p)) r.innerHTML += `<div class="w-[110px] bg-gray-100 rounded-lg flex items-center justify-center text-[10px] font-bold text-gray-400 uppercase">${p}</div>`;
                    else {
                        const isOcc = occupati.includes(p.toString());
                        r.innerHTML += `<div id="s-${p}" class="seat ${isOcc?'occupied':''}" onclick="toggleSeat('${p}', ${isOcc})">${p}</div>`;
                    }
                }); area.appendChild(r);
            });
        }

        window.toggleSeat = (n, isOcc) => {
            if(isOcc) return;
            const el = document.getElementById(`s-${n}`);
            el.classList.toggle('selected');
            if(el.classList.contains('selected')) selezionati.push(n);
            else selezionati = selezionati.filter(x => x !== n);
            document.getElementById('posti-txt').innerText = selezionati.length ? selezionati.sort((a,b)=>a-b).join(', ') : "Nessuno";
        };

        async function conferma() {
            const n = document.getElementById('nome').value.toUpperCase(), t = document.getElementById('tel').value;
            if(!n || !t || !selezionati.length) return alert("Dati mancanti!");
            const { error } = await sb.from('prenotazioni').insert([{tratta_id: t_id, nome_cliente: n, telefono_cliente: t, posti_selezionati: selezionati}]);
            if(!error) {
                const msg = `✅ PRENOTAZIONE DEL GROSSO\n\nViaggio: ${t_titolo}\nCliente: ${n}\nPosti: ${selezionati.join(', ')}`;
                window.open(`https://wa.me/393662127916?text=${encodeURIComponent(msg)}`);
                location.reload();
            }
        }
        carica();
    </script>
</body>
</html>
