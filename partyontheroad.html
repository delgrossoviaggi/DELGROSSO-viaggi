<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Party On The Road | Limousine Bus Del Grosso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #000; color: #fff; overflow-x: hidden; }
        
        .event-card { 
            border-radius: 2.5rem; overflow: hidden; position: relative; cursor: pointer; 
            transition: all 0.6s cubic-bezier(0.165, 0.84, 0.44, 1); height: 420px;
            border: 1px solid #1a1a1a;
            background-color: #0a0a0a;
            background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.85)), url('limo-bus.jpeg');
            background-size: cover;
            background-position: center;
        }
        .event-card:hover { transform: translateY(-12px); border-color: #2563eb; }
        
        .event-overlay { 
            position: absolute; inset: 0; 
            background: linear-gradient(to top, rgba(0,0,0,1) 0%, transparent 100%); 
            display: flex; flex-direction: column; justify-content: flex-end; padding: 2.5rem; 
            z-index: 10;
        }

        #contactMenu {
            display: none;
            position: absolute;
            top: 100%;
            right: 0;
            background: #111;
            border: 1px solid #333;
            border-radius: 1.5rem;
            padding: 1.2rem;
            width: 280px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            z-index: 100;
        }
        .contact-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            text-decoration: none;
            color: white;
            transition: 0.3s;
        }
        .contact-link:hover { background: #222; color: #2563eb; }
    </style>
</head>
<body>

    <nav class="p-6 flex justify-between items-center border-b border-zinc-900 bg-black/80 backdrop-blur-xl sticky top-0 z-50">
        <a href="index.html"><img src="logo.JPEG" class="h-12 md:h-16 w-auto" alt="Logo"></a>
        <div class="relative">
            <button onclick="toggleContacts()" class="bg-blue-600 hover:bg-blue-700 px-6 py-2.5 rounded-full text-[10px] font-black uppercase tracking-widest transition-all scale-100 active:scale-90">
                Prenota Club
            </button>
            <div id="contactMenu" class="mt-4">
                <a href="https://wa.me/393662127916" target="_blank" class="contact-link"><span>💬</span> WhatsApp Nicola</a>
                <a href="https://wa.me/393205730466" target="_blank" class="contact-link"><span>💬</span> WhatsApp Raffaele</a>
                <div class="h-px bg-zinc-800 my-2"></div>
                <a href="tel:3662127916" class="contact-link"><span>📞</span> Chiama Nicola</a>
                <a href="tel:3205730466" class="contact-link"><span>📞</span> Chiama Raffaele</a>
                <div class="h-px bg-zinc-800 my-2"></div>
                <a href="mailto:info@delgrossoviaggi.it" class="contact-link"><span>✉️</span> Invia Email</a>
            </div>
        </div>
    </nav>

    <header class="py-24 text-center px-4 max-w-4xl mx-auto">
        <p class="text-blue-500 font-black uppercase tracking-[0.6em] text-[10px] mb-6">Gallery</p>
        <h1 class="text-6xl md:text-9xl font-black uppercase italic tracking-tighter leading-[0.8] mb-8">
            PARTY <br><span class="text-blue-600">ON THE ROAD</span>
        </h1>
        <p class="text-zinc-500 uppercase text-[11px] tracking-[0.4em]">I momenti più esclusivi a bordo del Limousine Bus.</p>
    </header>

    <main class="max-w-7xl mx-auto px-6 pb-40">
        <div id="grid-eventi" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12 text-center"></div>
    </main>

    <footer class="py-12 border-t border-zinc-900 text-center">
        <img src="logo.JPEG" class="h-8 mx-auto mb-6 brightness-0 invert opacity-20">
        <p class="text-zinc-600 text-[10px] font-black uppercase tracking-[0.5em]">Del Grosso Viaggi © 2026</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js"></script>
    <script>
        const S_URL = "https://exphxbeqwpwrsigdmilc.supabase.co";
        const S_KEY = "sb_publishable_jEq6R22qxk2SHGI5YEmEow_SfZG7j8c";
        const sb = supabase.createClient(S_URL, S_KEY);

        function toggleContacts() {
            const menu = document.getElementById('contactMenu');
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
        }

        window.onclick = function(event) {
            if (!event.target.matches('button')) {
                const menu = document.getElementById('contactMenu');
                if (menu && menu.style.display === 'block') menu.style.display = 'none';
            }
        }

        // Funzione per capire se è un video
        function isVideo(url) {
            const videoExts = ['mp4', 'mov', 'avi', 'webm', 'm4v'];
            const ext = url.split('.').pop().toLowerCase().split('?')[0];
            return videoExts.includes(ext);
        }

        async function caricaEventi() {
            const grid = document.getElementById('grid-eventi');
            try {
                const { data, error } = await sb.from('gallery_eventi').select('*').order('created_at', {ascending: false});
                if (error) throw error;

                if(data && data.length > 0) {
                    grid.innerHTML = data.map(ev => {
                        const galleryHtml = ev.foto_urls.map((url, index) => {
                            const video = isVideo(url);
                            // Se è video aggiungiamo la classe glightbox specifica
                            return `<a href="${url}" class="glightbox-${ev.id} ${index === 0 ? '' : 'hidden'}" 
                                       data-gallery="gallery-${ev.id}" 
                                       ${video ? 'data-type="video"' : ''}></a>`;
                        }).join('');

                        return `
                            <div class="event-card group shadow-2xl" onclick="apriAlbum('${ev.id}')">
                                ${galleryHtml}
                                <div class="event-overlay">
                                    <h2 class="text-3xl font-black uppercase italic leading-none group-hover:tracking-wider transition-all duration-500">${ev.titolo}</h2>
                                    <div class="flex justify-between items-center mt-6 pt-4 border-t border-white/10">
                                        <p class="text-[10px] text-blue-500 font-black uppercase tracking-widest">${ev.foto_urls.length} Multimedia</p>
                                        <span class="text-white font-black text-[10px] uppercase tracking-widest">Guarda →</span>
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('');

                    data.forEach(ev => {
                        GLightbox({ 
                            selector: `.glightbox-${ev.id}`,
                            loop: true,
                            autoplayVideos: true,
                            plyr: { config: { ratio: '9:16', muted: false, hideControls: false } }
                        });
                    });
                } else {
                    grid.innerHTML = `<p class="col-span-full text-center opacity-40 font-black uppercase tracking-widest">In attesa del prossimo party...</p>`;
                }
            } catch (err) {
                grid.innerHTML = `<p class="col-span-full text-center text-red-500 uppercase">Errore dati.</p>`;
            }
        }

        function apriAlbum(id) {
            const primoLink = document.querySelector(`.glightbox-${id}`);
            if(primoLink) primoLink.click();
        }

        caricaEventi();
    </script>
</body>
</html>
