<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Master Admin - Del Grosso Viaggi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const passAttesa = "Delgrosso@26";
        if (sessionStorage.getItem("admin_auth") !== "true") {
            const acc = prompt("Password Amministratore:");
            if (acc === passAttesa) { sessionStorage.setItem("admin_auth", "true"); }
            else { window.location.href = "index.html"; }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f4f7fa; }
        .card-adm { @apply bg-white p-6 rounded-[2.5rem] shadow-sm border-t-8 mb-6; }
        input, select, textarea { @apply w-full p-3 bg-gray-50 border-2 border-gray-100 rounded-xl font-bold mb-3 outline-none focus:border-blue-500; }
        label { @apply text-[10px] font-black uppercase text-gray-400 ml-1 mb-1 block; }
        
        /* BUS GRID STYLE */
        .bus-container { background: #e5e7eb; padding: 20px 10px; border-radius: 35px; border: 4px solid #d1d5db; display: inline-block; }
        .bus-grid { display: grid; grid-template-columns: repeat(5, 35px); gap: 8px; justify-content: center; }
        .seat { width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-size: 10px; font-weight: 900; cursor: pointer; transition: 0.2s; border: 2px solid transparent; }
        .seat.available { background: white; color: #555; border-color: #eee; }
        .seat.selected { background: #2563eb; color: white; transform: scale(1.1); }
        .seat.occupied { background: #9ca3af; color: white; cursor: not-allowed; opacity: 0.6; }
        .corridor { width: 35px; height: 35px; }
    </style>
</head>
<body class="pb-24">

    <nav class="bg-black text-white p-4 sticky top-0 z-50 flex justify-between items-center border-b-2 border-blue-600 shadow-xl">
        <div class="flex items-center gap-2">
            <img src="logo.jpg.JPEG" class="h-8 w-auto bg-white p-1 rounded">
            <h1 class="font-black uppercase italic text-blue-500 text-sm">Gestione Totale 2026</h1>
        </div>
        <a href="index.html" class="bg-red-600 px-4 py-2 rounded-lg text-[10px] font-black uppercase">Esci</a>
    </nav>

    <div class="max-w-7xl mx-auto p-4 mt-6 grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <div class="lg:col-span-7">
            
            <div class="card-adm border-green-500">
                <h2 class="font-black uppercase italic mb-6 text-green-700 text-xl">📋 Inserimento Manuale</h2>
                <input type="text" id="p-nome" placeholder="NOME E COGNOME">
                <label>Scegli Viaggio</label>
                <select id="p-tratta" onchange="generaPiantina(this.value)">
                    <option value="">Caricamento viaggi...</option>
                </select>

                <div id="box-piantina" class="hidden my-6 text-center">
                    <div class="bus-container"><div id="grid-posti" class="bus-grid"></div></div>
                    <p class="mt-4 font-black text-blue-600">Posti selezionati: <span id="p-selezionati-label">Nessuno</span></p>
                </div>
                <button onclick="salvaPreno()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-black uppercase text-xs shadow-lg">Conferma Prenotazione</button>
            </div>

            <div class="card-adm border-blue-500">
                <h2 class="font-black uppercase italic mb-6 text-blue-700">👥 Registro Passeggeri (Tutti)</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-[11px]">
                        <thead>
                            <tr class="bg-gray-100 font-black uppercase text-gray-500">
                                <th class="p-3">Passeggero</th>
                                <th class="p-3">Posti</th>
                                <th class="p-3 text-right">Azioni</th>
                            </tr>
                        </thead>
                        <tbody id="lista-p"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="lg:col-span-5 space-y-6">
            
            <div class="card-adm border-black">
                <h2 class="font-black uppercase italic mb-4">🚌 Nuova Locandina Viaggio</h2>
                <input type="text" id="v-titolo" placeholder="Destinazione (es. Gardaland)">
                <select id="v-bus-mod">
                    <option value="53">GT 53 POSTI</option>
                    <option value="63">GT 63 POSTI</option>
                    <option value="1">LIMOBUS</option>
                </select>
                <label>Immagine Locandina</label>
                <input type="file" id="v-file" accept="image/*">
                <button onclick="salvaLocandina()" class="w-full bg-black text-white py-3 rounded-xl font-black uppercase text-[10px]">Pubblica Viaggio</button>
            </div>

            <div class="card-adm border-orange-500">
                <h2 class="font-black uppercase italic mb-4 text-orange-600">📊 Stato Bus</h2>
                <div id="stato-bus" class="space-y-2"></div>
            </div>

            <div class="card-adm border-indigo-500">
                <h2 class="font-black uppercase italic mb-4 text-indigo-700">🖼️ Carousel Home</h2>
                <input type="file" id="c-file" accept="image/*">
                <button onclick="salvaCarousel()" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-black uppercase text-[10px]">Aggiungi Immagine</button>
                <div id="preview-carousel" class="grid grid-cols-3 gap-2 mt-4"></div>
            </div>
        </div>
    </div>

    <div id="modal-edit" class="fixed inset-0 bg-black/90 hidden z-[100] flex items-center justify-center p-6 backdrop-blur-md">
        <div class="bg-white rounded-[2.5rem] w-full max-w-sm p-8 shadow-2xl">
            <h3 class="font-black text-xl mb-4 uppercase italic">Modifica Prenotazione</h3>
            <label>Nome</label>
            <input type="text" id="edit-nome">
            <label>Posti (separati da virgola)</label>
            <input type="text" id="edit-posti">
            <div class="flex gap-2">
                <button onclick="chiudiEdit()" class="flex-1 bg-gray-100 py-4 rounded-xl font-black uppercase text-[10px]">Annulla</button>
                <button onclick="confermaModifica()" class="flex-1 bg-blue-600 text-white py-4 rounded-xl font-black uppercase text-[10px]">Salva</button>
            </div>
        </div>
    </div>

    <script>
        const S_URL = "https://exphxbeqwpwrsigdmilc.supabase.co";
        const S_KEY = "sb_publishable_jEq6R22qxk2SHGI5YEmEow_SfZG7j8c";
        const sb = supabase.createClient(S_URL, S_KEY);

        let postiSelezionati = [];
        let mappaConfig = {}; 
        let idEdit = null;

        async function init() {
            const { data: tratte } = await sb.from('tratte').select('*').order('created_at', {ascending: false});
            const { data: preno } = await sb.from('prenotazioni').select('*').order('created_at', {ascending: false});
            const { data: car } = await sb.from('carousel_flotta').select('*');

            // Select Tratte
            document.getElementById('p-tratta').innerHTML = '<option value="">Scegli...</option>' + tratte.map(t => {
                mappaConfig[t.id] = t.modello_bus;
                return `<option value="${t.id}">${t.titolo}</option>`;
            }).join('');

            // Registro Passeggeri (Fix: Se manca il join, cerchiamo il nome a mano)
            document.getElementById('lista-p').innerHTML = (preno || []).map(p => {
                const tNome = tratte.find(x => x.id === p.tratta_id)?.titolo || "Viaggio eliminato";
                return `
                <tr class="border-b bg-white hover:bg-gray-50 transition">
                    <td class="p-3 font-black uppercase leading-tight">${p.nome_cliente}<br><span class="text-blue-500 text-[9px]">${tNome}</span></td>
                    <td class="p-3 font-black text-blue-600">${p.posti_selezionati.join(', ')}</td>
                    <td class="p-3 text-right flex gap-1 justify-end">
                        <button onclick="apriEdit('${p.id}', '${p.nome_cliente}', '${p.posti_selezionati}')" class="bg-blue-100 text-blue-700 px-2 py-1 rounded font-bold text-[9px]">MOD</button>
                        <button onclick="elimina('prenotazioni','${p.id}')" class="bg-red-100 text-red-700 px-2 py-1 rounded font-bold text-[9px]">DEL</button>
                    </td>
                </tr>`;
            }).join('');

            // Stato Bus
            document.getElementById('stato-bus').innerHTML = tratte.map(t => {
                const occ = (preno || []).filter(p => p.tratta_id === t.id).reduce((acc, curr) => acc + curr.posti_selezionati.length, 0);
                const tot = parseInt(t.modello_bus) || 53;
                return `<div class="flex justify-between text-[10px] font-black uppercase bg-gray-50 p-2 rounded-lg border">
                    <span>${t.titolo}</span>
                    <span class="text-blue-600">${occ} / ${tot} POSTI</span>
                </div>`;
            }).join('');

            // Carousel
            document.getElementById('preview-carousel').innerHTML = (car || []).map(c => `
                <div class="relative group">
                    <img src="${c.immagine_url}" class="h-12 w-full object-cover rounded border">
                    <button onclick="elimina('carousel_flotta','${c.id}')" class="absolute inset-0 bg-red-600/80 text-white opacity-0 group-hover:opacity-100 text-[8px] font-black rounded">X</button>
                </div>`).join('');
        }

        async function generaPiantina(trattaId) {
            if(!trattaId) { document.getElementById('box-piantina').classList.add('hidden'); return; }
            const grid = document.getElementById('grid-posti');
            document.getElementById('box-piantina').classList.remove('hidden');
            grid.innerHTML = '';
            
            const { data: giaOccupati } = await sb.from('prenotazioni').select('posti_selezionati').eq('tratta_id', trattaId);
            const occ = giaOccupati ? giaOccupati.flatMap(p => p.posti_selezionati.map(String)) : [];
            const cap = parseInt(mappaConfig[trattaId]) || 53;

            postiSelezionati = [];
            document.getElementById('p-selezionati-label').innerText = "Nessuno";

            for (let i = 1; i <= cap; i++) {
                if (i % 4 === 1 && i > 1 && i <= (cap - 5)) { grid.appendChild(Object.assign(document.createElement('div'), {className:'corridor'})); }
                const s = String(i);
                const isOcc = occ.includes(s);
                const div = document.createElement('div');
                div.className = `seat ${isOcc ? 'occupied' : 'available'}`;
                div.innerText = i;
                if (!isOcc) div.onclick = () => {
                    div.classList.toggle('selected');
                    if(div.classList.contains('selected')) postiSelezionati.push(s);
                    else postiSelezionati = postiSelezionati.filter(p => p !== s);
                    document.getElementById('p-selezionati-label').innerText = postiSelezionati.join(', ') || "Nessuno";
                };
                grid.appendChild(div);
            }
        }

        async function salvaLocandina() {
            const f = document.getElementById('v-file').files[0];
            if(!f) return alert("Manca foto");
            const name = `loc_${Date.now()}`;
            await sb.storage.from('foto').upload(name, f);
            const { data: { publicUrl } } = sb.storage.from('foto').getPublicUrl(name);
            await sb.from('tratte').insert([{ titolo: document.getElementById('v-titolo').value, modello_bus: document.getElementById('v-bus-mod').value, immagine_url: publicUrl }]);
            location.reload();
        }

        async function salvaPreno() {
            const nome = document.getElementById('p-nome').value;
            const tratta = document.getElementById('p-tratta').value;
            if(!nome || !tratta || postiSelezionati.length === 0) return alert("Dati mancanti!");
            await sb.from('prenotazioni').insert([{ nome_cliente: nome, tratta_id: tratta, posti_selezionati: postiSelezionati }]);
            location.reload();
        }

        function apriEdit(id, nome, posti) { idEdit = id; document.getElementById('edit-nome').value = nome; document.getElementById('edit-posti').value = posti; document.getElementById('modal-edit').classList.remove('hidden'); }
        function chiudiEdit() { document.getElementById('modal-edit').classList.add('hidden'); }
        
        async function confermaModifica() {
            const p = document.getElementById('edit-posti').value.split(',').map(x => x.trim());
            await sb.from('prenotazioni').update({ nome_cliente: document.getElementById('edit-nome').value, posti_selezionati: p }).eq('id', idEdit);
            location.reload();
        }

        async function elimina(tab, id) { if(confirm("Eliminare definitivamente?")) { await sb.from(tab).delete().eq('id', id); location.reload(); } }

        init();
    </script>
</body>
</html>
