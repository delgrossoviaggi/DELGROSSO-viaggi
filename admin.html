<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Master Admin - Del Grosso Viaggi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        if (sessionStorage.getItem("admin_auth") !== "true") {
            const pass = prompt("Password Amministratore:");
            if (pass === "Delgrosso@26") { sessionStorage.setItem("admin_auth", "true"); }
            else { window.location.href = "index.html"; }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f8fafc; color: #1e293b; overflow-x: hidden; }
        .section-card { background: white; border-radius: 2rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #f1f5f9; padding: 1.5rem; margin-bottom: 1.5rem; }
        .input-style { width: 100%; padding: 0.75rem; background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 0.75rem; font-weight: 700; margin-bottom: 0.75rem; outline: none; font-size: 0.875rem; }
        .btn-action { width: 100%; padding: 0.8rem; border-radius: 0.75rem; font-weight: 900; text-transform: uppercase; font-size: 10px; transition: all 0.2s; cursor: pointer; border:none; }
        .progress-bar-container { width: 100%; background-color: #e2e8f0; border-radius: 9999px; height: 8px; overflow: hidden; margin: 10px 0; }
        .progress-bar-fill { height: 100%; width: 0%; transition: width 0.3s ease; }
        .thumb-edit { position: relative; flex-shrink: 0; width: 80px; height: 60px; border-radius: 10px; overflow: hidden; border: 2px solid #e5e7eb; }
        .thumb-edit img { width: 100%; height: 100%; object-fit: cover; }
        .btn-del-img { position: absolute; top: 2px; right: 2px; background: rgba(220, 38, 38, 0.9); color: white; width: 18px; height: 18px; border-radius: 50%; font-size: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body class="pb-20">

    <nav class="bg-white border-b border-gray-200 p-4 sticky top-0 z-50 shadow-sm flex justify-between items-center">
        <div class="flex items-center gap-4">
            <a href="index.html" class="bg-gray-100 p-2 px-4 rounded-xl font-black text-[10px] uppercase border">SITO</a>
            <h1 class="font-black text-xs uppercase italic">Master Admin <span class="text-blue-600">Total Cloud Sync</span></h1>
        </div>
        <button onclick="location.reload()" class="text-[9px] font-black uppercase bg-blue-50 text-blue-600 px-4 py-2 rounded-xl">Aggiorna Liste</button>
    </nav>

    <div class="max-w-7xl mx-auto p-4 md:p-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <div class="lg:col-span-4">
            <div class="section-card" style="border-top: 4px solid #2563eb;">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="font-black uppercase italic text-lg text-blue-700">Passeggeri</h2>
                    <span id="counter-preno" class="bg-blue-100 text-blue-700 text-[10px] font-black px-3 py-1 rounded-full">...</span>
                </div>
                <div id="lista-p" class="space-y-3 max-h-[1000px] overflow-y-auto pr-2"></div>
            </div>
        </div>

        <div class="lg:col-span-8 space-y-6">
            
            <div class="section-card" style="border-top: 4px solid #f97316;">
                <h2 class="font-black uppercase italic text-lg text-orange-600 mb-6">Garage Flotta</h2>
                <div class="bg-orange-50 p-4 rounded-2xl mb-6 border border-orange-100">
                    <input type="text" id="f-titolo" placeholder="NOME BUS" class="input-style uppercase">
                    <textarea id="f-desc" placeholder="DESCRIZIONE E SERVIZI..." class="input-style h-24"></textarea>
                    
                    <div id="f-edit-images-wrap" class="hidden mb-4">
                        <label class="block text-[10px] font-black text-orange-400 mb-2 uppercase italic">Gestione Foto Caricate (Clicca X per eliminare):</label>
                        <div id="f-current-photos" class="flex gap-2 overflow-x-auto pb-2"></div>
                    </div>

                    <input type="file" id="f-file" class="text-[10px] mb-2" multiple accept="image/*">
                    
                    <div id="f-upload-status" class="hidden mb-4">
                        <div class="progress-bar-container"><div id="f-progress-bar" class="progress-bar-fill bg-orange-500"></div></div>
                        <p id="f-status-text" class="text-[10px] font-black text-orange-600 text-center uppercase italic"></p>
                    </div>

                    <div class="flex gap-2">
                        <button id="btn-salva-flotta" onclick="salvaFlotta()" class="btn-action bg-orange-600 text-white flex-1">Salva Mezzo</button>
                        <button id="btn-annulla-flotta" onclick="resetFlotta()" class="hidden bg-gray-200 text-gray-500 px-6 rounded-xl font-bold uppercase text-[10px]">Annulla</button>
                    </div>
                </div>
                <div id="preview-flotta" class="space-y-2"></div>
            </div>

            <div class="section-card" style="border-top: 4px solid #3b82f6;">
                <h2 class="font-black uppercase italic text-lg text-blue-600 mb-6 italic">Carousel Home Sito</h2>
                <input type="file" id="c-file" class="text-[10px] mb-2" accept="image/*">
                <button id="btn-salva-carousel" onclick="salvaCarousel()" class="btn-action bg-blue-600 text-white">Carica Foto Slider</button>
                <div id="preview-carousel" class="mt-6 grid grid-cols-4 gap-2"></div>
            </div>

            <div class="section-card" style="border-top: 4px solid #f43f5e;">
                <h2 class="font-black uppercase italic text-lg text-rose-600 mb-6 italic">Party On The Road</h2>
                <div class="bg-rose-50 p-4 rounded-2xl mb-6 border border-rose-100">
                    <input type="text" id="g-titolo" placeholder="NOME EVENTO" class="input-style uppercase">
                    
                    <div id="g-edit-images-wrap" class="hidden mb-4">
                        <label class="block text-[10px] font-black text-rose-400 mb-2 uppercase italic">Foto nel Party (Clicca X per eliminare):</label>
                        <div id="g-current-photos" class="flex gap-2 overflow-x-auto pb-2"></div>
                    </div>

                    <input type="file" id="g-files" class="text-[10px] mb-2" multiple accept="image/*,video/*,.dng">
                    
                    <div id="g-upload-status" class="hidden mb-4">
                        <div class="progress-bar-container"><div id="g-progress-bar" class="progress-bar-fill bg-rose-500"></div></div>
                        <p id="g-status-text" class="text-[10px] font-black text-rose-600 text-center uppercase italic"></p>
                    </div>

                    <div class="flex gap-2">
                        <button id="btn-salva-gallery" onclick="salvaGallery()" class="btn-action bg-rose-600 text-white flex-1">Pubblica Album</button>
                        <button id="btn-annulla-gallery" onclick="resetGallery()" class="hidden bg-gray-200 text-gray-500 px-6 rounded-xl font-bold uppercase text-[10px]">Annulla</button>
                    </div>
                </div>
                <div id="preview-gallery" class="space-y-2"></div>
            </div>

        </div>
    </div>

    <script>
        const S_URL = "https://exphxbeqwpwrsigdmilc.supabase.co";
        const S_KEY = "sb_publishable_jEq6R22qxk2SHGI5YEmEow_SfZG7j8c";
        const sb = supabase.createClient(S_URL, S_KEY);

        let cacheV = [], cacheF = [], cacheG = [], cacheC = []; 
        let editF = null, editG = null;
        let tempGallery = [], tempFlottaImgs = [];

        async function init() {
            const { data: v } = await sb.from('tratte').select('*').order('created_at', {ascending: false});
            const { data: p } = await sb.from('prenotazioni').select('*').order('created_at', {ascending: false});
            const { data: f } = await sb.from('flotta_page').select('*').order('created_at', {ascending: false});
            const { data: g } = await sb.from('gallery_eventi').select('*').order('created_at', {ascending: false});
            const { data: c } = await sb.from('carousel_flotta').select('*').order('created_at', {ascending: false});
            
            cacheV = v || []; cacheF = f || []; cacheG = g || []; cacheC = c || [];

            document.getElementById('lista-p').innerHTML = (p || []).map(item => {
                const tr = cacheV.find(x => x.id === item.tratta_id);
                return `<div class="p-4 bg-white border rounded-2xl flex justify-between items-center shadow-sm">
                    <div class="max-w-[70%]"><div class="font-black text-[11px] uppercase">${item.nome_cliente}</div><div class="text-[9px] text-blue-600 font-bold uppercase">${tr ? tr.titolo : 'N/A'}</div><div class="text-[10px] text-gray-400 font-black">POSTI: ${item.posti_selezionati.join(', ')}</div></div>
                    <button onclick="elimina('prenotazioni','${item.id}')" class="bg-red-50 text-red-600 font-black text-[9px] p-2 rounded-lg">ELIMINA</button>
                </div>`;
            }).join('');

            document.getElementById('preview-flotta').innerHTML = cacheF.map(bus => `
                <div class="flex items-center gap-3 p-3 bg-white border rounded-xl shadow-sm">
                    <img src="${bus.immagine_url}" class="w-14 h-10 object-cover rounded-lg border">
                    <div class="flex-1 font-black text-[9px] uppercase">${bus.titolo}</div>
                    <div class="flex gap-1">
                        <button onclick="caricaModificaFlotta('${bus.id}')" class="bg-blue-50 text-blue-600 font-black text-[9px] p-2 rounded-lg">MOD</button>
                        <button onclick="elimina('flotta_page','${bus.id}')" class="bg-red-50 text-red-600 font-black text-[9px] p-2 rounded-lg">×</button>
                    </div>
                </div>`).join('');

            document.getElementById('preview-carousel').innerHTML = cacheC.map(img => `
                <div class="relative h-16 rounded-xl overflow-hidden border group">
                    <img src="${img.immagine_url}" class="w-full h-full object-cover">
                    <button onclick="elimina('carousel_flotta','${img.id}')" class="absolute inset-0 bg-red-600/80 text-white font-black text-[8px] opacity-0 group-hover:opacity-100 uppercase italic">Elimina</button>
                </div>`).join('');

            document.getElementById('preview-gallery').innerHTML = cacheG.map(ev => `
                <div class="flex items-center gap-3 p-3 bg-white border rounded-xl shadow-sm">
                    <img src="${ev.foto_urls[0]}" class="w-10 h-10 rounded-lg object-cover">
                    <div class="flex-1 font-black text-[9px] uppercase">${ev.titolo} (${ev.foto_urls.length})</div>
                    <div class="flex gap-1">
                        <button onclick="caricaModificaGallery('${ev.id}')" class="bg-rose-50 text-rose-600 font-black text-[9px] p-2 rounded-lg">MOD</button>
                        <button onclick="elimina('gallery_eventi','${ev.id}')" class="bg-red-50 text-red-600 font-black text-sm p-1 rounded-lg">×</button>
                    </div>
                </div>`).join('');

            document.getElementById('counter-preno').innerText = (p || []).length + " CLIENTI";
        }

        // --- GESTIONE FLOTTA ---
        function caricaModificaFlotta(id) {
            const bus = cacheF.find(x => x.id === id);
            editF = id;
            document.getElementById('f-titolo').value = bus.titolo;
            document.getElementById('f-desc').value = bus.descrizione;
            document.getElementById('btn-annulla-flotta').classList.remove('hidden');
            document.getElementById('btn-salva-flotta').innerText = "AGGIORNA MEZZO";
            
            tempFlottaImgs = [bus.immagine_url, ...(bus.foto_urls || [])];
            renderEditPhotos('f', tempFlottaImgs);
            window.scrollTo({top: document.getElementById('f-titolo').offsetTop - 100, behavior: 'smooth'});
        }

        async function salvaFlotta() {
            const t = document.getElementById('f-titolo').value.toUpperCase().trim();
            const d = document.getElementById('f-desc').value.trim();
            const files = document.getElementById('f-file').files;
            if(!t) return alert("Inserisci nome bus!");

            const btn = document.getElementById('btn-salva-flotta');
            btn.disabled = true;
            document.getElementById('f-upload-status').classList.remove('hidden');

            try {
                let gallery = editF ? [...tempFlottaImgs] : [];
                for(let i=0; i<files.length; i++) {
                    const percent = Math.round(((i + 1) / files.length) * 100);
                    document.getElementById('f-progress-bar').style.width = percent + '%';
                    document.getElementById('f-status-text').innerText = `UPLOAD ${i+1}/${files.length}`;
                    const name = `bus_${Date.now()}_${i}`;
                    await sb.storage.from('foto').upload(name, files[i]);
                    gallery.push(sb.storage.from('foto').getPublicUrl(name).data.publicUrl);
                }

                if(gallery.length === 0) return alert("Scegli almeno una foto!");
                
                const copertina = gallery[0];
                const restanti = gallery.slice(1);

                const obj = { titolo: t, descrizione: d, immagine_url: copertina, foto_urls: restanti };
                const { error } = editF ? await sb.from('flotta_page').update(obj).eq('id', editF) : await sb.from('flotta_page').insert([obj]);
                if(error) throw error;
                location.reload();
            } catch (err) { alert(err.message); btn.disabled = false; }
        }

        // --- GESTIONE PARTY ---
        function caricaModificaGallery(id) {
            const ev = cacheG.find(x => x.id === id);
            editG = id;
            document.getElementById('g-titolo').value = ev.titolo;
            document.getElementById('btn-annulla-gallery').classList.remove('hidden');
            document.getElementById('btn-salva-gallery').innerText = "AGGIORNA ALBUM";
            
            tempGallery = [...ev.foto_urls];
            renderEditPhotos('g', tempGallery);
            window.scrollTo({top: document.getElementById('g-titolo').offsetTop - 100, behavior: 'smooth'});
        }

        async function salvaGallery() {
            const t = document.getElementById('g-titolo').value.toUpperCase().trim();
            const files = document.getElementById('g-files').files;
            if(!t) return alert("Inserisci titolo!");

            const btn = document.getElementById('btn-salva-gallery');
            btn.disabled = true;
            document.getElementById('g-upload-status').classList.remove('hidden');

            try {
                let urls = editG ? [...tempGallery] : [];
                for(let i=0; i<files.length; i++) {
                    const percent = Math.round(((i + 1) / files.length) * 100);
                    document.getElementById('g-progress-bar').style.width = percent + '%';
                    document.getElementById('g-status-text').innerText = `CARICAMENTO ${i+1}/${files.length}`;
                    const name = `party_${Date.now()}_${i}`;
                    await sb.storage.from('foto').upload(name, files[i]);
                    urls.push(sb.storage.from('foto').getPublicUrl(name).data.publicUrl);
                }

                if(urls.length === 0) return alert("Aggiungi foto!");

                const obj = { titolo: t, foto_urls: urls };
                const { error } = editG ? await sb.from('gallery_eventi').update(obj).eq('id', editG) : await sb.from('gallery_eventi').insert([obj]);
                if(error) throw error;
                location.reload();
            } catch (err) { alert(err.message); btn.disabled = false; }
        }

        // --- FUNZIONI COMUNI ---
        function renderEditPhotos(type, array) {
            const container = document.getElementById(`${type}-current-photos`);
            document.getElementById(`${type}-edit-images-wrap`).classList.remove('hidden');
            container.innerHTML = array.map((url, i) => `
                <div class="thumb-edit">
                    <img src="${url}">
                    <div class="btn-del-img" onclick="rimuoviImmagineSingola('${type}', ${i})">×</div>
                </div>
            `).join('');
        }

        function rimuoviImmagineSingola(type, index) {
            if(!confirm("Vuoi rimuovere questa foto dall'elenco? (Dovrai cliccare Salva per confermare)")) return;
            if(type === 'f') { tempFlottaImgs.splice(index, 1); renderEditPhotos('f', tempFlottaImgs); }
            else { tempGallery.splice(index, 1); renderEditPhotos('g', tempGallery); }
        }

        async function salvaCarousel() {
            const f = document.getElementById('c-file').files[0];
            if(!f) return alert("Scegli foto!");
            const name = `car_${Date.now()}`;
            await sb.storage.from('foto').upload(name, f);
            await sb.from('carousel_flotta').insert([{ immagine_url: sb.storage.from('foto').getPublicUrl(name).data.publicUrl }]);
            location.reload();
        }

        function resetFlotta() { location.reload(); }
        function resetGallery() { location.reload(); }
        async function elimina(tab, id) { if(confirm("Sei sicuro di voler eliminare definitivamente?")) { await sb.from(tab).delete().eq('id', id); init(); } }

        init();
    </script>
</body>
</html>
