<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Master Admin - Del Grosso Viaggi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        if (sessionStorage.getItem("admin_auth") !== "true") {
            const pass = prompt("Password Amministratore:");
            if (pass === "Delgrosso@26") { sessionStorage.setItem("admin_auth", "true"); }
            else { window.location.href = "index.html"; }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f8fafc; color: #1e293b; overflow-x: hidden; }
        .section-card { background: white; border-radius: 2rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #f1f5f9; padding: 1.5rem; margin-bottom: 1.5rem; }
        .input-style { width: 100%; padding: 0.75rem; background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 0.75rem; font-weight: 700; margin-bottom: 0.75rem; outline: none; font-size: 0.875rem; }
        .bus-grid { display: grid; grid-template-columns: repeat(5, 35px); gap: 8px; justify-content: center; }
        .btn-action { width: 100%; padding: 0.8rem; border-radius: 0.75rem; font-weight: 900; text-transform: uppercase; font-size: 10px; transition: all 0.2s; cursor: pointer; border:none; }
        .preview-media { width: 56px; height: 40px; border-radius: 8px; object-fit: cover; background: #000; display: flex; align-items: center; justify-content: center; font-size: 8px; color: white; overflow: hidden; }
        .progress-bar-container { width: 100%; background-color: #e2e8f0; border-radius: 9999px; height: 8px; overflow: hidden; margin: 10px 0; }
        .progress-bar-fill { background-color: #f97316; height: 100%; width: 0%; transition: width 0.3s ease; }
    </style>
</head>
<body class="pb-20">

    <nav class="bg-white border-b border-gray-200 p-4 sticky top-0 z-50 shadow-sm flex justify-between items-center">
        <div class="flex items-center gap-4">
            <a href="index.html" class="bg-gray-100 p-2 px-4 rounded-xl font-black text-[10px] uppercase border">SITO</a>
            <h1 class="font-black text-xs uppercase italic">Master Admin <span class="text-blue-600">Total Cloud Sync</span></h1>
        </div>
        <button onclick="location.reload()" class="text-[9px] font-black uppercase bg-blue-50 text-blue-600 px-4 py-2 rounded-xl">Aggiorna Liste</button>
    </nav>

    <div class="max-w-7xl mx-auto p-4 md:p-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <div class="lg:col-span-5">
            <div class="section-card" style="border-top: 4px solid #2563eb;">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="font-black uppercase italic text-lg text-blue-700">Passeggeri</h2>
                    <span id="counter-preno" class="bg-blue-100 text-blue-700 text-[10px] font-black px-3 py-1 rounded-full">...</span>
                </div>
                <div id="lista-p" class="space-y-3 max-h-[1000px] overflow-y-auto pr-2"></div>
            </div>
        </div>

        <div class="lg:col-span-7 space-y-6">
            
            <div class="section-card" style="border-top: 4px solid #f97316;">
                <h2 class="font-black uppercase italic text-lg text-orange-600 mb-6">Garage Flotta</h2>
                
                <div class="bg-orange-50 p-4 rounded-2xl mb-6 border border-orange-100">
                    <input type="text" id="f-titolo" placeholder="NOME BUS (ES. SETRA S515 HD)" class="input-style uppercase">
                    <textarea id="f-desc" placeholder="DESCRIZIONE E SERVIZI (Wi-Fi, Prese USB, ecc...)" class="input-style h-24"></textarea>
                    
                    <div class="mb-4">
                        <label class="block text-[10px] font-black text-gray-400 mb-1 uppercase">Aggiungi Nuove Foto al Mezzo:</label>
                        <input type="file" id="f-file" class="text-[10px]" multiple accept="image/*">
                    </div>

                    <div id="current-bus-photos-label" class="hidden text-[10px] font-black text-orange-400 uppercase mb-2">Foto attuali in memoria:</div>
                    <div id="current-bus-photos" class="flex gap-2 overflow-x-auto pb-4 mb-4"></div>

                    <div id="f-upload-status" class="hidden mb-4">
                        <div class="progress-bar-container"><div id="f-progress-bar" class="progress-bar-fill"></div></div>
                        <p id="f-status-text" class="text-[10px] font-black text-orange-600 italic text-center"></p>
                    </div>

                    <div class="flex gap-2">
                        <button id="btn-salva-flotta" onclick="salvaFlotta()" class="btn-action bg-orange-600 text-white flex-1">Salva / Aggiorna Mezzo</button>
                        <button id="btn-annulla-flotta" onclick="resetFlotta()" class="hidden bg-gray-200 text-gray-500 px-6 rounded-xl font-bold uppercase text-[10px]">Annulla</button>
                    </div>
                </div>

                <div id="preview-flotta" class="mt-6 space-y-2"></div>
            </div>

            <div class="section-card" style="border-top: 4px solid #3b82f6;">
                <h2 class="font-black uppercase italic text-lg text-blue-600 mb-6 italic">Carousel Home Sito</h2>
                <input type="file" id="c-file" class="text-[10px] mb-2" accept="image/*">
                <button id="btn-salva-carousel" onclick="salvaCarousel()" class="btn-action bg-blue-600 text-white">Carica Foto Slider</button>
                <div id="preview-carousel" class="mt-6 grid grid-cols-4 gap-2"></div>
            </div>

            <div class="section-card" style="border-top: 4px solid #f43f5e;">
                <h2 class="font-black uppercase italic text-lg text-rose-600 mb-6 italic">Party On The Road</h2>
                <input type="text" id="g-titolo" placeholder="NOME EVENTO" class="input-style uppercase">
                <input type="file" id="g-files" class="text-[10px] mb-2" multiple accept="image/*,video/*,.dng">
                <button id="btn-salva-gallery" onclick="salvaGallery()" class="btn-action bg-rose-600 text-white">Pubblica Album</button>
                <div id="preview-gallery" class="mt-6 space-y-2"></div>
            </div>

        </div>
    </div>

    <script>
        const S_URL = "https://exphxbeqwpwrsigdmilc.supabase.co";
        const S_KEY = "sb_publishable_jEq6R22qxk2SHGI5YEmEow_SfZG7j8c";
        const sb = supabase.createClient(S_URL, S_KEY);

        let cacheV = [], cacheF = [], cacheG = [], cacheC = []; 
        let editF = null;

        async function init() {
            const { data: v } = await sb.from('tratte').select('*').order('created_at', {ascending: false});
            const { data: p } = await sb.from('prenotazioni').select('*').order('created_at', {ascending: false});
            const { data: f } = await sb.from('flotta_page').select('*').order('created_at', {ascending: false});
            const { data: g } = await sb.from('gallery_eventi').select('*').order('created_at', {ascending: false});
            const { data: c } = await sb.from('carousel_flotta').select('*').order('created_at', {ascending: false});
            
            cacheV = v || []; cacheF = f || []; cacheG = g || []; cacheC = c || [];

            // Passeggeri
            document.getElementById('lista-p').innerHTML = (p || []).map(item => {
                const tr = cacheV.find(x => x.id === item.tratta_id);
                return `<div class="p-4 bg-white border rounded-2xl flex justify-between items-center shadow-sm">
                    <div><div class="font-black text-[11px] uppercase">${item.nome_cliente}</div><div class="text-[9px] text-blue-600 font-bold uppercase">${tr ? tr.titolo : 'N/A'}</div><div class="text-[10px] text-gray-400 font-black">POSTI: ${item.posti_selezionati.join(', ')}</div></div>
                    <button onclick="elimina('prenotazioni','${item.id}')" class="bg-red-50 text-red-600 font-black text-[9px] p-2 rounded-lg">X</button>
                </div>`;
            }).join('');

            // Flotta con funzione MOD
            document.getElementById('preview-flotta').innerHTML = cacheF.map(bus => `
                <div class="flex items-center gap-3 p-3 bg-white border rounded-xl shadow-sm">
                    <img src="${bus.immagine_url}" class="w-14 h-10 object-cover rounded-lg border">
                    <div class="flex-1 font-black text-[9px] uppercase">${bus.titolo} (${(bus.foto_urls || []).length + 1} Foto)</div>
                    <div class="flex gap-1">
                        <button onclick="caricaModificaFlotta('${bus.id}')" class="bg-blue-50 text-blue-600 font-black text-[9px] p-2 rounded-lg">MOD</button>
                        <button onclick="elimina('flotta_page','${bus.id}')" class="bg-red-50 text-red-600 font-black text-[9px] p-2 rounded-lg">×</button>
                    </div>
                </div>`).join('');

            // Carousel
            document.getElementById('preview-carousel').innerHTML = cacheC.map(img => `
                <div class="relative h-16 rounded-xl overflow-hidden border group">
                    <img src="${img.immagine_url}" class="w-full h-full object-cover">
                    <button onclick="elimina('carousel_flotta','${img.id}')" class="absolute inset-0 bg-red-600/80 text-white font-black text-[8px] opacity-0 group-hover:opacity-100 uppercase">Elimina</button>
                </div>`).join('');

            // Gallery
            document.getElementById('preview-gallery').innerHTML = cacheG.map(ev => `
                <div class="flex items-center gap-3 p-3 bg-white border rounded-xl shadow-sm">
                    <img src="${ev.foto_urls[0]}" class="w-10 h-10 rounded-lg object-cover">
                    <div class="flex-1 font-black text-[9px] uppercase">${ev.titolo}</div>
                    <button onclick="elimina('gallery_eventi','${ev.id}')" class="bg-red-50 text-red-600 font-black text-[9px] p-2 rounded-lg">×</button>
                </div>`).join('');

            document.getElementById('counter-preno').innerText = (p || []).length + " CLIENTI";
        }

        // LOGICA GARAGE FLOTTA AVANZATA
        function caricaModificaFlotta(id) {
            const bus = cacheF.find(x => x.id === id);
            editF = id;
            document.getElementById('f-titolo').value = bus.titolo;
            document.getElementById('f-desc').value = bus.descrizione;
            document.getElementById('btn-salva-flotta').innerText = "AGGIORNA MEZZO";
            document.getElementById('btn-annulla-flotta').classList.remove('hidden');
            
            const photoArea = document.getElementById('current-bus-photos');
            document.getElementById('current-bus-photos-label').classList.remove('hidden');
            const allPhotos = [bus.immagine_url, ...(bus.foto_urls || [])];
            photoArea.innerHTML = allPhotos.map(url => `<img src="${url}" class="h-16 w-20 object-cover rounded-lg border shadow-sm shrink-0">`).join('');
            
            window.scrollTo({top: document.getElementById('f-titolo').offsetTop - 100, behavior: 'smooth'});
        }

        function resetFlotta() {
            editF = null;
            document.getElementById('f-titolo').value = '';
            document.getElementById('f-desc').value = '';
            document.getElementById('f-file').value = '';
            document.getElementById('current-bus-photos').innerHTML = '';
            document.getElementById('current-bus-photos-label').classList.add('hidden');
            document.getElementById('btn-salva-flotta').innerText = "SALVA MEZZO";
            document.getElementById('btn-annulla-flotta').classList.add('hidden');
            document.getElementById('f-upload-status').classList.add('hidden');
        }

        async function salvaFlotta() {
            const t = document.getElementById('f-titolo').value.toUpperCase().trim();
            const d = document.getElementById('f-desc').value.trim();
            const files = document.getElementById('f-file').files;
            const statusArea = document.getElementById('f-upload-status');
            const progressBar = document.getElementById('f-progress-bar');
            const statusText = document.getElementById('f-status-text');

            if(!t) return alert("Inserisci il nome del mezzo!");
            
            const btn = document.getElementById('btn-salva-flotta');
            btn.disabled = true;
            
            try {
                let currentBus = editF ? cacheF.find(x => x.id === editF) : null;
                let copertina = currentBus ? currentBus.immagine_url : null;
                let gallery = currentBus ? (currentBus.foto_urls || []) : [];

                if(files.length > 0) {
                    statusArea.classList.remove('hidden');
                    for(let i = 0; i < files.length; i++) {
                        const percent = Math.round(((i + 1) / files.length) * 100);
                        progressBar.style.width = percent + '%';
                        statusText.innerText = `CARICAMENTO FOTO ${i+1}/${files.length}`;
                        
                        const ext = files[i].name.split('.').pop();
                        const name = `bus_${Date.now()}_${i}.${ext}`;
                        await sb.storage.from('foto').upload(name, files[i]);
                        const url = sb.storage.from('foto').getPublicUrl(name).data.publicUrl;
                        
                        if(!copertina && i === 0) copertina = url; else gallery.push(url);
                    }
                }

                if(!copertina) { btn.disabled = false; return alert("Carica almeno una foto!"); }

                const obj = { titolo: t, descrizione: d, immagine_url: copertina, foto_urls: gallery };
                const { error } = editF ? await sb.from('flotta_page').update(obj).eq('id', editF) : await sb.from('flotta_page').insert([obj]);

                if(error) throw error;
                location.reload();
            } catch (err) {
                alert("Errore: " + err.message);
                btn.disabled = false;
            }
        }

        // CAROUSEL & GALLERY
        async function salvaCarousel() {
            const f = document.getElementById('c-file').files[0];
            if(!f) return alert("Scegli una foto!");
            const name = `car_${Date.now()}`;
            await sb.storage.from('foto').upload(name, f);
            const url = sb.storage.from('foto').getPublicUrl(name).data.publicUrl;
            await sb.from('carousel_flotta').insert([{ immagine_url: url }]);
            location.reload();
        }

        async function salvaGallery() {
            const t = document.getElementById('g-titolo').value.toUpperCase().trim();
            const files = document.getElementById('g-files').files;
            if(!t || files.length === 0) return alert("Dati mancanti!");
            let urls = [];
            for(let i = 0; i < files.length; i++) {
                const name = `party_${Date.now()}_${i}`;
                await sb.storage.from('foto').upload(name, files[i]);
                urls.push(sb.storage.from('foto').getPublicUrl(name).data.publicUrl);
            }
            await sb.from('gallery_eventi').insert([{ titolo: t, foto_urls: urls }]);
            location.reload();
        }

        async function elimina(tab, id) { if(confirm("Eliminare definitivamente?")) { await sb.from(tab).delete().eq('id', id); init(); } }

        init();
    </script>
</body>
</html>
