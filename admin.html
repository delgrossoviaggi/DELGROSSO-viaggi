<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin - Del Grosso Viaggi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script>
        // PROTEZIONE ACCESSO
        const passwordAttesa = "Delgrosso@26";
        let accesso = prompt("Password Amministratore:");
        if (accesso !== passwordAttesa) { window.location.href = "index.html"; }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        input, select, textarea { font-size: 16px !important; } /* Evita zoom su iOS */
        .section-card { @apply bg-white p-5 md:p-8 rounded-[2rem] shadow-sm border border-gray-100 transition-all; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen pb-20">

    <nav class="bg-black text-white p-4 sticky top-0 z-50 flex justify-between items-center shadow-lg border-b-2 border-blue-600">
        <div class="flex flex-col">
            <h1 class="font-black text-[10px] md:text-xs uppercase tracking-widest italic text-blue-500">Del Grosso</h1>
            <span class="text-[8px] uppercase font-bold text-gray-400">Control Panel 2026</span>
        </div>
        <div class="flex gap-2">
             <button onclick="exportExcel()" class="bg-green-600 hover:bg-green-700 text-white px-3 py-2 rounded-xl text-[10px] font-black uppercase transition">Excel</button>
             <a href="index.html" class="bg-red-600 hover:bg-red-700 px-3 py-2 rounded-xl text-[10px] font-black uppercase transition text-center">Esci</a>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto p-4 md:p-8 space-y-8">

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            
            <div class="section-card border-t-8 border-purple-600">
                <h2 class="font-black text-purple-900 mb-4 text-lg italic uppercase flex items-center gap-2">
                    <span>🚌</span> Dettagli & Foto Bus
                </h2>
                <div class="space-y-4">
                    <select id="select-bus-edit" class="w-full p-4 border rounded-2xl bg-purple-50 font-bold outline-none focus:ring-2 focus:ring-purple-400" onchange="caricaDatiBus(this.value)">
                        <option value="bus_gt">Autobus Gran Turismo</option>
                        <option value="limobus">Limousine Bus</option>
                    </select>
                    <div class="bg-gray-50 p-4 rounded-2xl border border-dashed border-purple-200">
                        <label class="block text-[10px] font-black text-purple-600 mb-2 uppercase">Nuova Foto Copertina Mezzo:</label>
                        <input type="file" id="bus-file-edit" accept="image/*" class="w-full text-xs text-gray-500 file:mr-3 file:py-2 file:px-4 file:rounded-full file:bg-purple-600 file:text-white file:border-0 file:font-bold">
                    </div>
                    <textarea id="bus-desc-edit" placeholder="Scrivi qui la descrizione..." class="w-full p-4 border rounded-2xl text-sm h-32 outline-none focus:ring-2 focus:ring-purple-400 font-medium"></textarea>
                    <input type="text" id="bus-servizi-edit" placeholder="Servizi (es: Bar, USB, Clima)" class="w-full p-4 border rounded-2xl text-sm font-bold">
                    <button id="btn-save-bus" onclick="salvaTuttoBus()" class="w-full bg-purple-600 hover:bg-purple-700 text-white py-4 rounded-2xl font-black uppercase tracking-widest shadow-lg active:scale-95 transition">Salva Pagina Bus</button>
                </div>
            </div>

            <div class="section-card border-t-8 border-blue-500">
                <h2 class="font-black text-blue-900 mb-4 text-lg italic uppercase flex items-center gap-2">
                    <span>📢</span> News Scorrevoli Home
                </h2>
                <div class="space-y-4">
                    <input type="text" id="avviso-titolo" placeholder="Titolo Breve" class="w-full p-4 border rounded-2xl font-bold">
                    <textarea id="avviso-testo" placeholder="Testo dell'annuncio..." class="w-full p-4 border rounded-2xl text-sm h-20"></textarea>
                    <button onclick="gestisciAvviso()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-black uppercase shadow-lg active:scale-95 transition">Pubblica News</button>
                    <div id="lista-avvisi" class="space-y-2 pt-4"></div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            
            <div class="section-card border-t-8 border-indigo-500">
                <h2 class="font-black text-indigo-900 mb-4 text-lg italic uppercase">🖼️ Foto Carousel Home</h2>
                <div class="space-y-4">
                    <input type="text" id="car-titolo" placeholder="Nome Mezzo / Foto" class="w-full p-4 border rounded-2xl font-bold">
                    <input type="file" id="car-file" accept="image/*" class="text-xs w-full">
                    <button id="btn-car" onclick="aggiungiCarousel()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-4 rounded-2xl font-black uppercase shadow-lg">Carica nel Carousel</button>
                    <div id="lista-carousel" class="mt-6 space-y-3 max-h-60 overflow-y-auto pr-2"></div>
                </div>
            </div>

            <div class="section-card border-t-8 border-gray-900">
                <h2 class="font-black text-black mb-4 text-lg italic uppercase">🚌 Nuova Locandina</h2>
                <div class="space-y-4">
                    <input type="text" id="add-titolo" placeholder="Destinazione" class="w-full p-4 border rounded-2xl font-bold">
                    <select id="add-bus" class="w-full p-4 border rounded-2xl bg-gray-50 font-bold">
                        <option value="GT 53 POSTI">GT 53 POSTI</option>
                        <option value="GT 63 POSTI">GT 63 POSTI</option>
                        <option value="LIMOBUS">LIMOBUS</option>
                    </select>
                    <input type="file" id="locandina-file" accept="image/*" class="text-xs w-full">
                    <button id="btn-viaggio" onclick="gestisciViaggio()" class="w-full bg-black hover:bg-gray-800 text-white py-4 rounded-2xl font-black uppercase shadow-lg">Crea Locandina</button>
                    <div id="lista-viaggi" class="mt-6 space-y-2 max-h-40 overflow-y-auto pr-2"></div>
                </div>
            </div>
        </div>

        <div class="section-card border-t-8 border-green-500">
            <h2 class="font-black text-green-900 mb-6 text-xl italic uppercase">📋 Registro Passeggeri</h2>
            <div class="overflow-x-auto -mx-5 md:mx-0">
                <table class="w-full text-left text-[11px] md:text-sm border-collapse min-w-[500px]">
                    <thead>
                        <tr class="bg-gray-100 text-gray-500 font-black uppercase tracking-tighter">
                            <th class="p-4 border-b">Passeggero / Tratta</th>
                            <th class="p-4 border-b">Posti</th>
                            <th class="p-4 border-b text-right">Azioni</th>
                        </tr>
                    </thead>
                    <tbody id="lista-prenotazioni"></tbody>
                </table>
            </div>
        </div>

    </div>

    <div id="modal-edit" class="fixed inset-0 bg-black/90 hidden z-[100] flex items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-white rounded-[2.5rem] w-full max-w-sm p-6 md:p-10 shadow-2xl text-center">
            <h3 class="font-black text-xl mb-2 uppercase italic">Modifica Posti</h3>
            <p id="edit-nome" class="text-blue-600 font-bold mb-6 text-sm"></p>
            <input type="text" id="edit-posti" class="w-full p-5 border-4 border-blue-50 rounded-2xl mb-8 text-center font-black text-2xl outline-none focus:border-blue-500 shadow-inner">
            <div class="flex gap-3">
                <button onclick="chiudiEdit()" class="flex-1 bg-gray-100 py-4 rounded-2xl font-black text-xs uppercase tracking-widest">Annulla</button>
                <button onclick="salvaEdit()" class="flex-1 bg-blue-600 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg">Salva</button>
            </div>
        </div>
    </div>

    <script>
        const S_URL = "https://exphxbeqwpwrsigdmilc.supabase.co";
        const S_KEY = "sb_publishable_jEq6R22qxk2SHGI5YEmEow_SfZG7j8c";
        const sb = supabase.createClient(S_URL, S_KEY);
        let idEdit = null;

        async function upload(input) {
            const file = input.files[0]; if (!file) return null;
            const fileName = `adm_2026_${Date.now()}_${file.name.replace(/[^a-zA-Z0-9.]/g, '')}`;
            const { data, error } = await sb.storage.from('immagini').upload(fileName, file);
            if (error) throw error;
            const { data: { publicUrl } } = sb.storage.from('immagini').getPublicUrl(fileName);
            return publicUrl;
        }

        async function caricaTutto() {
            caricaDatiBus('bus_gt');
            
            // News
            const { data: avv } = await sb.from('avvisi_home').select('*').order('created_at', {ascending: false});
            document.getElementById('lista-avvisi').innerHTML = avv.map(a => `<div class="flex justify-between items-center p-3 bg-blue-50 rounded-xl border border-blue-100 text-[10px] font-bold uppercase">${a.titolo} <button onclick="elimina('avvisi_home', '${a.id}')" class="bg-white text-red-500 px-2 py-1 rounded shadow-sm">ELIMINA</button></div>`).join('');

            // Carousel
            const { data: car } = await sb.from('carousel_flotta').select('*').order('created_at', {ascending: false});
            document.getElementById('lista-carousel').innerHTML = car.map(c => `
                <div class="flex justify-between items-center p-3 bg-gray-50 rounded-2xl border">
                    <img src="${c.immagine_url}" class="w-10 h-10 object-cover rounded-lg border">
                    <span class="text-[10px] font-black uppercase truncate px-2">${c.titolo}</span>
                    <button onclick="elimina('carousel_flotta', '${c.id}')" class="bg-red-50 text-red-500 font-black p-2 rounded-lg">X</button>
                </div>`).join('');

            // Viaggi
            const { data: tratte } = await sb.from('tratte').select('*').order('created_at', {ascending: false});
            document.getElementById('lista-viaggi').innerHTML = tratte.map(v => `<div class="flex justify-between p-3 bg-gray-50 rounded-xl border text-[10px] font-black uppercase">${v.titolo} <button onclick="elimina('tratte', '${v.id}')" class="text-red-500">X</button></div>`).join('');

            // Prenotazioni
            const { data: preno } = await sb.from('prenotazioni').select('*, tratte(titolo)').order('created_at', {ascending: false});
            document.getElementById('lista-prenotazioni').innerHTML = preno.map(p => `
                <tr class="border-b hover:bg-gray-50 transition">
                    <td class="p-4 font-black uppercase leading-tight text-gray-800">
                        ${p.nome_cliente}<br>
                        <span class="text-[8px] md:text-[9px] text-blue-500 tracking-wider">${p.tratte?.titolo || 'VIAGGIO ELIMINATO'}</span>
                    </td>
                    <td class="p-4 font-black text-blue-600 text-sm md:text-lg">${p.posti_selezionati.join(',')}</td>
                    <td class="p-4 text-right flex gap-3 justify-end items-center">
                        <button onclick="apriEdit('${p.id}', '${p.nome_cliente}', '${p.posti_selezionati.join(',')}')" class="bg-blue-50 text-blue-600 p-3 rounded-xl font-black text-xs border border-blue-200 shadow-sm active:scale-90">MOD</button>
                        <button onclick="elimina('prenotazioni', '${p.id}')" class="bg-red-50 text-red-600 p-3 rounded-xl font-black text-xs border border-red-200 shadow-sm active:scale-90">ELIMINA</button>
                    </td>
                </tr>`).join('');
        }

        // AZIONI BUS
        async function caricaDatiBus(id) {
            const { data } = await sb.from('dettagli_bus').select('*').eq('id', id).single();
            if(data) { document.getElementById('bus-desc-edit').value = data.descrizione_lunga; document.getElementById('bus-servizi-edit').value = data.servizi; }
        }
        async function salvaTuttoBus() {
            try {
                const btn = document.getElementById('btn-save-bus'); btn.innerText = "CARICAMENTO..."; btn.disabled = true;
                const id = document.getElementById('select-bus-edit').value;
                const img = await upload(document.getElementById('bus-file-edit'));
                const upd = { descrizione_lunga: document.getElementById('bus-desc-edit').value, servizi: document.getElementById('bus-servizi-edit').value };
                if(img) upd.immagine_url = img;
                await sb.from('dettagli_bus').update(upd).eq('id', id); alert("Dati Bus Aggiornati!"); location.reload();
            } catch (e) { alert(e.message); btn.innerText = "Salva Pagina Bus"; btn.disabled = false; }
        }

        async function gestisciAvviso() { const t = document.getElementById('avviso-titolo').value, txt = document.getElementById('avviso-testo').value; await sb.from('avvisi_home').insert([{titolo: t, testo_descrizione: txt}]); location.reload(); }
        async function aggiungiCarousel() { const img = await upload(document.getElementById('car-file')), t = document.getElementById('car-titolo').value; await sb.from('carousel_flotta').insert([{titolo: t, immagine_url: img}]); location.reload(); }
        async function gestisciViaggio() { const img = await upload(document.getElementById('locandina-file')), t = document.getElementById('add-titolo').value, b = document.getElementById('add-bus').value; await sb.from('tratte').insert([{titolo: t, immagine_url: img, modello_bus: b}]); location.reload(); }
        async function elimina(tab, id) { if(confirm("Confermi eliminazione definitiva?")) { await sb.from(tab).delete().eq('id', id); caricaTutto(); } }

        function apriEdit(id, nome, posti) { idEdit = id; document.getElementById('edit-nome').innerText = nome; document.getElementById('edit-posti').value = posti; document.getElementById('modal-edit').classList.remove('hidden'); }
        function chiudiEdit() { document.getElementById('modal-edit').classList.add('hidden'); }
        async function salvaEdit() { const nuovi = document.getElementById('edit-posti').value.split(',').map(s => s.trim()); await sb.from('prenotazioni').update({ posti_selezionati: nuovi }).eq('id', idEdit); chiudiEdit(); caricaTutto(); }

        function exportExcel() {
            const rows = [['CLIENTE', 'DESTINAZIONE', 'POSTI']];
            document.querySelectorAll('#lista-prenotazioni tr').forEach(r => {
                const td = r.querySelectorAll('td');
                if(td[0]) rows.push([td[0].innerText.split('\n')[0], td[0].innerText.split('\n')[1], td[1].innerText]);
            });
            const ws = XLSX.utils.aoa_to_sheet(rows);
            const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Lista Passeggeri");
            XLSX.writeFile(wb, "Passeggeri_DelGrosso_2026.xlsx");
        }

        caricaTutto();
    </script>
</body>
</html>
