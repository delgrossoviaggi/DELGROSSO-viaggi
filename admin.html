<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin - Del Grosso Viaggi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script>
        const passwordAttesa = "Delgrosso@26";
        let accesso = prompt("Inserisci la password:");
        if (accesso !== passwordAttesa) { window.location.href = "index.html"; }
    </script>
</head>
<body class="bg-gray-100 min-h-screen pb-10">

    <nav class="bg-gray-900 text-white p-4 sticky top-0 z-50 flex justify-between items-center shadow-md">
        <h1 class="font-bold text-sm uppercase tracking-widest">Admin Panel</h1>
        <a href="index.html" class="bg-gray-700 px-3 py-1 rounded text-xs">Esci</a>
    </nav>

    <div class="max-w-4xl mx-auto p-4 space-y-6">
        
        <div id="status-bar" class="hidden fixed top-16 left-0 w-full bg-yellow-400 text-black text-center py-2 font-bold text-sm z-50 shadow-lg">
            Attendere... Caricamento in corso ⏳
        </div>

        <div class="bg-indigo-50 p-5 rounded-2xl border border-indigo-200 shadow-sm">
            <h2 class="font-bold text-indigo-900 mb-4 flex items-center gap-2">🖼️ Nuovo Carousel</h2>
            <input type="text" id="car-titolo" placeholder="Titolo (es. Limobus)" class="w-full p-3 mb-3 border rounded-xl outline-none text-sm">
            <input type="file" id="car-file" accept="image/*" class="block w-full text-xs text-gray-500 mb-4 file:mr-3 file:py-2 file:px-4 file:rounded-full file:bg-indigo-600 file:text-white file:border-0">
            <button onclick="aggiungiCarousel()" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold active:scale-95 transition">CARICA ORA</button>
            <div id="lista-carousel" class="mt-4 space-y-2 max-h-40 overflow-y-auto"></div>
        </div>

        <div class="bg-blue-50 p-5 rounded-2xl border border-blue-200 shadow-sm">
            <h2 class="font-bold text-blue-900 mb-4">📢 Pubblica Avviso Home</h2>
            <input type="text" id="avviso-titolo" placeholder="Titolo Avviso" class="w-full p-3 mb-3 border rounded-xl text-sm">
            <textarea id="avviso-testo" placeholder="Testo avviso..." class="w-full p-3 mb-3 border rounded-xl text-sm h-24"></textarea>
            <input type="file" id="avviso-file" accept="image/*" class="text-xs mb-4">
            <button onclick="gestisciAvviso()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold active:scale-95 transition">PUBBLICA AVVISO</button>
        </div>

        <div class="bg-white p-5 rounded-2xl border shadow-sm">
            <h2 class="font-bold text-gray-800 mb-4 italic underline">➕ Nuova Locandina Viaggio</h2>
            <input type="text" id="add-titolo" placeholder="Destinazione" class="w-full p-3 mb-3 border rounded-xl text-sm">
            <select id="add-bus" class="w-full p-3 mb-3 border rounded-xl text-sm">
                <option value="GT 53 POSTI">GT 53 POSTI</option>
                <option value="GT 63 POSTI">GT 63 POSTI</option>
                <option value="LIMOBUS">LIMOBUS</option>
            </select>
            <input type="file" id="locandina-file" accept="image/*" class="text-xs mb-4">
            <button onclick="gestisciViaggio()" class="w-full bg-gray-900 text-white py-3 rounded-xl font-bold active:scale-95 transition">CREA LOCANDINA</button>
            <div id="lista-viaggi" class="mt-6 space-y-2 border-t pt-4"></div>
        </div>

        <div class="bg-white p-5 rounded-2xl border shadow-sm overflow-hidden">
            <div class="flex justify-between items-center mb-4">
                <h2 class="font-bold">📋 Prenotati</h2>
                <button onclick="exportExcel()" class="bg-green-600 text-white px-3 py-1 rounded text-xs font-bold uppercase tracking-tighter">Scarica Excel</button>
            </div>
            <div class="overflow-x-auto text-xs">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-100">
                        <tr>
                            <th class="p-2 border">Cliente</th>
                            <th class="p-2 border">Viaggio</th>
                            <th class="p-2 border">Posti</th>
                            <th class="p-2 border">Azioni</th>
                        </tr>
                    </thead>
                    <tbody id="lista-prenotazioni"></tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        const S_URL = "https://exphxbeqwpwrsigdmilc.supabase.co";
        const S_KEY = "sb_publishable_jEq6R22qxk2SHGI5YEmEow_SfZG7j8c";
        const sb = supabase.createClient(S_URL, S_KEY);

        function showStatus(show) {
            document.getElementById('status-bar').classList.toggle('hidden', !show);
        }

        async function uploadFoto(fileInput) {
            const file = fileInput.files[0];
            if (!file) return null;
            
            showStatus(true);
            // Forza formato web friendly per iPhone
            const fileName = `img_${Date.now()}.jpg`; 
            
            const { data, error } = await sb.storage.from('immagini').upload(fileName, file, {
                cacheControl: '3600',
                upsert: false
            });

            if (error) {
                alert("Errore caricamento: " + error.message);
                showStatus(false);
                return null;
            }

            const { data: { publicUrl } } = sb.storage.from('immagini').getPublicUrl(fileName);
            showStatus(false);
            return publicUrl;
        }

        async function caricaDati() {
            // Carica Carousel
            const { data: car } = await sb.from('carousel_flotta').select('*').order('created_at', {ascending: false});
            document.getElementById('lista-carousel').innerHTML = car.map(c => `<div class="flex justify-between items-center bg-white p-2 rounded border text-xs"><img src="${c.immagine_url}" class="w-8 h-8 object-cover rounded"><span>${c.titolo}</span><button onclick="eliminaCarousel('${c.id}')" class="text-red-500 font-bold">X</button></div>`).join('');

            // Carica Viaggi
            const { data: v } = await sb.from('tratte').select('*').order('created_at', {ascending: false});
            document.getElementById('lista-viaggi').innerHTML = v.map(viaggio => `<div class="flex justify-between items-center p-3 bg-gray-50 rounded-xl border text-xs"><span><strong>${viaggio.titolo}</strong> (${viaggio.modello_bus})</span><button onclick="eliminaViaggio('${viaggio.id}')" class="text-red-500 font-bold">Elimina</button></div>`).join('');

            // Carica Prenotazioni
            const { data: p } = await sb.from('prenotazioni').select('*, tratte(titolo)').order('created_at', {ascending: false});
            document.getElementById('lista-prenotazioni').innerHTML = p.map(pre => `
                <tr class="border-b">
                    <td class="p-2 border font-bold">${pre.nome_cliente}<br><span class="font-normal text-gray-400">${pre.telefono_cliente}</span></td>
                    <td class="p-2 border">${pre.tratte?.titolo || 'N/D'}</td>
                    <td class="p-2 border font-bold text-blue-600">${pre.posti_selezionati.join(',')}</td>
                    <td class="p-2 border text-center"><button onclick="eliminaPreno('${pre.id}')" class="bg-red-500 text-white px-2 py-1 rounded">X</button></td>
                </tr>`).join('');
        }

        async function aggiungiCarousel() {
            const t = document.getElementById('car-titolo').value;
            const img = await uploadFoto(document.getElementById('car-file'));
            if(t && img) { await sb.from('carousel_flotta').insert([{titolo: t, immagine_url: img}]); location.reload(); }
        }

        async function gestisciAvviso() {
            const t = document.getElementById('avviso-titolo').value, txt = document.getElementById('avviso-testo').value;
            const img = await uploadFoto(document.getElementById('avviso-file'));
            if(t && txt) { await sb.from('avvisi_home').insert([{titolo: t, testo_descrizione: txt, immagine_url: img}]); alert("Pubblicato!"); location.reload(); }
        }

        async function gestisciViaggio() {
            const t = document.getElementById('add-titolo').value, b = document.getElementById('add-bus').value;
            const img = await uploadFoto(document.getElementById('locandina-file'));
            if(t && img) { await sb.from('tratte').insert([{titolo: t, immagine_url: img, modello_bus: b}]); location.reload(); }
        }

        async function eliminaViaggio(id) { if(confirm("Eliminare?")) { await sb.from('tratte').delete().eq('id', id); location.reload(); } }
        async function eliminaCarousel(id) { if(confirm("Eliminare?")) { await sb.from('carousel_flotta').delete().eq('id', id); location.reload(); } }
        async function eliminaPreno(id) { if(confirm("Cancellare prenotazione?")) { await sb.from('prenotazioni').delete().eq('id', id); location.reload(); } }

        function exportExcel() {
            const ws = XLSX.utils.json_to_sheet(document.getElementById('lista-prenotazioni').innerText);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Passeggeri");
            XLSX.writeFile(wb, "Passeggeri_DelGrosso.xlsx");
        }

        caricaDati();
    </script>
</body>
</html>
