<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Master Admin PRO | Del Grosso Viaggi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script>
        if (sessionStorage.getItem("admin_auth") !== "true") {
            const pass = prompt("Password Amministratore:");
            if (pass === "Delgrosso@26") { sessionStorage.setItem("admin_auth", "true"); }
            else { window.location.href = "index.html"; }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; color: #1e293b; -webkit-tap-highlight-color: transparent; }
        .section-card { background: white; border-radius: 2rem; padding: 1.5rem; margin-bottom: 2rem; border: 1px solid #e2e8f0; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .input-style { width: 100%; padding: 0.8rem; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 0.75rem; font-weight: 700; margin-bottom: 0.8rem; outline: none; font-size: 16px; }
        .btn-action { width: 100%; padding: 1rem; border-radius: 1rem; font-weight: 900; text-transform: uppercase; font-size: 11px; cursor: pointer; transition: 0.2s; border: none; }
        .item-row { display: flex; align-items: center; gap: 15px; padding: 12px; background: #fff; border: 1px solid #f1f5f9; border-radius: 1rem; margin-bottom: 8px; }
        .thumb { width: 60px; height: 50px; object-fit: cover; border-radius: 8px; background: #eee; border: 1px solid #ddd; }
        .delete-btn { background: #fee2e2; color: #ef4444; font-weight: 900; padding: 8px 12px; border-radius: 10px; font-size: 11px; cursor: pointer; }
        .edit-btn { background: #dcfce7; color: #16a34a; font-weight: 900; padding: 8px 12px; border-radius: 10px; font-size: 11px; cursor: pointer; margin-right: 5px; }
        .preview-grid-item { position: relative; height: 80px; border-radius: 12px; overflow: hidden; border: 2px solid #e2e8f0; }
        .remove-photo-badge { position: absolute; top: 0; right: 0; background: #ef4444; color: white; width: 25px; height: 25px; font-size: 16px; display: flex; align-items: center; justify-content: center; border-radius: 0 0 0 10px; cursor: pointer; font-weight: bold; z-index: 10; }
    </style>
</head>
<body class="pb-20">

    <nav class="bg-white border-b p-4 sticky top-0 z-50 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-4">
            <a href="index.html" class="bg-gray-100 hover:bg-gray-200 text-gray-800 px-4 py-2 rounded-xl font-black text-[10px] uppercase transition-all flex items-center gap-2">
                <span>🏠</span> Home
            </a>
            <h1 class="font-black text-blue-600 uppercase italic text-sm">Master Admin Del Grosso</h1>
        </div>
        <div class="flex gap-2">
            <button onclick="location.reload()" class="bg-blue-600 text-white px-4 py-2 rounded-xl font-bold text-[10px] uppercase shadow-lg">Sincronizza</button>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto p-4 grid grid-cols-1 lg:grid-cols-12 gap-8">
        <div class="lg:col-span-8 space-y-6">

            <div class="section-card" style="border-top: 6px solid #a855f7;">
                <h2 class="font-black uppercase text-purple-600 mb-4 tracking-tighter text-xl">3. Party On The Road</h2>
                <div class="bg-purple-50 p-4 rounded-3xl mb-6">
                    <input type="text" id="p-titolo" placeholder="TITOLO ALBUM" class="input-style uppercase">
                    
                    <div id="anteprima-gallery-party" class="grid grid-cols-4 gap-2 mb-4 hidden">
                        </div>
                    
                    <p class="text-[9px] font-bold mb-1 uppercase opacity-50 text-purple-800">Aggiungi foto all'album:</p>
                    <input type="file" id="p-files" class="text-[10px] mb-4" multiple accept="image/*,video/*">
                    <button onclick="salvaParty()" id="btn-p" class="btn-action bg-purple-600 text-white shadow-xl">Salva Album</button>
                </div>
                <div id="display-party" class="space-y-2"></div>
            </div>

            <div class="section-card" style="border-top: 6px solid #10b981;">
                <h2 class="font-black uppercase text-emerald-600 mb-4 tracking-tighter text-xl">0. Carousel Home</h2>
                <div class="bg-emerald-50 p-6 rounded-3xl">
                    <div id="anteprima-carousel" class="grid grid-cols-4 gap-3 mb-6"></div>
                    <input type="file" id="c-files" class="text-[10px] mb-4 block w-full" multiple accept="image/*">
                    <button onclick="salvaCarousel()" id="btn-c" class="btn-action bg-emerald-600 text-white">Aggiorna Carousel Home</button>
                </div>
            </div>
            
            </div>

        <div class="lg:col-span-4">
            <div class="section-card" style="border-top: 6px solid #000;">
                <h2 class="font-black uppercase mb-4 text-center tracking-tighter text-xl text-black">Passeggeri</h2>
                <div id="display-preno" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <script>
        const S_URL = "https://exphxbeqwpwrsigdmilc.supabase.co";
        const S_KEY = "sb_publishable_jEq6R22qxk2SHGI5YEmEow_SfZG7j8c";
        const sb = supabase.createClient(S_URL, S_KEY);

        let allData = { viaggi: [], flotta: [], party: [], prenotazioni: [], carousel: [] };
        let editPartyId = null;
        let fotoCorrentiParty = [];
        let fotoCorrentiCarousel = [];

        async function init() {
            const [vReq, fReq, pReq, prReq, cReq] = await Promise.all([
                sb.from('tratte').select('*').order('created_at', {ascending: false}),
                sb.from('flotta_page').select('*').order('created_at', {ascending: false}),
                sb.from('gallery_eventi').select('*').order('created_at', {ascending: false}),
                sb.from('prenotazioni').select('*').order('created_at', {ascending: false}),
                sb.from('carousel_home').select('*')
            ]);
            allData.viaggi = vReq.data || [];
            allData.flotta = fReq.data || [];
            allData.party = pReq.data || [];
            allData.prenotazioni = prReq.data || [];
            if(cReq.data && cReq.data.length > 0) {
                allData.carouselId = cReq.data[0].id;
                fotoCorrentiCarousel = cReq.data[0].foto_urls || [];
            }
            renderAll();
            renderAnteprimaCarousel();
        }

        function renderAll() {
            document.getElementById('display-party').innerHTML = allData.party.map(d => `
                <div class="item-row">
                    <img src="${d.foto_urls ? d.foto_urls[0] : ''}" class="thumb">
                    <div class="flex-1 font-bold text-[10px] uppercase">${d.titolo}</div>
                    <div onclick="preparaModificaParty('${d.id}')" class="edit-btn">MOD</div>
                    <div onclick="elimina('gallery_eventi','${d.id}')" class="delete-btn">×</div>
                </div>`).join('');
            
            // ... (altri render per viaggi/flotta/preno rimangono uguali) ...
        }

        // --- PARTY ON THE ROAD LOGICA ---
        function preparaModificaParty(id) {
            editPartyId = id;
            const d = allData.party.find(x => x.id === id);
            document.getElementById('p-titolo').value = d.titolo;
            fotoCorrentiParty = Array.isArray(d.foto_urls) ? d.foto_urls : [];
            renderAnteprimaParty();
            window.scrollTo({ top: document.getElementById('p-titolo').offsetTop - 100, behavior: 'smooth' });
        }

        function renderAnteprimaParty() {
            const container = document.getElementById('anteprima-gallery-party');
            container.classList.remove('hidden');
            container.innerHTML = fotoCorrentiParty.map((url, i) => `
                <div class="preview-grid-item">
                    <img src="${url}" class="w-full h-full object-cover">
                    <div onclick="fotoCorrentiParty.splice(${i},1);renderAnteprimaParty()" class="remove-photo-badge">×</div>
                </div>`).join('');
        }

        async function salvaParty() {
            const btn = document.getElementById('btn-p');
            const titolo = document.getElementById('p-titolo').value.toUpperCase().trim();
            const files = document.getElementById('p-files').files;

            if(!titolo) return alert("Inserisci il titolo!");
            btn.disabled = true;
            btn.innerText = "CARICAMENTO... ⏳";

            try {
                let nuoveUrls = [];
                for (let i = 0; i < files.length; i++) {
                    btn.innerText = `UPLOAD ${i+1}/${files.length}...`;
                    const f = files[i];
                    // Sanitizzazione nome file per iPhone
                    const cleanName = `party_${Date.now()}_${i}.${f.name.split('.').pop()}`;
                    
                    const { error } = await sb.storage.from('foto').upload(cleanName, f);
                    if(error) throw error;
                    
                    const { data: { publicUrl } } = sb.storage.from('foto').getPublicUrl(cleanName);
                    nuoveUrls.push(publicUrl);
                }

                const galleryFinale = [...fotoCorrentiParty, ...nuoveUrls];
                if(galleryFinale.length === 0) throw new Error("Aggiungi almeno una foto!");

                const payload = { titolo, foto_urls: galleryFinale };
                let res;
                if(editPartyId) res = await sb.from('gallery_eventi').update(payload).eq('id', editPartyId);
                else res = await sb.from('gallery_eventi').insert([payload]);

                if(res.error) throw res.error;
                alert("Party salvato!");
                location.reload();
            } catch(e) {
                alert("Errore: " + e.message);
                btn.disabled = false;
                btn.innerText = "Salva Album";
            }
        }

        // CAROUSEL LOGICA (SIMILE A PARTY)
        function renderAnteprimaCarousel() {
            const container = document.getElementById('anteprima-carousel');
            container.innerHTML = fotoCorrentiCarousel.map((url, i) => `
                <div class="preview-grid-item">
                    <img src="${url}" class="w-full h-full object-cover">
                    <div onclick="fotoCorrentiCarousel.splice(${i},1);renderAnteprimaCarousel()" class="remove-photo-badge">×</div>
                </div>`).join('');
        }

        async function salvaCarousel() {
            const btn = document.getElementById('btn-c');
            const files = document.getElementById('c-files').files;
            btn.disabled = true; btn.innerText = "AGGIORNAMENTO...";

            try {
                let nuove = [];
                for(let i=0; i<files.length; i++) {
                    const name = `home_${Date.now()}_${i}.${files[i].name.split('.').pop()}`;
                    await sb.storage.from('foto').upload(name, files[i]);
                    nuove.push(sb.storage.from('foto').getPublicUrl(name).data.publicUrl);
                }
                const finale = [...fotoCorrentiCarousel, ...nuove];
                await sb.from('carousel_home').update({ foto_urls: finale }).eq('id', allData.carouselId);
                location.reload();
            } catch(e) { alert(e.message); btn.disabled = false; }
        }

        async function elimina(tab, id) {
            if(confirm("Eliminare definitivamente?")) { 
                await sb.from(tab).delete().eq('id', id); 
                location.reload(); 
            }
        }

        init();
    </script>
</body>
</html>
