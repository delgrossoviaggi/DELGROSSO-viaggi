<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Master Admin - Del Grosso Viaggi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <script>
        const passwordAttesa = "Delgrosso@26";
        if (localStorage.getItem("adminLogged") !== "true") {
            let accesso = prompt("Password Amministratore:");
            if (accesso === passwordAttesa) { localStorage.setItem("adminLogged", "true"); } 
            else { window.location.href = "index.html"; }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .admin-card { @apply bg-white p-4 md:p-6 rounded-[2rem] shadow-xl border-t-8 mb-6 transition-all; }
        .btn-blue { @apply bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-2xl w-full uppercase italic shadow-lg active:scale-95 transition-all; }
        input, select, textarea { font-size: 16px !important; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen pb-20">

    <nav class="bg-slate-900 text-white p-4 sticky top-0 z-50 flex justify-between items-center border-b-4 border-orange-500">
        <div class="flex flex-col">
            <span class="font-black text-sm md:text-lg tracking-tighter italic uppercase">Del Grosso <span class="text-orange-500">Admin</span></span>
            <span class="text-[8px] uppercase font-bold text-slate-400">Controllo 360° - 2026</span>
        </div>
        <div class="flex gap-2">
            <button onclick="exportExcel()" class="bg-green-600 px-3 py-1.5 rounded-lg text-[9px] font-black uppercase">Excel</button>
            <button onclick="exportPDF()" class="bg-red-600 px-3 py-1.5 rounded-lg text-[9px] font-black uppercase">PDF</button>
            <button onclick="logout()" class="bg-gray-700 px-3 py-1.5 rounded-lg text-[9px] font-black uppercase">Esci</button>
        </div>
    </nav>

    <div class="max-w-5xl mx-auto p-3 mt-4">

        <div class="admin-card border-green-600">
            <h2 class="font-black text-xl text-slate-800 uppercase italic mb-4">📋 Registro Passeggeri</h2>
            
            <div class="overflow-x-auto rounded-2xl border border-gray-200">
                <table class="w-full text-left text-xs border-collapse">
                    <thead>
                        <tr class="bg-slate-50 text-slate-600 font-black uppercase">
                            <th class="p-3 border">Cliente / Tel</th>
                            <th class="p-3 border">Viaggio Scelto</th>
                            <th class="p-3 border text-center">Posti</th>
                            <th class="p-3 border text-center">Azioni</th>
                        </tr>
                    </thead>
                    <tbody id="lista-prenotazioni" class="font-medium">
                        </tbody>
                </table>
            </div>
        </div>

        <div class="admin-card border-blue-600">
            <h2 class="font-black text-xl text-slate-800 uppercase italic mb-4">🖼️ Nuova Locandina</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="space-y-3">
                    <input type="text" id="v-titolo" placeholder="Titolo Viaggio..." class="w-full p-4 bg-gray-50 border rounded-2xl font-bold">
                    <input type="file" id="v-file" accept="image/*" class="text-xs block w-full">
                    <button onclick="salvaViaggio()" class="btn-blue">Pubblica</button>
                </div>
                <div id="lista-viaggi-admin" class="bg-slate-50 p-3 rounded-2xl max-h-40 overflow-y-auto space-y-2">
                    </div>
            </div>
        </div>

        <div class="admin-card border-orange-500">
            <h2 class="font-black text-xl text-slate-800 uppercase italic mb-4">🚌 Gestione Flotta</h2>
            <select id="sel-bus" class="w-full p-4 bg-orange-50 border-2 border-orange-100 rounded-2xl font-black uppercase italic mb-4" onchange="syncBusData(this.value)">
                <option value="bus_53">GT 53 Posti (Irizar Scania)</option>
                <option value="bus_63">GT 63 Posti (Irizar PB)</option>
                <option value="limobus">Limousine Bus (30 Posti)</option>
            </select>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <textarea id="d-bus" placeholder="Descrizione tecnica..." class="w-full p-4 border rounded-2xl h-32 italic text-sm"></textarea>
                <div class="space-y-4">
                    <input type="file" id="f-bus" class="text-xs w-full">
                    <div class="bg-gray-50 p-4 rounded-2xl border text-center">
                        <span class="text-[10px] font-black text-gray-400 block uppercase">Ultima fila bus:</span>
                        <span id="seat-info" class="text-lg font-black text-slate-700">--</span>
                    </div>
                    <button onclick="aggiornaFlotta()" class="bg-orange-600 text-white font-black py-4 rounded-2xl w-full uppercase italic">Salva Bus</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        const S_URL = "https://exphxbeqwpwrsigdmilc.supabase.co";
        const S_KEY = "sb_publishable_jEq6R22qxk2SHGI5YEmEow_SfZG7j8c";
        const sb = supabase.createClient(S_URL, S_KEY);

        async function upload(input) {
            const file = input.files[0]; if (!file) return null;
            const fileName = `DG_2026_${Date.now()}_${file.name.replace(/[^a-zA-Z0-9.]/g, '')}`;
            const { data, error } = await sb.storage.from('immagini').upload(fileName, file);
            if (error) throw error;
            const { data: { publicUrl } } = sb.storage.from('immagini').getPublicUrl(fileName);
            return publicUrl;
        }

        // --- PRENOTAZIONI 360° ---
        async function caricaPrenotazioni() {
            const { data } = await sb.from('prenotazioni').select('*').order('created_at', {ascending: false});
            const render = document.getElementById('lista-prenotazioni');
            if(data) {
                window.lastPrenotati = data;
                render.innerHTML = data.map(p => `
                    <tr class="border-b bg-white hover:bg-gray-50">
                        <td class="p-3 border-r">
                            <div class="font-black text-slate-800 uppercase">${p.nome_cliente}</div>
                            <div class="text-[10px] text-blue-600 font-bold">${p.telefono}</div>
                            <button onclick="editAnagrafica(${p.id}, '${p.nome_cliente}', '${p.telefono}')" class="text-[8px] text-gray-400 underline uppercase mt-1">Modifica Info</button>
                        </td>
                        <td class="p-3 border-r text-[10px] font-bold uppercase text-slate-500">
                            ${p.viaggio_scelto || 'N/D'}
                            <button onclick="editViaggio(${p.id}, '${p.viaggio_scelto}')" class="block text-[8px] text-blue-400 underline mt-1">Sposta Viaggio</button>
