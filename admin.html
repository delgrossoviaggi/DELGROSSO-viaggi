<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin - Del Grosso Viaggi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script>
        const passwordAttesa = "Delgrosso@26";
        let accesso = prompt("Password Amministratore:");
        if (accesso !== passwordAttesa) { window.location.href = "index.html"; }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        input, select, textarea { font-size: 16px !important; }
        .section-card { @apply bg-white p-6 rounded-[2.5rem] shadow-sm border-t-8 transition-all mb-8; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen pb-24">

    <nav class="bg-black text-white p-4 sticky top-0 z-50 flex justify-between items-center shadow-xl border-b-2 border-blue-600">
        <h1 class="font-black text-xs uppercase italic text-blue-500">Del Grosso Admin 2026</h1>
        <div class="flex gap-2">
             <button onclick="exportExcel()" class="bg-green-600 text-white px-3 py-1.5 rounded-xl text-[10px] font-black uppercase">Excel</button>
             <a href="index.html" class="bg-red-600 px-3 py-1.5 rounded-xl text-[10px] font-black uppercase">Esci</a>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto p-4 space-y-6 mt-4">

        <div class="section-card border-orange-500">
            <h2 class="font-black text-orange-900 mb-2 text-xl italic uppercase">🚚 Pagina Flotta (Foto & Testi)</h2>
            <p class="text-[10px] text-gray-500 mb-4 font-bold uppercase">Modifica le card principali della pagina Flotta</p>
            <select id="select-flotta" class="w-full p-4 mb-4 border-2 border-orange-100 rounded-2xl bg-orange-50 font-bold" onchange="caricaDatiFlotta(this.value)">
                <option value="bus_gt">Autobus Gran Turismo (Flotta)</option>
                <option value="limobus">Limousine Bus (Flotta)</option>
            </select>
            <input type="file" id="flotta-file" accept="image/*" class="block w-full text-xs text-gray-500 mb-4">
            <textarea id="flotta-desc" placeholder="Descrizione breve per la flotta..." class="w-full p-4 border rounded-2xl text-sm h-24 mb-4 font-medium italic"></textarea>
            <button id="btn-save-flotta" onclick="salvaFlotta()" class="w-full bg-orange-600 text-white py-4 rounded-2xl font-black uppercase shadow-lg">Aggiorna Card Flotta</button>
        </div>

        <div class="section-card border-purple-600">
            <h2 class="font-black text-purple-900 mb-2 text-xl italic uppercase">🚌 Pagina Dettagli Tecnici</h2>
            <select id="select-bus-edit" class="w-full p-4 mb-4 border-2 border-purple-100 rounded-2xl bg-purple-50 font-bold" onchange="caricaDatiBus(this.value)">
                <option value="bus_gt">Autobus GT (Dettagli)</option>
                <option value="limobus">Limousine Bus (Dettagli)</option>
            </select>
            <input type="file" id="bus-file-edit" accept="image/*" class="block w-full text-xs text-gray-500 mb-4">
            <textarea id="bus-desc-edit" placeholder="Descrizione dettagliata..." class="w-full p-4 border rounded-2xl text-sm h-32 mb-4 font-medium italic"></textarea>
            <input type="text" id="bus-servizi-edit" placeholder="Servizi (Bar, USB, Clima)" class="w-full p-4 border rounded-2xl text-sm mb-4 font-bold">
            <button id="btn-save-bus" onclick="salvaTuttoBus()" class="w-full bg-purple-600 text-white py-4 rounded-2xl font-black uppercase shadow-lg">Salva Dettagli Tecnici</button>
        </div>

        </div>

    <script>
        const S_URL = "https://exphxbeqwpwrsigdmilc.supabase.co";
        const S_KEY = "sb_publishable_jEq6R22qxk2SHGI5YEmEow_SfZG7j8c";
        const sb = supabase.createClient(S_URL, S_KEY);

        async function upload(input) {
            const file = input.files[0]; if (!file) return null;
            const fileName = `adm_2026_${Date.now()}_${file.name.replace(/[^a-zA-Z0-9.]/g, '')}`;
            const { data, error } = await sb.storage.from('immagini').upload(fileName, file);
            if (error) throw error;
            const { data: { publicUrl } } = sb.storage.from('immagini').getPublicUrl(fileName);
            return publicUrl;
        }

        // --- GESTIONE FLOTTA ---
        async function caricaDatiFlotta(id) {
            const { data } = await sb.from('flotta_page').select('*').eq('id', id).single();
            if(data) { document.getElementById('flotta-desc').value = data.descrizione; }
        }
        async function salvaFlotta() {
            try {
                const btn = document.getElementById('btn-save-flotta'); btn.innerText = "ATTENDI...";
                const id = document.getElementById('select-flotta').value;
                const img = await upload(document.getElementById('flotta-file'));
                const upd = { descrizione: document.getElementById('flotta-desc').value };
                if(img) upd.immagine_url = img;
                await sb.from('flotta_page').update(upd).eq('id', id);
                alert("Pagina Flotta aggiornata!"); location.reload();
            } catch (e) { alert(e.message); btn.innerText = "Aggiorna Card Flotta"; }
        }

        // --- GESTIONE BUS DETTAGLI ---
        async function caricaDatiBus(id) {
            const { data } = await sb.from('dettagli_bus').select('*').eq('id', id).single();
            if(data) { document.getElementById('bus-desc-edit').value = data.descrizione_lunga; document.getElementById('bus-servizi-edit').value = data.servizi; }
        }
        async function salvaTuttoBus() {
            try {
                const id = document.getElementById('select-bus-edit').value;
                const img = await upload(document.getElementById('bus-file-edit'));
                const upd = { descrizione_lunga: document.getElementById('bus-desc-edit').value, servizi: document.getElementById('bus-servizi-edit').value };
                if(img) upd.immagine_url = img;
                await sb.from('dettagli_bus').update(upd).eq('id', id);
                alert("Dettagli Tecnici aggiornati!"); location.reload();
            } catch (e) { alert(e.message); }
        }

        // Inizializzazione
        async function init() {
            caricaDatiFlotta('bus_gt');
            caricaDatiBus('bus_gt');
            // Chiama qui anche caricaTutto() per prenotazioni, avvisi ecc.
        }
        init();
    </script>
</body>
</html>
