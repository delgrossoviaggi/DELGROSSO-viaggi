    </script>
    <style>

<body class="pb-20">

    <nav class="bg-white border-b border-gray-200 p-4 sticky top-0 z-50 shadow-sm flex justify-between items-center">
        <div class="flex items-center gap-4">
            <a href="index.html" class="bg-gray-100 p-2 px-4 rounded-xl font-black text-[10px] uppercase border">SITO</a>
            <h1 class="font-black text-xs uppercase italic">Master Admin <span class="text-blue-600">Total Cloud</span></h1>
        </div>
        <button onclick="location.reload()" class="text-[9px] font-black uppercase bg-blue-50 text-blue-600 px-4 py-2 rounded-xl">Reset Admin</button>
    </nav>

    <div class="max-w-7xl mx-auto p-4 md:p-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <div class="lg:col-span-5">
            <div class="section-card" style="border-top: 4px solid #2563eb;">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="font-black uppercase italic text-lg text-blue-700 italic">Passeggeri</h2>
                    <span id="counter-preno" class="bg-blue-100 text-blue-700 text-[10px] font-black px-3 py-1 rounded-full">...</span>
                </div>
                <div id="lista-p" class="space-y-3 max-h-[1000px] overflow-y-auto pr-2"></div>
            </div>
        </div>

        <div class="lg:col-span-7 space-y-6">
            
            <div class="section-card" style="border-top: 4px solid #f43f5e;">
                <h2 class="font-black uppercase italic text-lg text-rose-600 mb-6 italic">Party On The Road</h2>
                <input type="text" id="g-titolo" placeholder="NOME EVENTO (ES. 18 ANNI LUIGI)" class="input-style uppercase">
                <div class="mb-4">
                    <label class="block text-[10px] font-black text-gray-400 mb-1 uppercase">Scegli Foto (jpg, png, dng) o Video (mp4, mov):</label>
                    <input type="file" id="g-files" class="text-[10px]" multiple accept="image/*,video/*,.dng">
                </div>
                <div class="flex gap-2">
                    <button id="btn-salva-gallery" onclick="salvaGallery()" class="btn-action bg-rose-600 text-white flex-1 text-center">Pubblica Album Party</button>
                    <button id="btn-annulla-gallery" onclick="resetGallery()" class="hidden bg-gray-200 text-gray-500 px-6 rounded-xl font-bold uppercase text-[10px]">Annulla</button>
                </div>
                <div id="upload-status" class="mt-4 text-[10px] font-black uppercase text-rose-600 hidden italic"></div>
                <div id="preview-gallery" class="mt-6 space-y-2"></div>
            </div>

            <div class="section-card" style="border-top: 4px solid #10b981;">
                <h2 class="font-black uppercase italic text-lg text-green-700 mb-6 italic">Prenotazione Rapida</h2>
                <input type="text" id="p-nome" placeholder="NOME E COGNOME" class="input-style uppercase">
                <select id="p-tratta" onchange="caricaPiantinaAdmin(this.value)" class="input-style"></select>
                <div id="area-bus" class="hidden py-6 bg-gray-50 rounded-3xl mb-4 border-2 border-dashed">
                    <div id="grid-posti" class="bus-grid mb-4"></div>
                    <div id="label-posti" class="text-center text-blue-600 font-black text-lg italic">SELEZIONA POSTI</div>
                </div>
                <div class="flex gap-2">
                    <button id="btn-salva-preno" onclick="salvaPreno()" class="btn-action bg-green-600 text-white flex-1">Salva</button>
                </div>
            </div>

            <div class="section-card" style="border-top: 4px solid #000;">
                <h2 class="font-black uppercase italic text-lg mb-6">Viaggi & Locandine</h2>
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <input type="text" id="v-titolo" placeholder="META" class="input-style uppercase">
                    <select id="v-modello" class="input-style">
                        <option value="53">53 POSTI</option>
                        <option value="63">63 POSTI</option>
                    </select>
                </div>
                <input type="file" id="v-file" class="text-[10px] mb-4" accept="image/*">
                <button id="btn-salva-viaggio" onclick="salvaViaggio()" class="btn-action bg-black text-white">Pubblica Viaggio</button>
                <div id="preview-v" class="mt-6 grid grid-cols-3 gap-3"></div>
            </div>

            <div class="section-card" style="border-top: 4px solid #f97316;">
                <h2 class="font-black uppercase italic text-lg text-orange-600 mb-6">Garage Flotta</h2>
                <input type="text" id="f-titolo" placeholder="NOME BUS" class="input-style uppercase">
                <textarea id="f-desc" placeholder="DESCRIZIONE..." class="input-style h-20"></textarea>
                <input type="file" id="f-file" class="text-[10px] mb-4" accept="image/*">
                <button id="btn-salva-flotta" onclick="salvaFlotta()" class="btn-action bg-orange-600 text-white">Salva Mezzo</button>
                <div id="preview-flotta" class="mt-6 space-y-2"></div>
            </div>

        </div>
    </div>

    <script>
        const S_URL = "https://exphxbeqwpwrsigdmilc.supabase.co";
        const S_KEY = "sb_publishable_jEq6R22qxk2SHGI5YEmEow_SfZG7j8c";
        const sb = supabase.createClient(S_URL, S_KEY);

        let cacheV = [], cacheF = [], cacheG = [], scelti = []; 
        let editP = null, editV = null, editF = null, editG = null;

        function isVideo(url) {
            const videoExts = ['mp4', 'mov', 'avi', 'webm', 'm4v'];
            const ext = url.split('.').pop().toLowerCase().split('?')[0];
            return videoExts.includes(ext);
        }

        async function init() {
            const { data: v } = await sb.from('tratte').select('*').order('created_at', {ascending: false});
            const { data: p } = await sb.from('prenotazioni').select('*').order('created_at', {ascending: false});
            const { data: f } = await sb.from('flotta_page').select('*').order('created_at', {ascending: false});
            const { data: g } = await sb.from('gallery_eventi').select('*').order('created_at', {ascending: false});
            
            cacheV = v || []; cacheF = f || []; cacheG = g || [];

            document.getElementById('lista-p').innerHTML = (p || []).map(item => {
                const tr = cacheV.find(x => x.id === item.tratta_id);
                return `<div class="p-4 bg-white border rounded-2xl flex justify-between items-center shadow-sm">
                    <div><div class="font-black text-[11px] uppercase">${item.nome_cliente}</div><div class="text-[9px] text-blue-600 font-bold uppercase italic">${tr ? tr.titolo : 'N/A'}</div><div class="text-[10px] text-gray-400 font-black">POSTI: ${item.posti_selezionati.join(', ')}</div></div>
                    <div class="flex gap-1"><button onclick="caricaModificaPreno('${item.id}','${item.nome_cliente}','${item.tratta_id}','${item.posti_selezionati}')" class="bg-blue-50 text-blue-600 font-black text-[9px] p-2 rounded-lg">MOD</button><button onclick="elimina('prenotazioni','${item.id}')" class="bg-red-50 text-red-600 font-black text-[9px] p-2 rounded-lg">X</button></div>
                </div>`;
            }).join('');

            document.getElementById('preview-gallery').innerHTML = cacheG.map(ev => {
                const firstUrl = ev.foto_urls[0];
                const previewContent = isVideo(firstUrl) 
                    ? `<div class="preview-media">VIDEO</div>`
                    : `<img src="${firstUrl}" class="preview-media">`;

                return `
                <div class="flex items-center gap-3 p-3 bg-white border rounded-xl shadow-sm">
                    ${previewContent}
                    <div class="flex-1 font-black text-[9px] uppercase">${ev.titolo} (${ev.foto_urls.length} file)</div>
                    <div class="flex gap-1">
                        <button onclick="caricaModificaGallery('${ev.id}')" class="bg-rose-50 text-rose-600 font-black text-[9px] p-2 rounded-lg">MOD</button>
                        <button onclick="elimina('gallery_eventi','${ev.id}')" class="bg-red-50 text-red-600 font-black text-sm p-1 rounded-lg">×</button>
                    </div>
                </div>`;
            }).join('');

            document.getElementById('preview-v').innerHTML = cacheV.map(item => `
                <div class="relative h-24 rounded-xl overflow-hidden border group shadow-sm">
                    <img src="${item.immagine_url}" class="w-full h-full object-cover">
                    <div class="absolute inset-0 bg-black/80 opacity-0 group-hover:opacity-100 flex flex-col items-center justify-center p-2">
                        <button onclick="caricaModificaViaggio('${item.id}')" class="text-[8px] bg-blue-600 text-white px-2 py-1 rounded font-black uppercase mb-1">Mod</button>
                        <button onclick="elimina('tratte','${item.id}')" class="text-[8px] bg-red-600 text-white px-2 py-1 rounded font-black uppercase">X</button>
                    </div>
                </div>`).join('');

            document.getElementById('preview-flotta').innerHTML = cacheF.map(bus => `
                <div class="flex items-center gap-3 p-3 bg-white border rounded-xl shadow-sm">
                    <img src="${bus.immagine_url}" class="w-14 h-10 object-cover rounded-lg">
                    <div class="flex-1 font-black text-[9px] uppercase">${bus.titolo}</div>
                    <div class="flex gap-1">
                        <button onclick="caricaModificaFlotta('${bus.id}')" class="bg-orange-50 text-orange-600 font-black text-[9px] p-2 rounded-lg">MOD</button>
                        <button onclick="elimina('flotta_page','${bus.id}')" class="bg-red-50 text-red-600 font-black text-sm p-1 rounded-lg">×</button>
                    </div>
                </div>`).join('');

            document.getElementById('p-tratta').innerHTML = '<option value="">-- SELEZIONA VIAGGIO --</option>' + cacheV.map(v => `<option value="${v.id}">${v.titolo}</option>`).join('');
            document.getElementById('counter-preno').innerText = (p || []).length + " CLIENTI";
        }

        // --- SISTEMA SALVATAGGIO PARTY CON LOGICA MEMORIA OTTIMIZZATA ---
        async function salvaGallery() {
            const t = document.getElementById('g-titolo').value.toUpperCase().trim();
            const files = document.getElementById('g-files').files;
            const status = document.getElementById('upload-status');
            
            if(!t) return alert("Inserisci il nome!");
            if(!editG && files.length === 0) return alert("Scegli i file!");

            const btn = document.getElementById('btn-salva-gallery');
            btn.disabled = true;
            status.classList.remove('hidden');

            try {
                let urls = editG ? cacheG.find(x => x.id === editG).foto_urls : [];
                
                // Caricamento sequenziale per evitare crash di memoria
                for(let i = 0; i < files.length; i++) {
                    const f = files[i];
                    status.innerText = `⏳ Elaborazione file ${i+1} di ${files.length}...`;
                    
                    const ext = f.name.split('.').pop().toLowerCase();
                    const name = `p_${Date.now()}_${i}.${ext}`;
                    
                    const { data: upData, error: upErr } = await sb.storage.from('foto').upload(name, f);
                    if(upErr) throw upErr;

                    const { data: urlData } = sb.storage.from('foto').getPublicUrl(name);
                    urls.push(urlData.publicUrl);
                }

                status.innerText = "💾 Sincronizzazione Database...";
                const payload = { titolo: t, foto_urls: urls };
                const { error: dbErr } = editG 
                    ? await sb.from('gallery_eventi').update(payload).eq('id', editG)
                    : await sb.from('gallery_eventi').insert([payload]);

                if(dbErr) throw dbErr;

                alert("Party aggiornato con successo!");
                location.reload();

            } catch (err) {
                console.error(err);
                alert("Errore: " + err.message);
                btn.disabled = false;
                status.classList.add('hidden');
            }
        }

        function caricaModificaGallery(id) {
            const ev = cacheG.find(x => x.id === id);
            editG = id; document.getElementById('g-titolo').value = ev.titolo;
            document.getElementById('btn-salva-gallery').innerText = "Aggiorna Album";
            document.getElementById('btn-annulla-gallery').classList.remove('hidden');
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function resetGallery() { editG = null; location.reload(); }

        // --- ALTRE FUNZIONI ---
        async function salvaPreno() {
            const n = document.getElementById('p-nome').value.toUpperCase().trim();
            const tr = document.getElementById('p-tratta').value;
            if(!n || !tr || !scelti.length) return alert("Dati incompleti!");
            await sb.from('prenotazioni').insert([{ nome_cliente: n, tratta_id: tr, posti_selezionati: scelti }]);
            location.reload();
        }

        function caricaModificaPreno(id, n, tr, p) {
            editP = id; document.getElementById('p-nome').value = n; document.getElementById('p-tratta').value = tr;
            caricaPiantinaAdmin(tr, p); window.scrollTo({top: 0, behavior: 'smooth'});
        }

        async function caricaPiantinaAdmin(tid, pre = []) {
            if(!tid) return document.getElementById('area-bus').classList.add('hidden');
            const v = cacheV.find(x => x.id === tid);
            document.getElementById('area-bus').classList.remove('hidden');
            const grid = document.getElementById('grid-posti'); grid.innerHTML = '';
            scelti = (typeof pre === 'string' ? pre.split(',') : pre).map(String);
            const cap = parseInt(v.modello_bus) || 53;
            const { data: occ } = await sb.from('prenotazioni').select('posti_selezionati, id').eq('tratta_id', tid);
            const presi = (occ || []).filter(o => o.id !== editP).flatMap(o => o.posti_selezionati.map(String));
            for (let i = 1; i <= cap; i++) {
                if (i % 4 === 1 && i > 1 && i <= (cap - 5)) grid.appendChild(Object.assign(document.createElement('div'), {className:'corridor'}));
                const s = String(i); const isOcc = presi.includes(s);
                const div = document.createElement('div');
                div.className = `seat ${isOcc ? 'occupied' : (scelti.includes(s) ? 'selected' : 'available')}`;
                div.innerText = i;
                if(!isOcc) div.onclick = () => {
                    div.classList.toggle('selected');
                    if(div.classList.contains('selected')) scelti.push(s); else scelti = scelti.filter(x => x !== s);
                    document.getElementById('label-posti').innerText = scelti.length ? scelti.sort((a,b)=>a-b).join(', ') : "SELEZIONA POSTI";
                };
                grid.appendChild(div);
            }
        }

        async function salvaViaggio() {
            const t = document.getElementById('v-titolo').value.toUpperCase().trim();
            const m = document.getElementById('v-modello').value;
            const f = document.getElementById('v-file').files[0];
            if(!t || !f) return alert("Dati mancanti!");
            const name = `v_${Date.now()}`;
            await sb.storage.from('foto').upload(name, f);
            const url = sb.storage.from('foto').getPublicUrl(name).data.publicUrl;
            await sb.from('tratte').insert([{ titolo: t, modello_bus: m, immagine_url: url }]);
            location.reload();
        }

        async function salvaFlotta() {
            const t = document.getElementById('f-titolo').value.toUpperCase().trim();
            const d = document.getElementById('f-desc').value.trim();
            const f = document.getElementById('f-file').files[0];
            if(!t || !f) return alert("Dati mancanti!");
            const name = `fl_${Date.now()}`;
            await sb.storage.from('foto').upload(name, f);
            const url = sb.storage.from('foto').getPublicUrl(name).data.publicUrl;
            await sb.from('flotta_page').insert([{ titolo: t, descrizione: d, immagine_url: url }]);
            location.reload();
        }

        async function elimina(tab, id) { if(confirm("Eliminare?")) { await sb.from(tab).delete().eq('id', id); init(); } }

        init();
    </script>
</body>
</html>
