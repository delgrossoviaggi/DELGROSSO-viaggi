<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Master Admin - Del Grosso Viaggi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script>
        const passwordAttesa = "Delgrosso@26";
        let accesso = prompt("Password Amministratore:");
        if (accesso !== passwordAttesa) { window.location.href = "index.html"; }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; -webkit-tap-highlight-color: transparent; }
        .card-admin { @apply bg-white p-5 md:p-8 rounded-[2.5rem] shadow-sm border-t-8 mb-8 transition-all; }
        input, select, textarea { @apply w-full p-4 bg-gray-50 border-2 border-gray-100 rounded-2xl font-bold outline-none focus:border-blue-500 mb-4; font-size: 16px !important; }
        label { @apply text-[10px] font-black uppercase text-gray-400 ml-2 mb-1 block; }
        .btn-delete { @apply bg-red-50 text-red-600 px-3 py-2 rounded-xl font-black text-[10px] uppercase hover:bg-red-600 hover:text-white transition; }
    </style>
</head>
<body class="pb-24">

    <nav class="bg-black text-white p-4 sticky top-0 z-50 flex justify-between items-center border-b-2 border-blue-600 shadow-xl">
        <div class="flex items-center gap-3">
            <div class="bg-white p-1 rounded-xl">
                <img src="logo.jpg.JPEG" alt="Logo" class="h-10 md:h-14 w-auto object-contain block">
            </div>
            <div class="flex flex-col">
                <h1 class="font-black text-[10px] uppercase italic text-blue-500 tracking-tighter leading-none">Master Admin</h1>
                <span class="text-[8px] text-gray-400 font-bold uppercase tracking-widest">Del Grosso 2026</span>
            </div>
        </div>
        <div class="flex gap-2">
            <button onclick="exportExcel()" class="bg-green-600 text-white px-3 py-2 rounded-xl text-[10px] font-black uppercase shadow-lg">Excel</button>
            <a href="index.html" class="bg-red-600 text-white px-3 py-2 rounded-xl text-[10px] font-black uppercase shadow-lg">Esci</a>
        </div>
    </nav>

    <div class="max-w-5xl mx-auto p-4 mt-4 space-y-4">

        <div class="card-admin border-green-500">
            <h2 class="font-black text-green-700 text-xl uppercase italic mb-6 italic">📋 Registro Passeggeri</h2>
            <div class="overflow-x-auto -mx-5 md:mx-0">
                <table class="w-full text-left text-[11px] min-w-[600px]">
                    <thead>
                        <tr class="bg-gray-100 text-gray-500 font-black uppercase">
                            <th class="p-4">Cliente / Tratta</th>
                            <th class="p-4">Posti</th>
                            <th class="p-4 text-right">Azioni</th>
                        </tr>
                    </thead>
                    <tbody id="lista-prenotati"></tbody>
                </table>
            </div>
        </div>

        <div class="card-admin border-black">
            <h2 class="font-black text-black text-xl uppercase italic mb-6">🚌 Locandine Viaggi</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div>
                    <label>Titolo Destinazione</label>
                    <input type="text" id="v-titolo" placeholder="Es. Gardaland">
                    <label>Modello Bus</label>
                    <select id="v-bus">
                        <option value="GT 53 POSTI">GT 53 POSTI</option>
                        <option value="GT 63 POSTI">GT 63 POSTI</option>
                        <option value="LIMOBUS">LIMOBUS</option>
                    </select>
                    <label>Foto Locandina</label>
                    <input type="file" id="v-file" accept="image/*">
                    <button id="btn-v" onclick="salvaViaggio()" class="w-full bg-black text-white py-4 rounded-2xl font-black uppercase shadow-lg">Pubblica Locandina</button>
                </div>
                <div class="bg-gray-50 p-4 rounded-3xl border max-h-[400px] overflow-y-auto" id="lista-tratte"></div>
            </div>
        </div>

        <div class="card-admin border-indigo-500">
            <h2 class="font-black text-indigo-700 text-xl uppercase italic mb-6">🖼️ Foto Carousel Home</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div>
                    <label>Titolo Slide</label>
                    <input type="text" id="c-titolo" placeholder="Es. Nuovi Interni">
                    <label>Immagine</label>
                    <input type="file" id="c-file" accept="image/*">
                    <button id="btn-c" onclick="salvaCarousel()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black uppercase shadow-lg">Aggiungi Slide</button>
                </div>
                <div id="lista-carousel" class="space-y-3 max-h-[300px] overflow-y-auto"></div>
            </div>
        </div>

        <div class="card-admin border-orange-500">
            <h2 class="font-black text-orange-700 text-xl uppercase italic mb-6">🚚 Flotta di Eccellenza</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div>
                    <select id="f-select" onchange="caricaDatiFlotta(this.value)">
                        <option value="bus_gt">Bus Gran Turismo</option>
                        <option value="limobus">Limousine Bus</option>
                    </select>
                    <label>Descrizione Mezzo</label>
                    <textarea id="f-desc" class="h-32"></textarea>
                    <label>Cambia Foto Mezzo</label>
                    <input type="file" id="f-file" accept="image/*">
                    <button id="btn-f" onclick="salvaFlotta()" class="w-full bg-orange-600 text-white py-4 rounded-2xl font-black uppercase shadow-lg">Aggiorna Mezzo</button>
                </div>
                <div id="anteprima-flotta" class="space-y-4"></div>
            </div>
        </div>

        <div class="card-admin border-blue-500">
            <h2 class="font-black text-blue-700 text-xl uppercase italic mb-6">📖 Storia Aziendale</h2>
            <textarea id="about-text" class="h-40"></textarea>
            <button onclick="salvaChiSiamo()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black uppercase shadow-lg">Salva Storia</button>
        </div>

    </div>

    <div id="modal-edit" class="fixed inset-0 bg-black/90 hidden z-[100] flex items-center justify-center p-6 backdrop-blur-md">
        <div class="bg-white rounded-[2.5rem] w-full max-w-sm p-8 shadow-2xl">
            <h3 class="font-black text-xl mb-6 uppercase italic">Modifica</h3>
            <label>Tratta:</label>
            <select id="edit-tratta"></select>
            <label>Posti (Es: 1, 2):</label>
            <input type="text" id="edit-posti">
            <div class="flex gap-2">
                <button onclick="chiudiEdit()" class="flex-1 bg-gray-100 py-4 rounded-2xl font-black uppercase text-xs">Chiudi</button>
                <button onclick="confermaModifica()" class="flex-1 bg-blue-600 text-white py-4 rounded-2xl font-black uppercase text-xs">Salva</button>
            </div>
        </div>
    </div>

    <script>
        const S_URL = "https://exphxbeqwpwrsigdmilc.supabase.co";
        const S_KEY = "sb_publishable_jEq6R22qxk2SHGI5YEmEow_SfZG7j8c";
        const sb = supabase.createClient(S_URL, S_KEY);
        let idPrenoMod = null;

        // BUCKET "foto"
        async function upload(input) {
            const file = input.files[0]; if (!file) return null;
            const fileName = `adm_2026_${Date.now()}_${file.name.replace(/[^a-zA-Z0-9.]/g, '')}`;
            const { data, error } = await sb.storage.from('foto').upload(fileName, file);
            if (error) throw error;
            const { data: { publicUrl } } = sb.storage.from('foto').getPublicUrl(fileName);
            return publicUrl;
        }

        async function init() {
            // Passeggeri
            const { data: preno } = await sb.from('prenotazioni').select('*, tratte(titolo, id)').order('created_at', {ascending: false});
            const { data: tratte } = await sb.from('tratte').select('*').order('titolo');
            
            document.getElementById('lista-prenotati').innerHTML = preno.map(p => `
                <tr class="border-b">
                    <td class="p-4 font-black uppercase leading-tight">${p.nome_cliente}<br><span class="text-blue-500 text-[9px] font-bold tracking-widest">${p.tratte?.titolo || 'N/D'}</span></td>
                    <td class="p-4 font-black text-blue-600 text-sm">${p.posti_selezionati.join(',')}</td>
                    <td class="p-4 text-right flex gap-2 justify-end">
                        <button onclick="apriEdit('${p.id}', '${p.tratta_id}', '${p.posti_selezionati.join(',')}')" class="bg-blue-50 text-blue-600 p-3 rounded-xl font-black text-[10px]">M</button>
                        <button onclick="elimina('prenotazioni', '${p.id}')" class="bg-red-50 text-red-600 p-3 rounded-xl font-black text-[10px]">X</button>
                    </td>
                </tr>`).join('');

            document.getElementById('edit-tratta').innerHTML = tratte.map(t => `<option value="${t.id}">${t.titolo}</option>`).join('');
            document.getElementById('lista-tratte').innerHTML = tratte.map(t => `<div class="flex justify-between items-center p-3 bg-white border rounded-2xl mb-2 text-[10px] font-black uppercase shadow-sm">${t.titolo} <button onclick="elimina('tratte', '${t.id}')" class="text-red-500 font-bold px-2 py-1 bg-red-50 rounded-lg">X</button></div>`).join('');

            // Carousel
            const { data: car } = await sb.from('carousel_flotta').select('*').order('created_at', {ascending: false});
            document.getElementById('lista-carousel').innerHTML = car.map(c => `<div class="flex justify-between items-center p-2 bg-white border rounded-2xl shadow-sm mb-2"><img src="${c.immagine_url}" class="w-10 h-10 object-cover rounded-lg"> <span class="text-[9px] font-bold uppercase truncate px-2">${c.titolo}</span> <button onclick="elimina('carousel_flotta', '${c.id}')" class="text-red-500 font-bold px-2 py-1 bg-red-50 rounded-lg text-[8px]">ELIMINA</button></div>`).join('');

            caricaDatiFlotta('bus_gt');
            const { data: info } = await sb.from('info_azienda').select('*').eq('id', 1).single();
            if(info) document.getElementById('about-text').value = info.storia;
        }

        async function salvaViaggio() {
            const btn = document.getElementById('btn-v'); btn.innerText = "ATTENDI...";
            const img = await upload(document.getElementById('v-file'));
            if(img) { await sb.from('tratte').insert([{titolo: document.getElementById('v-titolo').value, immagine_url: img, modello_bus: document.getElementById('v-bus').value}]); location.reload(); }
        }

        async function salvaCarousel() {
            const btn = document.getElementById('btn-c'); btn.innerText = "ATTENDI...";
            const img = await upload(document.getElementById('c-file'));
            if(img) { await sb.from('carousel_flotta').insert([{titolo: document.getElementById('c-titolo').value, immagine_url: img}]); location.reload(); }
        }

        async function caricaDatiFlotta(id) {
            const { data } = await sb.from('flotta_page').select('*').eq('id', id).single();
            if(data) {
                document.getElementById('f-desc').value = data.descrizione;
                document.getElementById('anteprima-flotta').innerHTML = `<img src="${data.immagine_url}" class="w-full h-40 object-cover rounded-3xl shadow-md border"><p class="text-[9px] text-center font-black uppercase text-gray-400 mt-2 tracking-widest">Foto Online</p>`;
            }
        }

        async function salvaFlotta() {
            const btn = document.getElementById('btn-f'); btn.innerText = "AGGIORNO...";
            const id = document.getElementById('f-select').value;
            const img = await upload(document.getElementById('f-file'));
            const upd = { descrizione: document.getElementById('f-desc').value };
            if(img) upd.immagine_url = img;
            await sb.from('flotta_page').update(upd).eq('id', id); location.reload();
        }

        async function salvaChiSiamo() {
            const txt = document.getElementById('about-text').value;
            await sb.from('info_azienda').update({ storia: txt }).eq('id', 1); alert("Aggiornato!");
        }

        function apriEdit(id, trattaId, posti) { idPrenoMod = id; document.getElementById('edit-tratta').value = trattaId; document.getElementById('edit-posti').value = posti; document.getElementById('modal-edit').classList.remove('hidden'); }
        function chiudiEdit() { document.getElementById('modal-edit').classList.add('hidden'); }
        async function confermaModifica() {
            const posti = document.getElementById('edit-posti').value.split(',').map(s => s.trim());
            await sb.from('prenotazioni').update({ tratta_id: document.getElementById('edit-tratta').value, posti_selezionati: posti }).eq('id', idPrenoMod);
            location.reload();
        }

        async function elimina(tab, id) { if(confirm("Cancellare definitivamente?")) { await sb.from(tab).delete().eq('id', id); location.reload(); } }

        function exportExcel() {
            const rows = [['CLIENTE', 'VIAGGIO', 'POSTI']];
            document.querySelectorAll('#lista-prenotati tr').forEach(r => {
                const td = r.querySelectorAll('td');
                if(td[0]) rows.push([td[0].innerText.split('\n')[0], td[0].innerText.split('\n')[1], td[1].innerText]);
            });
            const ws = XLSX.utils.aoa_to_sheet(rows);
            const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Lista");
            XLSX.writeFile(wb, "Passeggeri_2026.xlsx");
        }

        init();
    </script>
</body>
</html>
