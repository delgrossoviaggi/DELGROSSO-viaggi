<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Master Admin PRO | Del Grosso Viaggi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script>
        if (sessionStorage.getItem("admin_auth") !== "true") {
            const pass = prompt("Password Amministratore:");
            if (pass === "Delgrosso@26") { sessionStorage.setItem("admin_auth", "true"); }
            else { window.location.href = "index.html"; }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; color: #1e293b; }
        .section-card { background: white; border-radius: 2rem; padding: 1.5rem; margin-bottom: 2rem; border: 1px solid #e2e8f0; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .input-style { width: 100%; padding: 0.8rem; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 0.75rem; font-weight: 700; margin-bottom: 0.8rem; outline: none; }
        .btn-action { width: 100%; padding: 1rem; border-radius: 1rem; font-weight: 900; text-transform: uppercase; font-size: 11px; cursor: pointer; transition: 0.2s; border: none; }
        .item-row { display: flex; align-items: center; gap: 15px; padding: 12px; background: #fff; border: 1px solid #f1f5f9; border-radius: 1rem; margin-bottom: 8px; }
        .thumb { width: 60px; height: 50px; object-fit: cover; border-radius: 8px; background: #eee; border: 1px solid #ddd; }
        .delete-btn { background: #fee2e2; color: #ef4444; font-weight: 900; padding: 8px 12px; border-radius: 10px; font-size: 11px; cursor: pointer; }
        .edit-btn { background: #dcfce7; color: #16a34a; font-weight: 900; padding: 8px 12px; border-radius: 10px; font-size: 11px; cursor: pointer; margin-right: 5px; }
        .preview-grid-item { position: relative; height: 60px; border-radius: 8px; overflow: hidden; }
        .remove-photo-badge { position: absolute; top: 0; right: 0; background: red; color: white; width: 18px; height: 18px; font-size: 10px; display: flex; align-items: center; justify-content: center; border-radius: 0 0 0 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body class="pb-20">

    <nav class="bg-white border-b p-4 sticky top-0 z-50 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-4">
            <a href="index.html" class="bg-gray-100 hover:bg-gray-200 text-gray-800 px-4 py-2 rounded-xl font-black text-[10px] uppercase transition-all flex items-center gap-2">
                <span>🏠</span> Home Sito
            </a>
            <h1 class="font-black text-blue-600 uppercase italic hidden md:block">Controllo Totale Del Grosso</h1>
        </div>
        <div class="flex gap-2">
            <button onclick="exportExcel()" class="bg-green-600 text-white px-4 py-2 rounded-xl font-bold text-[10px] uppercase shadow-lg">Esporta Excel</button>
            <button onclick="location.reload()" class="bg-blue-600 text-white px-4 py-2 rounded-xl font-bold text-[10px] uppercase shadow-lg">Sincronizza Cloud</button>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto p-4 grid grid-cols-1 lg:grid-cols-12 gap-8">
        <div class="lg:col-span-8 space-y-6">
            
            <div class="section-card" style="border-top: 6px solid #2563eb;">
                <h2 class="font-black uppercase text-blue-600 mb-4 tracking-tighter text-xl">1. Gestione Tratte</h2>
                <div class="bg-blue-50 p-4 rounded-3xl mb-6">
                    <input type="text" id="v-titolo" placeholder="NOME VIAGGIO" class="input-style uppercase">
                    <input type="text" id="v-data" placeholder="DATA EVENTO" class="input-style uppercase">
                    <select id="v-modello" class="input-style">
                        <option value="53">BUS GT 53 POSTI</option>
                        <option value="63">BUS GT 63 POSTI</option>
                        <option value="30">LIMOUSINE BUS 30 POSTI</option>
                        <option value="7">MERCEDES V250d 7 POSTI</option>
                    </select>
                    <input type="file" id="v-file" class="text-[10px] mb-4">
                    <button onclick="salvaViaggio()" id="btn-v" class="btn-action bg-blue-600 text-white shadow-xl">Salva Viaggio</button>
                </div>
                <div id="display-viaggi" class="space-y-2"></div>
            </div>

            <div class="section-card" style="border-top: 6px solid #f97316;">
                <h2 class="font-black uppercase text-orange-600 mb-4 tracking-tighter text-xl">2. Garage Flotta</h2>
                <div class="bg-orange-50 p-4 rounded-3xl mb-6">
                    <input type="text" id="f-nome" placeholder="NOME MEZZO" class="input-style uppercase">
                    <textarea id="f-desc" placeholder="DESCRIZIONE TECNICA..." class="input-style h-24"></textarea>
                    
                    <div id="anteprima-gallery-flotta" class="grid grid-cols-4 gap-2 mb-4 hidden"></div>
                    
                    <p class="text-[9px] font-bold mb-1 uppercase opacity-50">Carica foto (Gallery):</p>
                    <input type="file" id="f-files" class="text-[10px] mb-4" multiple>
                    <button onclick="salvaFlotta()" id="btn-f" class="btn-action bg-orange-600 text-white shadow-xl">Salva nel Garage</button>
                </div>
                <div id="display-flotta" class="space-y-2"></div>
            </div>

            <div class="section-card" style="border-top: 6px solid #a855f7;">
                <h2 class="font-black uppercase text-purple-600 mb-4 tracking-tighter text-xl">3. Party On The Road</h2>
                <div class="bg-purple-50 p-4 rounded-3xl mb-6">
                    <input type="text" id="p-titolo" placeholder="TITOLO ALBUM" class="input-style uppercase">
                    <input type="file" id="p-files" class="text-[10px] mb-4" multiple>
                    <button onclick="salvaParty()" id="btn-p" class="btn-action bg-purple-600 text-white shadow-xl">Salva Album</button>
                </div>
                <div id="display-party" class="space-y-2"></div>
            </div>
        </div>

        <div class="lg:col-span-4">
            <div class="section-card" style="border-top: 6px solid #000;">
                <h2 class="font-black uppercase mb-4 text-center tracking-tighter text-xl">Passeggeri</h2>
                <div class="bg-gray-100 p-4 rounded-2xl mb-6">
                    <input type="text" id="pr-nome" placeholder="NOME CLIENTE" class="input-style text-xs uppercase">
                    <input type="text" id="pr-posti" placeholder="POSTI (es: 1, 2)" class="input-style text-xs">
                    <button onclick="aggiornaPrenotazione()" id="btn-pr" class="w-full bg-black text-white py-3 rounded-xl font-bold text-[10px] uppercase">Salva</button>
                </div>
                <div id="display-preno" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <script>
        const S_URL = "https://exphxbeqwpwrsigdmilc.supabase.co";
        const S_KEY = "sb_publishable_jEq6R22qxk2SHGI5YEmEow_SfZG7j8c";
        const sb = supabase.createClient(S_URL, S_KEY);

        let editViaggioId = null, editFlottaId = null, editPartyId = null, editPrenoId = null;
        let allData = { viaggi: [], flotta: [], party: [], prenotazioni: [] };
        let fotoCorrentiFlotta = [];

        async function init() {
            try {
                const [vReq, fReq, pReq, prReq] = await Promise.all([
                    sb.from('tratte').select('*').order('created_at', {ascending: false}),
                    sb.from('flotta_page').select('*').order('created_at', {ascending: false}),
                    sb.from('gallery_eventi').select('*').order('created_at', {ascending: false}),
                    sb.from('prenotazioni').select('*').order('created_at', {ascending: false})
                ]);
                allData.viaggi = vReq.data || [];
                allData.flotta = fReq.data || [];
                allData.party = pReq.data || [];
                allData.prenotazioni = prReq.data || [];
                renderAll();
            } catch(e) { console.error(e); }
        }

        function renderAll() {
            // Viaggi
            document.getElementById('display-viaggi').innerHTML = allData.viaggi.map(d => `
                <div class="item-row">
                    <img src="${d.immagine_url}" class="thumb">
                    <div class="flex-1 font-bold text-[10px] uppercase">${d.titolo}</div>
                    <div onclick="preparaModificaViaggio('${d.id}')" class="edit-btn">MOD</div>
                    <div onclick="elimina('tratte','${d.id}')" class="delete-btn">×</div>
                </div>`).join('');

            // Flotta
            document.getElementById('display-flotta').innerHTML = allData.flotta.map(d => `
                <div class="item-row flex-col items-start gap-2">
                    <div class="flex items-center w-full gap-4">
                        <img src="${d.immagine_url}" class="thumb">
                        <div class="flex-1 font-bold text-[10px] uppercase">${d.titolo}</div>
                        <div onclick="preparaModificaFlotta('${d.id}')" class="edit-btn">MOD</div>
                        <div onclick="elimina('flotta_page','${d.id}')" class="delete-btn">×</div>
                    </div>
                    <div class="flex gap-1 overflow-x-auto w-full pb-1">
                        ${(d.foto_gallery || []).map(img => `<img src="${img}" class="h-8 w-8 object-cover rounded border">`).join('')}
                    </div>
                </div>`).join('');

            // Party
            document.getElementById('display-party').innerHTML = allData.party.map(d => `
                <div class="item-row">
                    <img src="${d.foto_urls ? d.foto_urls[0] : ''}" class="thumb">
                    <div class="flex-1 font-bold text-[10px] uppercase">${d.titolo}</div>
                    <div onclick="preparaModificaParty('${d.id}')" class="edit-btn">MOD</div>
                    <div onclick="elimina('gallery_eventi','${d.id}')" class="delete-btn">×</div>
                </div>`).join('');

            // Prenotazioni
            document.getElementById('display-preno').innerHTML = allData.prenotazioni.map(p => {
                const v = allData.viaggi.find(x => x.id === p.tratta_id);
                return `<div class="p-3 bg-gray-50 border rounded-xl text-[10px]">
                    <div class="flex justify-between"><strong>${p.nome_cliente}</strong><div class="flex gap-1"><span onclick="preparaModificaPreno('${p.id}')" class="cursor-pointer text-green-600 font-bold">MOD</span><span onclick="elimina('prenotazioni','${p.id}')" class="cursor-pointer text-red-400 font-bold ml-2">×</span></div></div>
                    <div class="mt-1 opacity-60">📍 ${v ? v.titolo : 'N/D'} | 📞 ${p.telefono_cliente}</div>
                    <div class="mt-1 bg-white p-1 border rounded text-center font-black">POSTI: ${p.posti_selezionati.join(' - ')}</div>
                </div>`;
            }).join('');
        }

        async function salvaViaggio() {
            const f = document.getElementById('v-file').files[0];
            let url = null;
            if(f) {
                const name = `loc_${Date.now()}`;
                await sb.storage.from('foto').upload(name, f);
                url = sb.storage.from('foto').getPublicUrl(name).data.publicUrl;
            }
            const obj = { titolo: document.getElementById('v-titolo').value.toUpperCase(), data_partenza: document.getElementById('v-data').value.toUpperCase(), modello_bus: document.getElementById('v-modello').value };
            if(url) obj.immagine_url = url;
            if(editViaggioId) await sb.from('tratte').update(obj).eq('id', editViaggioId);
            else await sb.from('tratte').insert([obj]);
            location.reload();
        }

        async function salvaFlotta() {
            const fFiles = document.getElementById('f-files').files;
            const btn = document.getElementById('btn-f');
            btn.innerText = "SINCRO..."; btn.disabled = true;
            try {
                let nuoveUrls = [];
                for (let i = 0; i < fFiles.length; i++) {
                    const name = `bus_${Date.now()}_${i}`;
                    await sb.storage.from('foto').upload(name, fFiles[i]);
                    const { data: { publicUrl } } = sb.storage.from('foto').getPublicUrl(name);
                    nuoveUrls.push(publicUrl);
                }
                const galleryFinale = [...fotoCorrentiFlotta, ...nuoveUrls];
                const payload = { 
                    titolo: document.getElementById('f-nome').value.toUpperCase(), 
                    descrizione: document.getElementById('f-desc').value,
                    immagine_url: galleryFinale[0] || '',
                    foto_gallery: galleryFinale 
                };
                if (editFlottaId) await sb.from('flotta_page').update(payload).eq('id', editFlottaId);
                else {
                    if (galleryFinale.length === 0) throw new Error("Manca la foto!");
                    await sb.from('flotta_page').insert([payload]);
                }
                location.reload();
            } catch (e) { alert(e.message); btn.disabled = false; }
        }

        async function salvaParty() {
            const files = document.getElementById('p-files').files;
            let urls = [];
            for (let f of files) {
                const name = `party_${Date.now()}_${f.name.replace(/\s+/g, '_')}`;
                await sb.storage.from('foto').upload(name, f);
                const { data: { publicUrl } } = sb.storage.from('foto').getPublicUrl(name);
                urls.push(publicUrl);
            }
            const obj = { titolo: document.getElementById('p-titolo').value.toUpperCase() };
            if(urls.length > 0) obj.foto_urls = urls;
            if(editPartyId) await sb.from('gallery_eventi').update(obj).eq('id', editPartyId);
            else await sb.from('gallery_eventi').insert([obj]);
            location.reload();
        }

        function preparaModificaFlotta(id) {
            editFlottaId = id;
            const d = allData.flotta.find(x => x.id === id);
            document.getElementById('f-nome').value = d.titolo;
            document.getElementById('f-desc').value = d.descrizione;
            fotoCorrentiFlotta = d.foto_gallery || [];
            renderAnteprimaModifica();
            window.scrollTo({top: 400, behavior: 'smooth'});
        }

        function renderAnteprimaModifica() {
            const container = document.getElementById('anteprima-gallery-flotta');
            container.classList.remove('hidden');
            container.innerHTML = fotoCorrentiFlotta.map((url, i) => `
                <div class="preview-grid-item">
                    <img src="${url}" class="w-full h-full object-cover rounded">
                    <div onclick="rimuoviDallaGallery(${i})" class="remove-photo-badge">×</div>
                </div>`).join('');
        }

        function rimuoviDallaGallery(index) {
            fotoCorrentiFlotta.splice(index, 1);
            renderAnteprimaModifica();
        }

        function preparaModificaViaggio(id) {
            editViaggioId = id;
            const d = allData.viaggi.find(x => x.id === id);
            document.getElementById('v-titolo').value = d.titolo;
            document.getElementById('v-data').value = d.data_partenza;
            document.getElementById('v-modello').value = d.modello_bus;
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function preparaModificaParty(id) {
            editPartyId = id;
            const d = allData.party.find(x => x.id === id);
            document.getElementById('p-titolo').value = d.titolo;
            window.scrollTo({top: 800, behavior: 'smooth'});
        }

        function preparaModificaPreno(id) {
            editPrenoId = id;
            const p = allData.prenotazioni.find(x => x.id === id);
            document.getElementById('pr-nome').value = p.nome_cliente;
            document.getElementById('pr-posti').value = p.posti_selezionati.join(',');
        }

        async function aggiornaPrenotazione() {
            if(!editPrenoId) return;
            const obj = { nome_cliente: document.getElementById('pr-nome').value.toUpperCase(), posti_selezionati: document.getElementById('pr-posti').value.split(',').map(x => x.trim()) };
            await sb.from('prenotazioni').update(obj).eq('id', editPrenoId);
            location.reload();
        }

        function exportExcel() {
            const dataToExport = allData.prenotazioni.map(p => {
                const v = allData.viaggi.find(x => x.id === p.tratta_id);
                return { NOME: p.nome_cliente, TELEFONO: p.telefono_cliente, TRATTA: v ? v.titolo : 'N/D', DATA: v ? v.data_partenza : 'N/D', POSTI: p.posti_selezionati.join(' - ') };
            });
            const worksheet = XLSX.utils.json_to_sheet(dataToExport);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Passeggeri");
            XLSX.writeFile(workbook, "Lista_DelGrosso.xlsx");
        }

        async function elimina(tab, id) {
            if(confirm("Eliminare?")) { await sb.from(tab).delete().eq('id', id); location.reload(); }
        }

        init();
    </script>
</body>
</html>
