<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Flotta - Del Grosso Viaggi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap'); body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50">

    <header class="bg-[#d0e0e3] h-20 flex items-center px-6 justify-between border-b border-[#b7c9cc] sticky top-0 z-50">
        <div class="text-2xl font-black text-[#2c4c5c] italic tracking-tighter">DEL GROSSO VIAGGI</div>
        <nav class="hidden lg:flex space-x-6 text-[10px] font-black uppercase">
            <a href="index.html">Home</a>
            <a href="viaggi.html">Viaggi</a>
            <a href="flotta.html" class="text-blue-600">Flotta</a>
            <a href="contatti.html">Contatti</a>
        </nav>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-16">
        <h1 class="text-4xl font-black italic uppercase text-gray-900 mb-12 text-center">La Nostra Flotta di Eccellenza</h1>
        <div id="lista-bus-completa" class="space-y-16">
            </div>
    </main>

    <script>
        const S_URL = "https://exphxbeqwpwrsigdmilc.supabase.co";
        const S_KEY = "sb_publishable_jEq6R22qxk2SHGI5YEmEow_SfZG7j8c";
        const sb = supabase.createClient(S_URL, S_KEY);

        async function caricaFlotta() {
            const { data } = await sb.from('dettagli_bus').select('*');
            document.getElementById('lista-bus-completa').innerHTML = data.map(b => `
                <div class="bg-white rounded-[3rem] shadow-2xl overflow-hidden flex flex-col md:flex-row border">
                    <img src="${b.immagine_url}" class="md:w-1/2 h-80 md:h-auto object-cover">
                    <div class="p-10 md:w-1/2 flex flex-col justify-center">
                        <span class="text-orange-500 font-black uppercase text-xs tracking-widest mb-2">${b.posti} Posti - Comfort Top</span>
                        <h2 class="text-3xl font-black italic uppercase text-slate-800 mb-4">${b.nome_bus}</h2>
                        <p class="text-gray-600 mb-8 italic leading-relaxed">${b.descrizione_lunga}</p>
                        <div class="bg-gray-50 p-4 rounded-2xl border flex items-center gap-4">
                            <i class="fas fa-check-circle text-green-500"></i>
                            <span class="text-[10px] font-bold uppercase text-gray-400">Servizi: ${b.servizi}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        caricaFlotta();
    </script>
</body>
</html>
