<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La Nostra Flotta | Del Grosso Viaggi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #1a1a1a; margin: 0; padding: 0; scroll-behavior: smooth; }
        header { background: white; padding: 15px 0; border-bottom: 1px solid #f0f0f0; position: sticky; top: 0; z-index: 1000; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; width: 92%; max-width: 1200px; margin: auto; }
        .nav-links { list-style: none; display: flex; gap: 20px; }
        .nav-links a { text-decoration: none; color: #000; font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }
        .hero { background: #000; color: white; padding: 60px 20px; text-align: center; }
        .hero h1 { font-size: 45px; font-weight: 900; text-transform: uppercase; font-style: italic; letter-spacing: -1px; }
        .hero p { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4em; color: #3b82f6; margin-bottom: 10px; }
        
        .bus-container { max-width: 1200px; margin: 50px auto; padding: 0 20px; }
        .bus-card { margin-bottom: 100px; border-bottom: 1px solid #eee; padding-bottom: 50px; }
        .main-img-container { width: 100%; height: 500px; border-radius: 2rem; overflow: hidden; cursor: pointer; }
        .main-img-container img { width: 100%; height: 100%; object-fit: cover; }
        
        .gallery-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 15px; }
        .thumb-item { aspect-ratio: 1; border-radius: 0.8rem; overflow: hidden; cursor: pointer; border: 2px solid transparent; }
        .thumb-item:hover { border-color: #3b82f6; }
        .thumb-item img { width: 100%; height: 100%; object-fit: cover; }

        .bus-info h2 { font-size: 40px; font-weight: 900; text-transform: uppercase; font-style: italic; margin: 20px 0; }
        .bus-info p { color: #4b5563; line-height: 1.6; white-space: pre-line; margin-bottom: 30px; }
        .btn-wa { display: inline-flex; align-items: center; background: #000; color: white; padding: 15px 30px; border-radius: 100px; font-weight: 900; text-transform: uppercase; font-size: 11px; text-decoration: none; }

        /* --- VISUALIZZATORE MANUALE (NO BUG) --- */
        #custom-viewer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 9999;
            display: none; align-items: center; justify-content: center;
            cursor: pointer;
        }
        #custom-viewer img {
            max-width: 95%; max-height: 95%;
            object-fit: contain;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            border-radius: 8px;
        }
        #custom-viewer .close-v {
            position: absolute; top: 20px; right: 20px; color: white;
            font-size: 40px; font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-flex">
            <a href="index.html"><img src="logo.JPEG" class="h-10 w-auto"></a>
            <nav><ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="viaggi.html">Viaggi</a></li>
                <li><a href="contatti.html">Contatti</a></li>
            </ul></nav>
        </div>
    </header>

    <main class="bus-container" id="lista-mezzi"></main>

    <div id="custom-viewer" onclick="closeViewer()">
        <span class="close-v">&times;</span>
        <img id="viewer-img" src="">
    </div>

    <script>
        const S_URL = "https://exphxbeqwpwrsigdmilc.supabase.co";
        const S_KEY = "sb_publishable_jEq6R22qxk2SHGI5YEmEow_SfZG7j8c";
        const sb = supabase.createClient(S_URL, S_KEY);

        async function caricaFlotta() {
            const main = document.getElementById('lista-mezzi');
            const { data: flotta } = await sb.from('flotta_page').select('*').order('created_at', { ascending: true });
            
            main.innerHTML = flotta.map(bus => {
                const gallery = bus.foto_gallery || [];
                const allImgs = [...new Set([bus.immagine_url, ...gallery])].filter(u => u);

                return `
                <div class="bus-card">
                    <div class="main-img-container" onclick="openViewer('${bus.immagine_url}')">
                        <img src="${bus.immagine_url}">
                    </div>
                    <div class="gallery-grid">
                        ${allImgs.map(img => `
                            <div class="thumb-item" onclick="openViewer('${img}')">
                                <img src="${img}">
                            </div>
                        `).join('')}
                    </div>
                    <div class="bus-info">
                        <h2>${bus.titolo}</h2>
                        <p>${bus.descrizione}</p>
                        <a href="https://wa.me/393662127916?text=Info mezzo: ${bus.titolo}" class="btn-wa">Richiedi Preventivo</a>
                    </div>
                </div>`;
            }).join('');
        }

        function openViewer(url) {
            document.getElementById('viewer-img').src = url;
            document.getElementById('custom-viewer').style.display = 'flex';
            document.body.style.overflow = 'hidden'; // Blocca scroll
        }

        function closeViewer() {
            document.getElementById('custom-viewer').style.display = 'none';
            document.body.style.overflow = 'auto'; // Sblocca scroll
        }

        caricaFlotta();
    </script>
</body>
</html>
