<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La Flotta | Del Grosso Viaggi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; color: #1a1a1a; line-height: 1.6; background-color: #fff; }
        
        /* HEADER */
        header { 
            background: rgba(255, 255, 255, 0.95); 
            padding: 10px 0; 
            border-bottom: 1px solid #eaeaea; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            backdrop-filter: blur(10px); 
        }
        .header-flex { display: flex; justify-content: space-between; align-items: center; width: 92%; max-width: 1200px; margin: auto; }
        .logo-box img { height: 55px; width: auto; object-fit: contain; }
        
        .nav-links { list-style: none; display: flex; gap: 20px; }
        .nav-links a { text-decoration: none; color: #000; font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }

        /* HERO PAGINA */
        .page-hero { background: #000; color: white; padding: 80px 0; text-align: center; }
        .page-hero h1 { font-size: 42px; font-weight: 900; text-transform: uppercase; font-style: italic; letter-spacing: -2px; }
        .page-hero p { opacity: 0.6; font-weight: 700; text-transform: uppercase; font-size: 10px; letter-spacing: 2px; margin-top: 10px; }

        .container { width: 92%; max-width: 1200px; margin: auto; }
        .py-section { padding: 80px 0; }

        /* BLOCCHI MEZZI FLOTTA */
        .bus-block { display: flex; align-items: center; gap: 60px; margin-bottom: 100px; }
        .bus-block:nth-child(even) { flex-direction: row-reverse; }
        
        .bus-img-side { flex: 1.2; border-radius: 40px; overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,0.1); border: 1px solid #eee; background-color: #f9fafb; }
        .bus-img-side img { width: 100%; height: auto; display: block; object-fit: cover; }
        
        .bus-text-side { flex: 1; }
        .bus-text-side h2 { font-size: 32px; font-weight: 900; text-transform: uppercase; font-style: italic; margin-bottom: 20px; color: #2563eb; line-height: 1; }
        .bus-text-side p { font-size: 16px; color: #555; margin-bottom: 30px; }
        
        .btn-action { 
            background: #000; color: white; padding: 16px 40px; border-radius: 50px; 
            font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; text-decoration: none; display: inline-block; transition: 0.3s;
        }
        .btn-action:hover { background: #2563eb; transform: scale(1.05); }

        /* FOOTER */
        footer { background: #000; color: white; padding: 60px 0 30px; margin-top: 60px; text-align: center; }
        .signature { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: #444; margin-top: 30px; border-top: 1px solid #111; padding-top: 20px; }
        .signature strong { color: #fff; }

        /* RESPONSIVE IPHONE */
        @media (max-width: 992px) {
            .bus-block, .bus-block:nth-child(even) { flex-direction: column; text-align: center; gap: 30px; }
            .bus-img-side { border-radius: 30px; }
            .bus-text-side h2 { font-size: 28px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-flex">
            <a href="index.html" class="logo-box">
                <img src="logo.jpg.JPEG" alt="Logo Del Grosso">
            </a>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="flotta.html" style="color:#2563eb">La Flotta</a></li>
                    <li><a href="prenota.html">Prenota</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="page-hero">
        <div class="container">
            <h1>La Nostra Flotta</h1>
            <p>Eccellenza, Comfort e Sicurezza su Ruote</p>
        </div>
    </section>

    <section class="py-section">
        <div class="container" id="flotta-list">
            </div>
    </section>

    <footer>
        <div class="container">
            <p style="font-size: 12px; opacity: 0.5; text-transform: uppercase; letter-spacing: 1px;">Del Grosso Viaggi & Limousine Bus - San Severo (FG)</p>
            <div class="signature">
                Designer © <strong>Cristino Nicola Pio</strong>
            </div>
        </div>
    </footer>

    <script>
        const S_URL = "https://exphxbeqwpwrsigdmilc.supabase.co";
        const S_KEY = "sb_publishable_jEq6R22qxk2SHGI5YEmEow_SfZG7j8c";
        const sb = supabase.createClient(S_URL, S_KEY);

        // FUNZIONE DI RIPARAZIONE URL E CACHE-BUSTING
        function fixImageUrl(url) {
            if (!url) return 'logo.jpg.JPEG';
            let cleanUrl = url.replace('/immagini/', '/foto/');
            return cleanUrl + "?v=" + new Date().getTime();
        }

        async function initFlotta() {
            try {
                const { data: flotta } = await sb.from('flotta_page').select('*').order('id');
                const list = document.getElementById('flotta-list');
                
                if(flotta && flotta.length > 0) {
                    list.innerHTML = flotta.map(f => `
                        <div class="bus-block">
                            <div class="bus-img-side">
                                <img src="${fixImageUrl(f.immagine_url)}" onerror="this.src='logo.jpg.JPEG'">
                            </div>
                            <div class="bus-text-side">
                                <h2>${f.titolo}</h2>
                                <p>${f.descrizione}</p>
                                <a href="prenota.html" class="btn-action">Prenota questo mezzo</a>
                            </div>
                        </div>
                    `).join('');
                } else {
                    list.innerHTML = `<p style="text-align:center; font-weight:bold; opacity:0.3;">Caricamento flotta in corso...</p>`;
                }
            } catch (err) {
                console.error("Errore caricamento flotta:", err);
            }
        }

        initFlotta();
    </script>
</body>
</html>
