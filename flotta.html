<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La Nostra Flotta | Del Grosso Viaggi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #1a1a1a; margin: 0; padding: 0; scroll-behavior: smooth; }
        header { background: white; padding: 15px 0; border-bottom: 1px solid #f0f0f0; position: sticky; top: 0; z-index: 1000; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; width: 92%; max-width: 1200px; margin: auto; }
        .nav-links { list-style: none; display: flex; gap: 20px; }
        .nav-links a { text-decoration: none; color: #000; font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }
        .hero { background: #000; color: white; padding: 60px 20px; text-align: center; }
        .hero h1 { font-size: 45px; font-weight: 900; text-transform: uppercase; font-style: italic; letter-spacing: -1px; }
        .hero p { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4em; color: #3b82f6; margin-bottom: 10px; }
        .bus-container { max-width: 1200px; margin: 80px auto; padding: 0 20px; }
        .bus-card { margin-bottom: 150px; scroll-margin-top: 120px; } /* scroll-margin evita che l'header copra il titolo */
        .main-img-container { width: 100%; height: 600px; border-radius: 2.5rem; overflow: hidden; box-shadow: 0 30px 60px rgba(0,0,0,0.15); cursor: zoom-in; margin-bottom: 30px; }
        .main-img-container img { width: 100%; height: 100%; object-fit: cover; transition: 0.8s ease; }
        .main-img-container:hover img { transform: scale(1.03); }
        .gallery-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 20px; }
        .thumb-item { height: 120px; border-radius: 1rem; overflow: hidden; cursor: pointer; border: 2px solid transparent; transition: 0.3s; }
        .thumb-item:hover { border-color: #3b82f6; opacity: 0.8; }
        .thumb-item img { width: 100%; height: 100%; object-fit: cover; }
        .bus-info { margin-top: 40px; max-width: 800px; }
        .bus-info h2 { font-size: 50px; font-weight: 900; text-transform: uppercase; font-style: italic; line-height: 1; margin-bottom: 25px; }
        .bus-info p { font-size: 18px; color: #4b5563; line-height: 1.8; white-space: pre-line; margin-bottom: 40px; }
        .btn-wa { display: inline-flex; align-items: center; gap: 12px; background: #000; color: white; padding: 20px 40px; border-radius: 100px; font-weight: 900; text-transform: uppercase; font-size: 12px; text-decoration: none; transition: 0.3s; }
        .btn-wa:hover { background: #3b82f6; transform: translateY(-3px); }
        footer { background: #000; color: white; padding: 60px 0; text-align: center; margin-top: 100px; }
        @media (max-width: 768px) { .main-img-container { height: 350px; border-radius: 1.5rem; } .bus-info h2 { font-size: 32px; } .gallery-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

    <header>
        <div class="header-flex">
            <a href="index.html"><img src="logo.JPEG" class="h-10 w-auto" alt="Logo"></a>
            <nav><ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="viaggi.html">Viaggi</a></li>
                <li><a href="contatti.html">Contatti</a></li>
            </ul></nav>
        </div>
    </header>

    <section class="hero">
        <p>Luxury & Comfort</p>
        <h1>LA NOSTRA <span class="text-blue-500">FLOTTA</span></h1>
    </section>

    <main class="bus-container" id="lista-mezzi">
        <div class="text-center py-20 text-gray-400 font-bold uppercase animate-pulse">Caricamento flotta...</div>
    </main>

    <footer>
        <p class="font-bold uppercase text-[10px] tracking-[0.3em] opacity-50">Del Grosso Viaggi & Limousine Bus</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js"></script>
    <script>
        const S_URL = "https://exphxbeqwpwrsigdmilc.supabase.co";
        const S_KEY = "sb_publishable_jEq6R22qxk2SHGI5YEmEow_SfZG7j8c";
        const sb = supabase.createClient(S_URL, S_KEY);

        async function caricaFlotta() {
            const main = document.getElementById('lista-mezzi');
            try {
                const { data: flotta, error } = await sb
                    .from('flotta_page')
                    .select('*')
                    .order('created_at', { ascending: true });

                if (error) throw error;

                if (!flotta || flotta.length === 0) {
                    main.innerHTML = `<div class="text-center py-20 text-gray-400 font-bold uppercase">Nessun mezzo disponibile.</div>`;
                    return;
                }

                main.innerHTML = flotta.map(bus => {
                    const immaginiExtra = bus.foto_gallery || []; 
                    const allImages = [bus.immagine_url, ...immaginiExtra].filter(url => url);

                    // Aggiunto ID specifico alla bus-card
                    return `
                    <div class="bus-card" id="bus-${bus.id}">
                        <div class="main-img-container" onclick="openLightbox('${bus.id}')">
                            <img src="${bus.immagine_url}" id="cover-${bus.id}" alt="${bus.titolo}">
                        </div>
                        <div class="gallery-grid">
                            ${allImages.map(img => `
                                <div class="thumb-item" onclick="document.getElementById('cover-${bus.id}').src='${img}'">
                                    <img src="${img}" alt="Dettaglio">
                                </div>
                            `).join('')}
                        </div>
                        <div class="bus-info">
                            <h2>${bus.titolo}</h2>
                            <p>${bus.descrizione || 'Comfort ed eleganza per ogni tuo viaggio.'}</p>
                            <div class="hidden">
                                ${allImages.map(img => `<a href="${img}" class="glightbox-${bus.id}" data-gallery="gallery-${bus.id}"></a>`).join('')}
                            </div>
                            <a href="https://wa.me/393662127916?text=Vorrei info sul mezzo: ${bus.titolo}" class="btn-wa">Richiedi Preventivo</a>
                        </div>
                    </div>`;
                }).join('');

                // Inizializza GLightbox
                flotta.forEach(bus => { GLightbox({ selector: `.glightbox-${bus.id}`, loop: true }); });

                // --- GESTIONE SALTO (SCROLL) ---
                const urlParams = new URLSearchParams(window.location.search);
                const busId = urlParams.get('bus');
                if (busId) {
                    setTimeout(() => {
                        const target = document.getElementById(`bus-${busId}`);
                        if (target) {
                            target.scrollIntoView({ behavior: 'smooth' });
                        }
                    }, 500); // Piccolo ritardo per assicurarsi che le immagini siano renderizzate
                }

            } catch (error) {
                console.error("Errore:", error);
                main.innerHTML = `<div class="text-center py-20 text-red-500 font-bold">ERRORE CARICAMENTO.</div>`;
            }
        }

        function openLightbox(id) {
            const currentImg = document.getElementById(`cover-${id}`).src;
            const links = document.querySelectorAll(`.glightbox-${id}`);
            let found = false;
            links.forEach(link => { if(link.href === currentImg) { link.click(); found = true; } });
            if(!found && links[0]) links[0].click();
        }

        caricaFlotta();
    </script>
</body>
</html>
