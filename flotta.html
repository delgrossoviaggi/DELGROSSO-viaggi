<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Flotta - Del Grosso Viaggi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
    </style>
</head>
<body>
    <header class="bg-white shadow-sm h-20 flex items-center sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 flex justify-between items-center w-full">
            <a href="index.html"><img src="logo.jpg.JPEG" class="h-14 w-auto object-contain"></a>
            <nav class="hidden md:flex gap-6 font-black uppercase text-[10px] tracking-widest">
                <a href="index.html" class="hover:text-blue-600 transition">Home</a>
                <a href="flotta.html" class="text-blue-600">La Flotta</a>
                <a href="viaggi.html" class="hover:text-blue-600 transition">Viaggi</a>
                <a href="dettagli-bus.html" class="hover:text-blue-600 transition">Dettagli</a>
            </nav>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-16">
        <div class="text-center mb-16">
            <h1 class="text-5xl font-black uppercase italic tracking-tighter text-gray-900">I Nostri Mezzi</h1>
            <p class="text-gray-400 font-bold mt-2 uppercase text-xs tracking-[0.4em]">Gestiti da Del Grosso Admin</p>
        </div>

        <div id="grid-flotta" class="grid grid-cols-1 md:grid-cols-2 gap-12">
            </div>
    </main>

    <script>
        const S_URL = "https://exphxbeqwpwrsigdmilc.supabase.co";
        const S_KEY = "sb_publishable_jEq6R22qxk2SHGI5YEmEow_SfZG7j8c";
        const sb = supabase.createClient(S_URL, S_KEY);

        async function caricaFlotta() {
            const { data } = await sb.from('flotta_page').select('*').order('id', {ascending: true});
            const render = document.getElementById('grid-flotta');
            
            if(data) {
                render.innerHTML = data.map(bus => `
                    <div class="bg-white rounded-[3rem] overflow-hidden shadow-xl border border-gray-100 flex flex-col group">
                        <img src="${bus.immagine_url}" class="w-full h-72 object-cover group-hover:scale-105 transition duration-500">
                        <div class="p-10 flex flex-col flex-1">
                            <h2 class="text-3xl font-black uppercase italic tracking-tighter text-gray-900 mb-4">${bus.titolo}</h2>
                            <p class="text-gray-500 font-medium italic mb-8 leading-relaxed">"${bus.descrizione}"</p>
                            <a href="dettagli-bus.html" class="mt-auto block bg-blue-50 text-blue-700 text-center py-4 rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-blue-600 hover:text-white transition">Vedi Specifiche Tecniche</a>
                        </div>
                    </div>
                `).join('');
            }
        }
        caricaFlotta();
    </script>
</body>
</html>
