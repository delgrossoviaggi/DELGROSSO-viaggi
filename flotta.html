<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La Flotta | Del Grosso Viaggi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; color: #1a1a1a; line-height: 1.6; background-color: #fff; }
        
        /* HEADER AGGIORNATO */
        header { 
            background: rgba(255, 255, 255, 0.95); 
            padding: 10px 0; 
            border-bottom: 1px solid #eaeaea; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            backdrop-filter: blur(10px); 
        }
        .header-flex { display: flex; justify-content: space-between; align-items: center; width: 92%; max-width: 1200px; margin: auto; }
        .logo-box img { height: 50px; width: auto; object-fit: contain; }
        
        .nav-links { list-style: none; display: flex; gap: 15px; }
        .nav-links a { text-decoration: none; color: #000; font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .nav-links a:hover { color: #2563eb; }

        /* HERO PAGINA */
        .page-hero { background: #000; color: white; padding: 100px 0; text-align: center; }
        .page-hero h1 { font-size: clamp(32px, 8vw, 45px); font-weight: 900; text-transform: uppercase; font-style: italic; letter-spacing: -2px; line-height: 1; }
        .page-hero p { opacity: 0.6; font-weight: 700; text-transform: uppercase; font-size: 10px; letter-spacing: 3px; margin-top: 15px; color: #2563eb; }

        .container { width: 92%; max-width: 1200px; margin: auto; }
        .py-section { padding: 80px 0; }

        /* BLOCCHI MEZZI FLOTTA */
        .bus-block { display: flex; align-items: center; gap: 60px; margin-bottom: 100px; opacity: 0; transform: translateY(30px); transition: 0.8s ease-out; }
        .bus-block.show { opacity: 1; transform: translateY(0); }
        .bus-block:nth-child(even) { flex-direction: row-reverse; }
        
        .bus-img-side { flex: 1.2; border-radius: 40px; overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,0.1); border: 1px solid #f0f0f0; background-color: #f9fafb; aspect-ratio: 16/9; }
        .bus-img-side img { width: 100%; height: 100%; display: block; object-fit: cover; }
        
        .bus-text-side { flex: 1; }
        .bus-text-side h2 { font-size: clamp(24px, 5vw, 32px); font-weight: 900; text-transform: uppercase; font-style: italic; margin-bottom: 20px; color: #000; line-height: 1; }
        .bus-text-side p { font-size: 16px; color: #555; margin-bottom: 30px; white-space: pre-line; }
        
        .btn-action { 
            background: #000; color: white; padding: 16px 40px; border-radius: 50px; 
            font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; text-decoration: none; display: inline-block; transition: 0.3s;
        }
        .btn-action:hover { background: #2563eb; box-shadow: 0 10px 20px rgba(37,99,235,0.2); }

        /* FOOTER */
        footer { background: #000; color: white; padding: 60px 0 30px; margin-top: 60px; text-align: center; }
        .signature { font-size: 9px; text-transform: uppercase; letter-spacing: 2px; color: #444; margin-top: 30px; border-top: 1px solid #111; padding-top: 20px; }
        .signature strong { color: #666; }

        /* RESPONSIVE */
        @media (max-width: 992px) {
            .bus-block, .bus-block:nth-child(even) { flex-direction: column; text-align: center; gap: 30px; margin-bottom: 80px; }
            .bus-img-side { border-radius: 30px; flex: none; width: 100%; }
            .nav-links { gap: 10px; }
            .nav-links a { font-size: 8px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-flex">
            <a href="index.html" class="logo-box">
                <img src="logo.jpg.JPEG" alt="Logo Del Grosso">
            </a>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="flotta.html" style="color:#2563eb">Flotta</a></li>
                    <li><a href="chisiamo.html">Chi Siamo</a></li>
                    <li><a href="prenota.html">Prenota</a></li>
                    <li><a href="contatti.html">Contatti</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="page-hero">
        <div class="container">
            <p>La nostra eccellenza</p>
            <h1>La Flotta Del Grosso</h1>
        </div>
    </section>

    <section class="py-section">
        <div class="container" id="flotta-list">
            <p style="text-align:center; font-weight:bold; opacity:0.3;" id="loading-msg">Sincronizzazione flotta in corso...</p>
        </div>
    </section>

    <footer>
        <div class="container">
            <p style="font-size: 10px; opacity: 0.4; text-transform: uppercase; letter-spacing: 1px;">Del Grosso Viaggi & Limousine Bus - San Severo (FG)</p>
            <div class="signature">
                Designer © <strong>Cristino Nicola Pio</strong>
            </div>
        </div>
    </footer>

    <script>
        const S_URL = "https://exphxbeqwpwrsigdmilc.supabase.co";
        const S_KEY = "sb_publishable_jEq6R22qxk2SHGI5YEmEow_SfZG7j8c";
        const sb = supabase.createClient(S_URL, S_KEY);

        // FUNZIONE RIPARA URL E FORZA AGGIORNAMENTO
        function fixImageUrl(url) {
            if (!url) return 'logo.jpg.JPEG';
            let cleanUrl = url.replace('/immagini/', '/foto/');
            return cleanUrl + "?v=" + new Date().getTime();
        }

        async function initFlotta() {
            try {
                // Recupero dati dalla tabella flotta_page
                const { data: flotta, error } = await sb.from('flotta_page').select('*').order('created_at', {ascending: false});
                
                if (error) throw error;

                const list = document.getElementById('flotta-list');
                
                if(flotta && flotta.length > 0) {
                    list.innerHTML = flotta.map(f => `
                        <div class="bus-block">
                            <div class="bus-img-side">
                                <img src="${fixImageUrl(f.immagine_url)}" onerror="this.src='logo.jpg.JPEG'" alt="${f.titolo}">
                            </div>
                            <div class="bus-text-side">
                                <h2>${f.titolo}</h2>
                                <p>${f.descrizione}</p>
                                <a href="prenota.html" class="btn-action">Richiedi Preventivo</a>
                            </div>
                        </div>
                    `).join('');

                    // Animazione comparsa blocchi
                    setTimeout(() => {
                        const blocks = document.querySelectorAll('.bus-block');
                        blocks.forEach((b, i) => {
                            setTimeout(() => b.classList.add('show'), i * 200);
                        });
                    }, 100);

                } else {
                    list.innerHTML = `<p style="text-align:center; font-weight:black; opacity:0.2; text-transform:uppercase; font-size:12px;">Nessun mezzo inserito nella flotta al momento.</p>`;
                }
            } catch (err) {
                console.error("Errore Supabase:", err);
                document.getElementById('loading-msg').innerText = "Errore di connessione al database.";
            }
        }

        initFlotta();
    </script>
</body>
</html>
