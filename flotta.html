<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La Flotta - Del Grosso Viaggi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #fff; color: #1a1a1a; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .container { width: 92%; max-width: 1200px; margin: auto; }
        
        /* HEADER */
        header { background: rgba(255, 255, 255, 0.95); padding: 10px 0; border-bottom: 1px solid #eaeaea; position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px); }
        .header-flex { display: flex; justify-content: space-between; align-items: center; }
        .logo-container img { height: 55px; width: auto; object-fit: contain; }
        .nav-links { list-style: none; display: flex; gap: 25px; }
        .nav-links a { text-decoration: none; color: #000; font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #2563eb; }

        /* HERO PAGINA */
        .page-hero { background: #000; color: white; padding: 100px 0; text-align: center; }
        .page-hero h1 { font-size: 48px; font-weight: 900; text-transform: uppercase; font-style: italic; letter-spacing: -2px; }
        .page-hero p { font-size: 18px; opacity: 0.8; margin-top: 10px; font-style: italic; }

        /* SEZIONE FLOTTA DETTAGLIATA */
        .flotta-dettaglio-section { padding: 80px 0; }
        .bus-detail-block { display: flex; align-items: center; gap: 60px; margin-bottom: 80px; }
        .bus-detail-block:nth-child(even) { flex-direction: row-reverse; }
        .bus-image-container { flex: 1; border-radius: 30px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.1); border: 1px solid #f0f0f0; }
        .bus-image-container img { width: 100%; height: auto; object-fit: cover; }
        .bus-text-container { flex: 1; }
        .bus-label { font-size: 12px; font-weight: 900; text-transform: uppercase; color: #2563eb; letter-spacing: 2px; margin-bottom: 10px; display: block; }
        .bus-text-container h2 { font-size: 36px; font-weight: 900; text-transform: uppercase; font-style: italic; letter-spacing: -1px; margin-bottom: 20px; color: #000; }
        .bus-text-container p { font-size: 16px; color: #555; margin-bottom: 30px; line-height: 1.8; }
        .btn-prenota-small { background: #000; color: white; padding: 16px 32px; text-decoration: none; font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; border-radius: 50px; display: inline-block; transition: 0.3s; }
        .btn-prenota-small:hover { background: #2563eb; }

        /* FOOTER */
        .main-footer { background: #000; color: white; padding: 80px 0 0 0; }
        .footer-grid-custom { display: grid; grid-template-columns: 1.5fr 1fr 1fr 1fr; gap: 40px; margin-bottom: 50px; }
        .footer-title { font-size: 11px; font-weight: 900; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 2px; color: #2563eb; }
        .footer-col p { font-size: 13px; opacity: 0.7; margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
        .footer-socials { display: flex; gap: 20px; margin-top: 20px; }
        .footer-socials a { color: white; font-size: 20px; opacity: 0.7; transition: 0.3s; }
        .footer-socials a:hover { opacity: 1; color: #2563eb; transform: scale(1.1); }
        .footer-col ul { list-style: none; }
        .footer-col ul li a { text-decoration: none; color: white; opacity: 0.7; font-size: 13px; display: block; margin-bottom: 10px; transition: 0.3s; }
        .footer-col ul li a:hover { opacity: 1; color: #2563eb; padding-left: 5px; }
        
        /* FIRMA DESIGNER */
        .designer-signature { text-align: center; padding: 25px 0; border-top: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.02); }
        .designer-signature p { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: rgba(255,255,255,0.4); margin: 0; }
        .designer-signature strong { color: rgba(255,255,255,0.8); font-weight: 800; }

        /* RESPONSIVE */
        @media (max-width: 992px) { .footer-grid-custom { grid-template-columns: 1fr 1fr; gap: 30px; } }
        @media (max-width: 768px) {
            .nav-links { display: none; }
            .page-hero { padding: 80px 0; }
            .page-hero h1 { font-size: 36px; }
            .bus-detail-block, .bus-detail-block:nth-child(even) { flex-direction: column; gap: 30px; text-align: center; }
            .bus-text-container h2 { font-size: 28px; }
            .footer-grid-custom { grid-template-columns: 1fr; text-align: center; }
            .footer-col p, .footer-socials { justify-content: center; }
            .footer-col ul li a:hover { padding-left: 0; }
        }
    </style>
</head>
<body>

    <header>
        <div class="container header-flex">
            <a href="index.html" class="logo-container">
                <img src="logo.jpg.JPEG" alt="Del Grosso Viaggi Logo">
            </a>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="flotta.html" class="active">La Flotta</a></li>
                    <li><a href="prenota.html">Prenota</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="page-hero">
        <div class="container">
            <h1>La Nostra Flotta</h1>
            <p>Eccellenza, Comfort e Sicurezza su Ruote</p>
        </div>
    </section>

    <section class="flotta-dettaglio-section">
        <div class="container" id="flotta-dettaglio-container">
            </div>
    </section>

    <footer class="main-footer">
        <div class="container">
            <div class="footer-grid-custom">
                <div class="footer-col">
                    <h4 class="footer-title">Del Grosso Viaggi</h4>
                    <p>La tua scelta di eccellenza per il noleggio di autobus Gran Turismo e Limousine Bus.</p>

                        <a href="#" target="_blank">FB</a>
                        <a href="#" target="_blank">IG</a>
                    </div>
                </div>
                <div class="footer-col">
                    <h4 class="footer-title">Contatti</h4>
