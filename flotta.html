<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La Flotta | Del Grosso Viaggi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1a1a1a; margin: 0; }
        header { background: white; padding: 12px 0; border-bottom: 1px solid #eaeaea; position: sticky; top: 0; z-index: 1000; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; width: 92%; max-width: 1200px; margin: auto; }
        .nav-links { list-style: none; display: flex; gap: 15px; }
        .nav-links a { text-decoration: none; color: #000; font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }
        .hero { background: #000; color: white; padding: 60px 20px; text-align: center; }
        .hero h1 { font-size: 40px; font-weight: 900; text-transform: uppercase; font-style: italic; line-height: 0.9; }
        .bus-card { @apply bg-white rounded-[2.5rem] overflow-hidden shadow-xl mb-12 border border-gray-100 mx-auto max-w-5xl flex flex-col md:flex-row; transition: transform 0.3s ease; }
        .bus-card:hover { transform: scale(1.01); }
        .bus-card:nth-child(even) { @apply md:flex-row-reverse; }
        .bus-img { @apply md:flex-[1.2] h-[350px] md:h-auto; }
        .bus-img img { width: 100%; height: 100%; object-fit: cover; }
        .bus-info { @apply md:flex-1 p-8 md:p-12 flex flex-col justify-center; }
        .bus-info h2 { font-size: 28px; font-weight: 900; text-transform: uppercase; font-style: italic; margin-bottom: 15px; line-height: 1; color: #000; }
        .bus-info p { font-size: 15px; color: #4b5563; white-space: pre-line; margin-bottom: 25px; line-height: 1.6; }
        .btn-book { @apply inline-block bg-blue-600 text-white font-black uppercase text-[10px] py-4 px-8 rounded-2xl self-start transition-all active:scale-95 shadow-lg; }
        footer { background: #000; color: white; padding: 40px 0; text-align: center; margin-top: 50px; }
        .signature { font-size: 9px; text-transform: uppercase; letter-spacing: 2px; color: #444; margin-top: 20px; }
    </style>
</head>
<body>

    <header>
        <div class="header-flex">
            <a href="index.html"><img src="logo.jpg.JPEG" class="h-10 w-auto"></a>
            <nav><ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="viaggi.html">Viaggi</a></li>
                <li><a href="prenota.html">Prenota</a></li>
            </ul></nav>
        </div>
    </header>

    <section class="hero">
        <p class="text-[10px] font-bold uppercase tracking-[0.3em] mb-2 opacity-50">Viaggi di Classe</p>
        <h1>LA NOSTRA <br><span class="text-blue-500">FLOTTA ESCLUSIVA</span></h1>
    </section>

    <main class="py-12 px-6" id="container-flotta">
        <div class="text-center py-20">
            <p class="font-black uppercase text-xs opacity-20 italic">Sincronizzazione Garage...</p>
        </div>
    </main>

    <footer>
        <img src="logo.jpg.JPEG" class="h-8 mx-auto mb-4 brightness-0 invert opacity-20">
        <div class="signature">Designer © <strong>Cristino Nicola Pio</strong></div>
    </footer>

    <script>
        const S_URL = "https://exphxbeqwpwrsigdmilc.supabase.co";
        const S_KEY = "sb_publishable_jEq6R22qxk2SHGI5YEmEow_SfZG7j8c";
        const sb = supabase.createClient(S_URL, S_KEY);

        async function caricaFlotta() {
            const main = document.getElementById('container-flotta');
            try {
                const { data, error } = await sb.from('flotta_page').select('*');
                
                if (error) throw error;

                if (!data || data.length === 0) {
                    main.innerHTML = `<div class="text-center py-20 opacity-30 font-black uppercase italic">Nessun mezzo trovato.</div>`;
                    return;
                }

                main.innerHTML = data.map(bus => {
                    // Protezione contro l'undefined: se il dato manca, usa una stringa vuota
                    const titolo = bus.titolo || "Mezzo Del Grosso";
                    const descrizione = bus.descrizione || "";
                    const immagine = bus.immagine_url || 'logo.jpg.JPEG';

                    return `
                        <div class="bus-card">
                            <div class="bus-img">
                                <img src="${immagine}" onerror="this.src='logo.jpg.JPEG'">
                            </div>
                            <div class="bus-info">
                                <h2>${titolo}</h2>
                                <p>${descrizione}</p>
                                <a href="prenota.html" class="btn-book">Richiedi Preventivo</a>
                            </div>
                        </div>
                    `;
                }).join('');

            } catch (err) {
                console.error(err);
                main.innerHTML = `<div class="text-center py-20 text-red-500 font-black">Errore di caricamento dati.</div>`;
            }
        }
        caricaFlotta();
    </script>
</body>
</html>
