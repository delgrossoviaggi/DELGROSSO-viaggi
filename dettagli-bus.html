<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dettagli Mezzi - Del Grosso Viaggi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
    </style>
</head>
<body>
    <header class="bg-white shadow-sm h-20 flex items-center sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 flex justify-between items-center w-full">
            <a href="index.html"><img src="logo.jpg.JPEG" class="h-14 w-auto object-contain"></a>
            <a href="index.html" class="bg-gray-100 px-6 py-2 rounded-xl text-xs font-black uppercase tracking-widest">Torna alla Home</a>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-16">
        <div class="text-center mb-16">
            <h1 class="text-5xl font-black uppercase italic tracking-tighter text-gray-900">Specifiche Tecniche</h1>
            <p class="text-gray-400 font-bold mt-2 uppercase text-xs tracking-[0.4em]">Scopri la nostra eccellenza</p>
        </div>

        <div class="grid grid-cols-1 gap-20" id="container-dettagli">
            </div>
    </main>

    <script>
        const S_URL = "https://exphxbeqwpwrsigdmilc.supabase.co";
        const S_KEY = "sb_publishable_jEq6R22qxk2SHGI5YEmEow_SfZG7j8c";
        const sb = supabase.createClient(S_URL, S_KEY);

        async function caricaDettagli() {
            const { data } = await sb.from('dettagli_bus').select('*').order('id', {ascending: true});
            const render = document.getElementById('container-dettagli');
            
            if(data) {
                render.innerHTML = data.map(bus => `
                    <section class="bg-white rounded-[3rem] overflow-hidden shadow-2xl border-t-8 ${bus.id === 'bus_gt' ? 'border-blue-600' : 'border-purple-600'}">
                        ${bus.immagine_url ? `<img src="${bus.immagine_url}" class="w-full h-80 object-cover border-b">` : ''}
                        
                        <div class="p-10">
                            <h2 class="text-4xl font-black uppercase italic tracking-tighter text-gray-900 mb-4">${bus.titolo}</h2>
                            <p class="text-gray-600 leading-relaxed text-lg mb-8 font-medium italic">"${bus.descrizione_lunga}"</p>
                            
                            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                                ${bus.servizi.split(',').map(s => `
                                    <div class="bg-gray-50 p-4 rounded-2xl border border-gray-100 text-center font-black uppercase text-[10px] tracking-widest text-gray-700">
                                        <span class="block text-xl mb-1">${bus.id === 'bus_gt' ? '🔵' : '🟣'}</span>
                                        ${s.trim()}
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </section>
                `).join('');
            }
        }
        caricaDettagli();
    </script>
</body>
</html>
