<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Master Admin - Del Grosso Viaggi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const passwordAttesa = "Delgrosso@26";
        let accesso = prompt("Password Amministratore:");
        if (accesso !== passwordAttesa) { window.location.href = "index.html"; }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .card-admin { @apply bg-white p-6 rounded-[2.5rem] shadow-sm border-t-8 mb-8; }
        input, select, textarea { @apply w-full p-4 bg-gray-50 border-2 border-gray-100 rounded-2xl font-bold outline-none focus:border-blue-500 mb-4; font-size: 16px !important; }
        label { @apply text-[10px] font-black uppercase text-gray-400 ml-2 mb-1 block; }
    </style>
</head>
<body class="pb-24">

    <nav class="bg-black text-white p-4 sticky top-0 z-50 flex justify-between items-center border-b-2 border-blue-600 shadow-xl">
        <div class="flex items-center gap-3">
            <div class="bg-white p-1 rounded-xl"><img src="logo.jpg.JPEG" class="h-10 w-auto"></div>
            <h1 class="font-black text-[10px] uppercase italic text-blue-500">Master Admin 2026</h1>
        </div>
        <a href="index.html" class="bg-red-600 px-4 py-2 rounded-xl text-[10px] font-black uppercase">Esci</a>
    </nav>

    <div class="max-w-5xl mx-auto p-4 mt-6">

        <div class="card-admin border-indigo-500">
            <h2 class="font-black text-indigo-700 text-xl uppercase italic mb-6">🖼️ Gallery Carousel Home</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div>
                    <input type="text" id="c-titolo" placeholder="Titolo Foto">
                    <input type="file" id="c-file" accept="image/*">
                    <button id="btn-c" onclick="salvaCarousel()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black uppercase shadow-lg">Carica nel Carousel</button>
                </div>
                <div id="lista-carousel" class="grid grid-cols-2 gap-3 max-h-[400px] overflow-y-auto p-2 bg-gray-50 rounded-3xl border">
                    </div>
            </div>
        </div>

        <div class="card-admin border-black">
            <h2 class="font-black text-black text-xl uppercase italic mb-6">🚌 Gestione Viaggi e Locandine</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div>
                    <input type="text" id="v-titolo" placeholder="Destinazione">
                    <select id="v-bus">
                        <option value="GT 53 POSTI">GT 53 POSTI</option>
                        <option value="GT 63 POSTI">GT 63 POSTI</option>
                    </select>
                    <input type="file" id="v-file" accept="image/*">
                    <button id="btn-v" onclick="salvaViaggio()" class="w-full bg-black text-white py-4 rounded-2xl font-black uppercase shadow-lg">Pubblica Viaggio</button>
                </div>
                <div id="lista-tratte" class="space-y-3 max-h-[400px] overflow-y-auto pr-2">
                    </div>
            </div>
        </div>

    </div>

    <script>
        const S_URL = "https://exphxbeqwpwrsigdmilc.supabase.co";
        const S_KEY = "sb_publishable_jEq6R22qxk2SHGI5YEmEow_SfZG7j8c";
        const sb = supabase.createClient(S_URL, S_KEY);

        // UPLOAD SUL BUCKET "foto"
        async function upload(input) {
            const file = input.files[0]; if (!file) return null;
            const fileName = `adm_${Date.now()}_${file.name.replace(/[^a-zA-Z0-9.]/g, '')}`;
            const { data, error } = await sb.storage.from('foto').upload(fileName, file);
            if (error) { alert("Errore: " + error.message); return null; }
            const { data: { publicUrl } } = sb.storage.from('foto').getPublicUrl(fileName);
            return publicUrl;
        }

        async function init() {
            // Carica Carousel
            const { data: car } = await sb.from('carousel_flotta').select('*').order('created_at', {ascending: false});
            document.getElementById('lista-carousel').innerHTML = car?.map(c => `
                <div class="relative bg-white p-1 rounded-xl border shadow-sm">
                    <img src="${c.immagine_url}" class="w-full h-24 object-cover rounded-lg">
                    <button onclick="elimina('carousel_flotta', '${c.id}')" class="absolute top-1 right-1 bg-red-600 text-white text-[8px] p-1 rounded-md font-bold">ELIMINA</button>
                </div>`).join('') || '';

            // Carica Tratte
            const { data: tratte } = await sb.from('tratte').select('*').order('created_at', {ascending: false});
            document.getElementById('lista-tratte').innerHTML = tratte?.map(t => `
                <div class="flex items-center gap-3 p-2 bg-white border rounded-2xl shadow-sm">
                    <img src="${t.immagine_url}" class="w-12 h-12 object-cover rounded-lg border">
                    <div class="flex-1"><p class="text-[10px] font-black uppercase">${t.titolo}</p></div>
                    <button onclick="elimina('tratte', '${t.id}')" class="text-red-500 font-bold px-2">X</button>
                </div>`).join('') || '';
        }

        async function salvaCarousel() {
            const url = await upload(document.getElementById('c-file'));
            if(url) {
                await sb.from('carousel_flotta').insert([{titolo: document.getElementById('c-titolo').value, immagine_url: url}]);
                location.reload();
            }
        }

        async function salvaViaggio() {
            const url = await upload(document.getElementById('v-file'));
            if(url) {
                await sb.from('tratte').insert([{titolo: document.getElementById('v-titolo').value, immagine_url: url, modello_bus: document.getElementById('v-bus').value}]);
                location.reload();
            }
        }

        async function elimina(tab, id) {
            if(confirm("Vuoi cancellare?")) {
                await sb.from(tab).delete().eq('id', id);
                location.reload();
            }
        }

        init();
    </script>
</body>
</html>
