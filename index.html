<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Del Grosso Viaggi - Official Site</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .nav-link { @apply font-black uppercase text-[10px] tracking-widest hover:text-blue-600 transition; }
        .section-title { @apply text-3xl font-black uppercase italic text-center mb-10; }
        .admin-btn { @apply p-2 rounded-full hover:bg-gray-100 transition-all opacity-40 hover:opacity-100 text-gray-500; }
    </style>
</head>
<body class="bg-white">

    <header class="p-4 sticky top-0 bg-white/90 backdrop-blur z-[100] border-b">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <img src="logo.jpg.JPEG" class="h-12" alt="Logo Del Grosso">
            
            <div class="flex items-center gap-6">
                <nav class="hidden md:flex gap-6">
                    <a href="#home" class="nav-link">Home</a>
                    <a href="#flotta" class="nav-link">La Mia Flotta</a>
                    <a href="#viaggi" class="nav-link">Viaggi</a>
                    <a href="#contatti" class="nav-link">Contatti</a>
                </nav>
                
                <a href="admin.html" class="admin-btn" title="Area Riservata Admin">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M8 1a2 2 0 0 1 2 2v4H6V3a2 2 0 0 1 2-2zm3 6V3a3 3 0 0 0-6 0v4a2 2 0 0 0-2 2v5a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/>
                    </svg>
                </a>
            </div>
        </div>
    </header>

    <section id="home" class="h-[70vh] bg-black text-white flex items-center justify-center relative overflow-hidden">
        <h1 class="text-5xl font-black uppercase italic z-10 text-center px-4">In Viaggio con <br><span class="text-blue-500">Del Grosso</span></h1>
        <div id="carousel-bg" class="absolute inset-0 opacity-40"></div>
    </section>

    <section id="flotta" class="py-20 bg-gray-50">
        <div class="max-w-6xl mx-auto px-6">
            <h2 class="section-title tracking-tighter"><span class="text-blue-600">La Mia</span> Flotta</h2>
            <div id="griglia-flotta" class="grid grid-cols-1 md:grid-cols-2 gap-10">
                </div>
        </div>
    </section>

    <section id="viaggi" class="py-20">
        <div class="max-w-6xl mx-auto px-6">
            <h2 class="section-title">Viaggi in Programma</h2>
            <div id="griglia-viaggi" class="grid grid-cols-1 md:grid-cols-3 gap-8">
                </div>
        </div>
    </section>

    <section id="contatti" class="py-20 bg-black text-white">
        <div class="max-w-4xl mx-auto px-6 text-center">
            <h2 class="text-3xl font-black uppercase italic mb-10 text-blue-500">Contatti & Sede</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-12 text-left">
                <div>
                    <p class="text-blue-500 font-black uppercase text-xs mb-2 text-blue-400">Sede Operativa</p>
                    <p class="text-xl font-bold mb-6">San Severo (FG) <br> Puglia, Italia</p>
                    <p class="text-blue-500 font-black uppercase text-xs mb-2 text-blue-400">Numeri Diretti</p>
                    <p class="font-bold">Nicola: 366 2127916</p>
                    <p class="font-bold">Raffaele: 320 5730466</p>
                </div>
                <div class="flex flex-col gap-4">
                    <a href="tel:3662127916" class="bg-white text-black p-4 rounded-2xl font-black text-center uppercase text-xs hover:bg-blue-500 hover:text-white transition">Chiama Ora</a>
                    <a href="https://wa.me/393662127916" class="bg-green-600 text-white p-4 rounded-2xl font-black text-center uppercase text-xs hover:bg-green-700 transition">WhatsApp</a>
                </div>
            </div>
            <div class="mt-20 opacity-20 text-[9px] uppercase tracking-[0.5em]">Designer © Cristino Nicola Pio</div>
        </div>
    </section>

    <script>
        const S_URL = "https://exphxbeqwpwrsigdmilc.supabase.co";
        const S_KEY = "sb_publishable_jEq6R22qxk2SHGI5YEmEow_SfZG7j8c";
        const sb = supabase.createClient(S_URL, S_KEY);

        async function initHome() {
            try {
                // Carica Flotta
                const { data: flotta } = await sb.from('flotta_page').select('*');
                if (flotta) {
                    document.getElementById('griglia-flotta').innerHTML = flotta.map(f => `
                        <div class="bg-white rounded-[2.5rem] overflow-hidden shadow-xl border group hover:shadow-2xl transition-all duration-500">
                            <div class="overflow-hidden">
                                <img src="${f.immagine_url}" class="w-full h-64 object-cover group-hover:scale-105 transition-transform duration-700">
                            </div>
                            <div class="p-8">
                                <h3 class="text-xl font-black uppercase italic mb-2">${f.titolo}</h3>
                                <p class="text-gray-500 text-sm leading-relaxed">${f.descrizione}</p>
                            </div>
                        </div>`).join('');
                }

                // Carica Viaggi
                const { data: viaggi } = await sb.from('tratte').select('*');
                if (viaggi) {
                    document.getElementById('griglia-viaggi').innerHTML = viaggi.map(v => `
                        <div class="text-center group">
                            <div class="overflow-hidden rounded-[2rem] shadow-lg mb-4">
                                <img src="${v.immagine_url}" class="w-full h-48 object-cover group-hover:scale-110 transition-transform duration-700">
                            </div>
                            <h3 class="font-black uppercase">${v.titolo}</h3>
                            <a href="prenota.html" class="inline-block mt-4 text-[10px] font-black text-blue-600 underline uppercase hover:text-black transition">Prenota Ora</a>
                        </div>`).join('');
                }
            } catch (error) {
                console.error("Errore nel caricamento dei dati:", error);
            }
        }
        initHome();
    </script>
</body>
</html>
