<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viaggi in Programma - Del Grosso Viaggi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; display: flex; flex-direction: column; min-height: 100vh; }
        main { flex: 1; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <header class="bg-white/95 backdrop-blur-md shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 flex justify-between items-center h-20 md:h-24">
            <a href="index.html" class="flex items-center h-full py-2">
                <img src="logo.jpg.JPEG" alt="Del Grosso Logo" class="h-12 sm:h-16 md:h-20 w-auto object-contain">
            </a>
            <nav class="hidden lg:flex space-x-6 items-center text-sm font-semibold">
                <a href="flotta.html" class="text-gray-600 hover:text-blue-600 transition">Flotta</a>
                <a href="viaggi.html" class="text-blue-600 border-b-2 border-blue-600 pb-1">Viaggi</a>
                <a href="prenota.html" class="text-gray-600 hover:text-blue-600 transition">Prenotazioni</a>
                <a href="contatti.html" class="text-gray-600 hover:text-blue-600 transition">Contatti</a>
            </nav>
            <div class="lg:hidden">
                <button onclick="document.getElementById('mobile-menu').classList.toggle('hidden')" class="text-2xl p-2">☰</button>
            </div>
        </div>
        <div id="mobile-menu" class="hidden lg:hidden bg-white border-t p-4 space-y-3 font-semibold shadow-lg absolute w-full z-50">
            <a href="index.html" class="block">Home</a>
            <a href="viaggi.html" class="block text-blue-600">Viaggi</a>
            <a href="prenota.html" class="block">Prenotazioni</a>
            <a href="contatti.html" class="block">Contatti</a>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-16 w-full">
        <h1 class="text-4xl font-extrabold text-gray-900 mb-8">Viaggi e Gite</h1>
        <div id="lista-viaggi-full" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <p class="text-center text-gray-500 col-span-full py-20 italic">Caricamento delle partenze in corso...</p>
        </div>
    </main>

    <footer class="bg-gray-950 text-white pt-12 pb-8 border-t-4 border-blue-600">
        <div class="max-w-7xl mx-auto px-4 grid grid-cols-1 md:grid-cols-2 gap-12 text-center md:text-left">
            <div>
                <h3 class="bg-blue-600 inline-block px-3 py-1 font-bold mb-4 text-sm uppercase">Del Grosso Viaggi</h3>
                <p class="text-sm text-gray-400">info@delgrossoviaggi.it</p>
            </div>
            <div class="md:text-right">
                <p class="text-xs text-gray-500">© 2026 Del Grosso Viaggi.</p>
                <p class="text-sm font-bold text-gray-400 mt-2 italic">Fatto con cura da Cristino Nicola Pio.</p>
            </div>
        </div>
    </footer>

    <script>
        const S_URL = "https://exphxbeqwpwrsigdmilc.supabase.co";
        const S_KEY = "sb_publishable_jEq6R22qxk2SHGI5YEmEow_SfZG7j8c";
        const sb = supabase.createClient(S_URL, S_KEY);

        async function caricaViaggi() {
            const { data: tratte } = await sb.from('tratte').select('*').order('created_at', {ascending: false});
            const render = document.getElementById('lista-viaggi-full');
            
            if (!tratte || tratte.length === 0) {
                render.innerHTML = '<p class="text-center text-gray-500 col-span-full py-20">Nessun viaggio in programma al momento. Ritorna presto!</p>';
                return;
            }

            render.innerHTML = tratte.map(t => `
                <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-xl transition">
                    <img src="${t.immagine_url}" class="h-56 w-full object-cover">
                    <div class="p-6">
                        <span class="text-blue-600 text-xs font-black tracking-widest uppercase">${t.modello_bus}</span>
                        <h2 class="text-xl font-bold mt-2 mb-4">${t.titolo}</h2>
                        <a href="prenota.html" class="block text-center w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition">PRENOTA ORA</a>
                    </div>
                </div>`).join('');
        }
        caricaViaggi();
    </script>
</body>
</html>
