<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tour e Viaggi | Del Grosso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1a1a1a; }
        
        header { background: rgba(255, 255, 255, 0.95); padding: 10px 0; border-bottom: 1px solid #eaeaea; position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px); }
        .header-flex { display: flex; justify-content: space-between; align-items: center; width: 92%; max-width: 1200px; margin: auto; }
        .logo-box img { height: 50px; width: auto; object-fit: contain; }
        .nav-links { list-style: none; display: flex; gap: 15px; }
        .nav-links a { text-decoration: none; color: #000; font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .nav-links a:hover { color: #2563eb; }

        .card-tour { background: white; border-radius: 2.5rem; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); overflow: hidden; border: 1px solid #f1f5f9; transition: all 0.5s ease; position: relative; }
        .card-tour:hover { transform: translateY(-10px); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.2); }

        /* Stile Sold Out con linea obliqua */
        .sold-out-overlay {
            position: absolute; inset: 0; background: rgba(255, 255, 255, 0.7);
            z-index: 20; display: flex; align-items: center; justify-content: center;
            pointer-events: none;
        }
        .sold-out-badge {
            background: #ef4444; color: white; font-weight: 900; text-transform: uppercase;
            padding: 10px 30px; font-size: 24px; font-style: italic; border: 4px solid white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2); transform: rotate(-15deg);
            position: relative;
        }
        /* Linea rossa obliqua che taglia la card */
        .card-tour.full::after {
            content: ""; position: absolute; top: 50%; left: -10%; width: 120%; height: 5px;
            background: #ef4444; transform: rotate(-25deg); z-index: 25; opacity: 0.8;
            pointer-events: none;
        }

        .btn-book { background: black; color: white; padding: 16px 32px; border-radius: 1.25rem; font-weight: 900; text-transform: uppercase; font-style: italic; transition: all 0.3s; text-decoration: none; display: inline-block; }
        .btn-book:hover { background: #2563eb; transform: scale(1.05); }
        .btn-disabled { background: #cbd5e1 !important; cursor: not-allowed; transform: none !important; }
    </style>
</head>
<body class="pb-20">

    <header>
        <div class="header-flex">
            <a href="index.html" class="logo-box"><img src="logo.jpg.JPEG" alt="Logo"></a>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="flotta.html">Flotta</a></li>
                    <li><a href="viaggi.html" style="color: #2563eb;">Viaggi</a></li>
                    <li><a href="prenota.html">Prenota</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="max-w-7xl mx-auto py-16 px-4">
        <p class="text-center text-blue-600 font-black uppercase tracking-[0.3em] text-[10px] mb-2">Pianifica la tua prossima avventura</p>
        <h1 class="text-4xl md:text-6xl font-black uppercase italic text-center mb-16 tracking-tighter">Prossime Partenze</h1>
        
        <div id="grid-viaggi" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12">
            <div class="col-span-full text-center py-20 opacity-20 font-black uppercase italic tracking-widest">Sincronizzazione tour...</div>
        </div>
    </div>

    <script>
        const S_URL = "https://exphxbeqwpwrsigdmilc.supabase.co";
        const S_KEY = "sb_publishable_jEq6R22qxk2SHGI5YEmEow_SfZG7j8c";
        const sb = supabase.createClient(S_URL, S_KEY);

        function fixUrl(url) {
            if (!url) return 'logo.jpg.JPEG';
            return url.replace('/immagini/', '/foto/') + "?v=" + new Date().getTime();
        }

        async function caricaViaggi() {
            const grid = document.getElementById('grid-viaggi');
            
            try {
                // 1. Carica le tratte
                const { data: tratte, error: tErr } = await sb.from('tratte').select('*').order('created_at', {ascending: false});
                if (tErr) throw tErr;

                // 2. Carica tutte le prenotazioni per fare il calcolo dei posti
                const { data: preno, error: pErr } = await sb.from('prenotazioni').select('tratta_id, posti_selezionati');
                if (pErr) throw pErr;

                if (!tratte || tratte.length === 0) {
                    grid.innerHTML = `<p class="col-span-full text-center font-black uppercase opacity-30">Nessun viaggio attivo.</p>`;
                    return;
                }

                grid.innerHTML = tratte.map(v => {
                    // CALCOLO POSTI OCCUPATI
                    const occupati = preno
                        .filter(p => p.tratta_id === v.id)
                        .reduce((acc, curr) => acc + (curr.posti_selezionati ? curr.posti_selezionati.length : 0), 0);
                    
                    const capacita = parseInt(v.modello_bus) || 53;
                    const disponibili = capacita - occupati;
                    const isFull = disponibili <= 0;

                    return `
                        <div class="card-tour ${isFull ? 'full' : ''}">
                            ${isFull ? `
                                <div class="sold-out-overlay">
                                    <div class="sold-out-badge">SOLD OUT</div>
                                </div>
                            ` : ''}
                            
                            <div class="relative h-72 overflow-hidden">
                                <img src="${fixUrl(v.immagine_url)}" class="w-full h-full object-cover" onerror="this.src='logo.jpg.JPEG'">
                                <div class="absolute top-4 left-4 bg-white/90 backdrop-blur px-4 py-1 rounded-full text-[9px] font-black uppercase">
                                    Bus GT ${capacita} posti
                                </div>
                                ${!isFull ? `
                                    <div class="absolute bottom-4 right-4 bg-blue-600 text-white px-3 py-1 rounded-lg text-[10px] font-black">
                                        ${disponibili} POSTI DISPONIBILI
                                    </div>
                                ` : ''}
                            </div>

                            <div class="p-8 text-center">
                                <h2 class="font-black uppercase italic text-xl mb-8 min-h-[3.5rem] flex items-center justify-center leading-tight">
                                    ${v.titolo}
                                </h2>
                                
                                ${isFull ? 
                                    `<button class="btn-book btn-disabled" disabled>Tutto Esaurito</button>` : 
                                    `<a href="prenota.html?id=${v.id}" class="btn-book">Prenota ora</a>`
                                }
                            </div>
                        </div>
                    `;
                }).join('');

            } catch (err) {
                console.error(err);
                grid.innerHTML = "<p class='text-center font-black text-red-500 uppercase'>Errore di connessione.</p>";
            }
        }

        caricaViaggi();
    </script>
</body>
</html>
