<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viaggi - Del Grosso Viaggi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">

    <header class="bg-[#d0e0e3] border-b border-[#b7c9cc] h-20 flex items-center px-4 justify-between sticky top-0 z-50">
        <div class="text-2xl font-black text-[#2c4c5c] italic tracking-tighter">DEL GROSSO VIAGGI</div>
        <nav class="hidden lg:flex space-x-6 text-[10px] font-black uppercase text-[#2c4c5c]">
            <a href="index.html">Home</a>
            <a href="viaggi.html" class="text-blue-600">Viaggi</a>
            <a href="prenota.html">Prenotazioni</a>
            <a href="contatti.html">Contatti</a>
        </nav>
    </header>

    <main class="flex-grow max-w-7xl mx-auto px-4 py-16 w-full">
        <h1 class="text-4xl font-black italic uppercase text-gray-900 mb-2">Prossime Partenze</h1>
        <p class="text-gray-500 font-bold mb-12 uppercase text-xs tracking-widest">Scegli la tua destinazione e prenota il tuo posto</p>

        <div id="lista-viaggi-full" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
            </div>
    </main>

    <footer class="bg-[#444] text-white py-12 text-center text-[10px] uppercase font-bold tracking-widest border-t-4 border-blue-600">
        DEL GROSSO VIAGGI © 2026 - SAN SEVERO (FG)
    </footer>

    <script>
        const S_URL = "https://exphxbeqwpwrsigdmilc.supabase.co";
        const S_KEY = "sb_publishable_jEq6R22qxk2SHGI5YEmEow_SfZG7j8c";
        const sb = supabase.createClient(S_URL, S_KEY);

        async function carica() {
            const { data: tratte } = await sb.from('tratte').select('*').order('created_at', {ascending: false});
            const render = document.getElementById('lista-viaggi-full');
            if (tratte) {
                render.innerHTML = tratte.map(t => `
                    <div class="bg-white rounded-[2.5rem] shadow-xl border overflow-hidden transition hover:-translate-y-2">
                        <img src="${t.immagine_url}" class="h-64 w-full object-cover">
                        <div class="p-8">
                            <span class="bg-blue-600 text-white px-3 py-1 text-[9px] font-black uppercase italic rounded-full">${t.modello_bus || 'GT'}</span>
                            <h2 class="text-xl font-black italic uppercase mt-4 mb-6">${t.titolo}</h2>
                            <a href="prenota.html?tratta=${t.id}" class="block text-center w-full bg-[#2c4c5c] text-white py-4 rounded-2xl font-black uppercase text-[11px] hover:bg-blue-600 transition shadow-lg">PRENOTA ORA</a>
                        </div>
                    </div>`).join('');
            }
        }
        carica();
    </script>
</body>
</html>
