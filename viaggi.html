<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Viaggi e Partenze | Del Grosso Viaggi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; margin: 0; }
        .card-viaggio { background: white; border-radius: 2.5rem; overflow: hidden; border: 1px solid #f1f5f9; transition: all 0.3s ease; }
        .locandina { width: 100%; height: 350px; object-fit: cover; }
        
        /* Layout pulsante e posti affiancati */
        .action-area { display: flex; align-items: center; gap: 10px; margin-top: 20px; }
        
        .btn-prenota { 
            flex: 2; background: #2563eb; color: white; padding: 1.1rem; 
            border-radius: 1.25rem; font-weight: 900; text-transform: uppercase; 
            font-style: italic; border: none; cursor: pointer; transition: 0.2s; 
            font-size: 0.9rem; text-align: center;
        }
        .btn-prenota:hover { background: #1d4ed8; }

        .posti-counter { 
            flex: 1; background: #f1f5f9; border: 1px solid #e2e8f0; 
            padding: 1.1rem 0.5rem; border-radius: 1.25rem; text-align: center;
            display: flex; flex-direction: column; justify-content: center;
        }
        .posti-counter span { display: block; }
        .num-mancanti { font-size: 1.2rem; font-weight: 900; color: #2563eb; line-height: 1; }
        .label-mancanti { font-size: 8px; font-weight: 900; text-transform: uppercase; color: #64748b; margin-top: 2px; }

        .sold-out-btn { flex: 1; background: #ef4444 !important; color: white !important; cursor: not-allowed !important; }
        .sold-out-badge { flex: 1; background: #fee2e2; border: 1px solid #fecaca; color: #b91c1c; font-weight: 900; padding: 1.1rem 0; border-radius: 1.25rem; text-transform: uppercase; font-size: 10px; }
    </style>
</head>
<body class="pb-20">

    <header class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-100 p-4">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <a href="index.html"><img src="logo.JPEG" class="h-10" alt="Logo"></a>
            <nav class="flex gap-6">
                <a href="index.html" class="text-[10px] font-black uppercase text-slate-400">Home</a>
                <a href="viaggi.html" class="text-[10px] font-black uppercase text-blue-600 border-b-2 border-blue-600">Viaggi</a>
            </nav>
        </div>
    </header>

    <main class="max-w-xl mx-auto p-4 space-y-8 mt-6">
        <h1 class="text-5xl font-black italic uppercase tracking-tighter text-slate-900 leading-none">Partenze</h1>
        <div id="lista-viaggi" class="space-y-8">
            <div id="loading" class="text-center py-20 text-slate-400 font-bold uppercase animate-pulse">Sincronizzazione...</div>
        </div>
    </main>

    <script>
        const S_URL = "https://exphxbeqwpwrsigdmilc.supabase.co";
        const S_KEY = "sb_publishable_jEq6R22qxk2SHGI5YEmEow_SfZG7j8c";
        const sb = supabase.createClient(S_URL, S_KEY);

        async function caricaViaggi() {
            const container = document.getElementById('lista-viaggi');
            try {
                const { data: viaggi } = await sb.from('tratte').select('*').order('created_at', { ascending: false });
                const { data: prenotazioni } = await sb.from('prenotazioni').select('*');

                document.getElementById('loading').style.display = 'none';

                container.innerHTML = viaggi.map(v => {
                    // Calcolo prenotati per questo viaggio
                    const prenoViaggio = prenotazioni.filter(p => p.tratta_id === v.id);
                    const occupati = prenoViaggio.reduce((acc, curr) => acc + (curr.posti_selezionati ? curr.posti_selezionati.length : 0), 0);
                    const totaleBus = parseInt(v.modello_bus) || 0;
                    const rimasti = totaleBus - occupati;

                    let areaAzioneHtml = "";

                    if (rimasti <= 0) {
                        // Layout SOLD OUT
                        areaAzioneHtml = `
                            <div class="action-area">
                                <button class="btn-prenota sold-out-btn" disabled>SOLD OUT</button>
                                <div class="sold-out-badge text-center">ESAURITO</div>
                            </div>
                        `;
                        // Funzione per inviare il riepilogo a te solo se lo rileva come sold out
                        controllaESpediaSoldOut(v, prenoViaggio, occupati);
                    } else {
                        // Layout STANDARD (Prenota + Posti Mancanti)
                        areaAzioneHtml = `
                            <div class="action-area">
                                <a href="prenota.html?id=${v.id}" class="flex-[2]">
                                    <button class="btn-prenota w-full">Prenota ➔</button>
                                </a>
                                <div class="posti-counter">
                                    <span class="num-mancanti">${rimasti}</span>
                                    <span class="label-mancanti">Mancano</span>
                                </div>
                            </div>
                        `;
                    }

                    const urlImmagine = v.immagine_url ? `${v.immagine_url}?v=${new Date().getTime()}` : 'logo.JPEG';

                    return `
                    <div class="card-viaggio shadow-xl">
                        <img src="${urlImmagine}" class="locandina" onerror="this.src='logo.JPEG'">
                        <div class="p-8">
                            <div class="flex justify-between items-start">
                                <div>
                                    <p class="text-blue-600 font-black text-xs uppercase tracking-widest mb-1">${v.data_partenza}</p>
                                    <h2 class="text-3xl font-black uppercase italic tracking-tighter leading-tight">${v.titolo}</h2>
                                </div>
                                <div class="bg-slate-100 px-3 py-1 rounded-full text-[9px] font-black uppercase text-slate-500 italic">Bus ${v.modello_bus}</div>
                            </div>
                            ${areaAzioneHtml}
                        </div>
                    </div>`;
                }).join('');
            } catch (err) { console.error(err); }
        }

        // Funzione per il messaggio WhatsApp automatico di riepilogo
        function controllaESpediaSoldOut(viaggio, prenotati, totaleOccupati) {
            const key = `soldout_sent_${viaggio.id}`;
            // Evita di inviare il messaggio ogni volta che ricarichi la pagina
            if (localStorage.getItem(key)) return;

            let riepilogoTesto = `🚨 *VIAGGIO SOLD OUT* 🚨\n\n`;
            riepilogoTesto += `📍 Viaggio: *${viaggio.titolo}*\n`;
            riepilogoTesto += `📅 Data: ${viaggio.data_partenza}\n`;
            riepilogoTesto += `🚌 Totale posti: ${viaggio.modello_bus}\n`;
            riepilogoTesto += `✅ Posti occupati: ${totaleOccupati}\n\n`;
            riepilogoTesto += `👥 *ELENCO PRENOTATI:* \n`;

            prenotati.forEach((p, index) => {
                riepilogoTesto += `${index + 1}. ${p.nome_cliente} (${p.posti_selezionati.join(',')})\n`;
            });

            // Salviamo che il messaggio è stato generato
            localStorage.setItem(key, "true");

            // Apriamo il link per Nicola
            const waUrl = `https://wa.me/393662127916?text=${encodeURIComponent(riepilogoTesto)}`;
            console.log("Viaggio esaurito. Pronto per l'invio riepilogo.");
            
            // Nota: Il browser potrebbe bloccare il popup automatico, 
            // quindi di solito si mette un tasto "Invia Riepilogo" nell'admin.
            // Qui lo stampo in console o puoi decidere di farlo aprire.
        }

        document.addEventListener('DOMContentLoaded', caricaViaggi);
    </script>
</body>
</html>
