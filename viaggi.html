<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tour e Viaggi | Del Grosso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1a1a1a; }
        
        /* HEADER */
        header { background: rgba(255, 255, 255, 0.95); padding: 10px 0; border-bottom: 1px solid #eaeaea; position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px); }
        .header-flex { display: flex; justify-content: space-between; align-items: center; width: 92%; max-width: 1200px; margin: auto; }
        .logo-box img { height: 50px; width: auto; object-fit: contain; }
        .nav-links { list-style: none; display: flex; gap: 15px; }
        .nav-links a { text-decoration: none; color: #000; font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .nav-links a:hover { color: #2563eb; }

        .card-tour { @apply bg-white rounded-[2.5rem] shadow-xl overflow-hidden border border-slate-100 transition-all duration-500 hover:-translate-y-2 hover:shadow-2xl; }
        .btn-book { @apply bg-black text-white px-10 py-4 rounded-2xl font-black block uppercase italic shadow-lg transition-all active:scale-95 hover:bg-blue-600; }
    </style>
</head>
<body class="pb-20">

    <header>
        <div class="header-flex">
            <a href="index.html" class="logo-box">
                <img src="logo.jpg.JPEG" alt="Logo Del Grosso">
            </a>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="flotta.html">Flotta</a></li>
                    <li><a href="chisiamo.html">Chi Siamo</a></li>
                    <li><a href="prenota.html">Prenota</a></li>
                    <li><a href="contatti.html">Contatti</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="max-w-7xl mx-auto py-16 px-4">
        <p class="text-center text-blue-600 font-black uppercase tracking-widest text-[10px] mb-2">Scopri le nostre mete</p>
        <h1 class="text-4xl md:text-5xl font-black uppercase italic text-center mb-16 tracking-tighter">Prossime Partenze</h1>
        
        <div id="grid-viaggi" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
            <div class="col-span-full text-center py-20">
                <p class="animate-pulse uppercase font-black text-slate-300 tracking-widest">Sincronizzazione tour in corso...</p>
            </div>
        </div>
    </div>

    <script>
        const S_URL = "https://exphxbeqwpwrsigdmilc.supabase.co";
        const S_KEY = "sb_publishable_jEq6R22qxk2SHGI5YEmEow_SfZG7j8c";
        const sb = supabase.createClient(S_URL, S_KEY);

        // FUNZIONE RIPARA URL E CACHE-BUSTING
        function fixUrl(url) {
            if (!url) return 'logo.jpg.JPEG';
            // Forza il passaggio al bucket 'foto' e aggiunge timestamp per svuotare la cache del browser
            let cleanUrl = url.replace('/immagini/', '/foto/');
            return cleanUrl + "?v=" + new Date().getTime();
        }

        async function caricaViaggi() {
            const grid = document.getElementById('grid-viaggi');
            
            try {
                const { data, error } = await sb.from('tratte').select('*').order('created_at', {ascending: false});

                if (error) throw error;

                if (!data || data.length === 0) {
                    grid.innerHTML = `
                        <div class="col-span-full text-center py-20 bg-white rounded-[3rem] border border-dashed">
                            <p class="text-slate-400 font-black uppercase text-sm tracking-widest">Nessun viaggio attivo al momento.<br><span class="text-[10px] opacity-50">Torna a trovarci presto!</span></p>
                        </div>`;
                    return;
                }

                grid.innerHTML = data.map(v => `
                    <div class="card-tour">
                        <div class="relative h-72 overflow-hidden">
                            <img src="${fixUrl(v.immagine_url)}" class="w-full h-full object-cover transition-transform duration-700 hover:scale-110" onerror="this.src='logo.jpg.JPEG'">
                            <div class="absolute top-4 left-4 bg-white/90 backdrop-blur px-4 py-1 rounded-full text-[9px] font-black uppercase shadow-sm">
                                ${v.modello_bus ? 'BUS GT ' + v.modello_bus + ' POSTI' : 'TOUR ESCLUSIVO'}
                            </div>
                        </div>
                        <div class="p-8 text-center">
                            <h2 class="font-black uppercase italic text-xl mb-8 leading-tight min-h-[3.5rem] flex items-center justify-center">${v.titolo}</h2>
                            <a href="prenota.html?id=${v.id}" class="btn-book">Prenota ora</a>
                        </div>
                    </div>
                `).join('');

            } catch (err) {
                console.error("Errore Supabase:", err);
                grid.innerHTML = "<p class='text-red-500 font-black uppercase text-center col-span-full'>Errore nel collegamento al database.</p>";
            }
        }

        caricaViaggi();
    </script>
</body>
</html>
