<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Tour e Viaggi - Del Grosso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50">
    <div class="max-w-7xl mx-auto py-12 px-4">
        <h1 class="text-3xl font-black uppercase italic text-center mb-12">Prossime Partenze</h1>
        
        <div id="grid-viaggi" class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <p class="text-center col-span-full animate-pulse uppercase font-bold text-slate-400">Caricamento tour...</p>
        </div>
    </div>

    <script>
        const S_URL = "https://exphxbeqwpwrsigdmilc.supabase.co";
        const S_KEY = "sb_publishable_jEq6R22qxk2SHGI5YEmEow_SfZG7j8c";
        const sb = supabase.createClient(S_URL, S_KEY);

        async function caricaViaggi() {
            const { data, error } = await sb.from('tratte').select('*').order('created_at', {ascending: false});
            const grid = document.getElementById('grid-viaggi');

            if (error) {
                grid.innerHTML = "<p class='text-red-500 font-bold'>Errore nel caricamento dei dati.</p>";
                return;
            }

            if (!data || data.length === 0) {
                grid.innerHTML = "<p class='text-slate-400 font-bold uppercase'>Nessun viaggio attivo al momento.</p>";
                return;
            }

            grid.innerHTML = data.map(v => `
                <div class="bg-white rounded-[2rem] shadow-xl overflow-hidden border">
                    <img src="${v.immagine_url}" class="w-full h-72 object-cover">
                    <div class="p-8 text-center">
                        <h2 class="font-black uppercase italic text-xl mb-6">${v.titolo}</h2>
                        <a href="prenota.html?id=${v.id}" class="bg-orange-600 text-white px-10 py-4 rounded-2xl font-black block uppercase italic shadow-lg">Prenota ora</a>
                    </div>
                </div>
            `).join('');
        }
        caricaViaggi();
    </script>
</body>
</html>
